<style>
/* ============================================================
   style.css
   依存: なし
   責務: アプリ全体のスタイル定義
   このファイルだけで対応できる修正: デザイン変更全般
   ============================================================ */

/* ============================================================
   CSS VARIABLES — デザイントークン
   ============================================================ */

:root {
  /* 背景 */
  --bg-base:       #0d1117;
  --bg-card:       #161b22;
  --bg-card-deep:  #0d1f2d;
  --bg-border:     #21262d;

  /* アクセント */
  --accent-strong: #99d8ff;
  --accent-soft:   #76c0ea;
  --accent-border: rgba(153, 216, 255, 0.25);
  --accent-bg:     rgba(153, 216, 255, 0.08);

  /* テキスト */
  --text-primary:   #ffffff;
  --text-secondary: #c9d1d9;
  --text-muted:     #8b949e;

  /* ステータス */
  --ok:      #3aaa72;
  --warn:    #e09030;
  --bad:     #e24b4a;
  --ok-bg:   rgba(58, 170, 114, 0.12);
  --warn-bg: rgba(224, 144, 48, 0.12);
  --bad-bg:  rgba(226, 75, 74, 0.12);

  /* レイアウト */
  --radius:    14px;
  --radius-sm: 9px;
  --radius-xs: 6px;

  /* セーフエリア */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ============================================================
   RESET & BASE
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
}

/* ============================================================
   APP LAYOUT
   ============================================================ */

#app {
  display: block;
  height: 100dvh;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* モバイルヘッダー — 上部固定 */
#mobile-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  top: var(--safe-top);
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 16px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--bg-border);
  z-index: 100;
}

#mobile-header-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--accent-strong);
  letter-spacing: 2px;
}

/* メインコンテンツ — ヘッダーとタブバーの間にスクロール */
#main-content {
  position: fixed;
  top: calc(var(--safe-top) + 44px);
  left: 0;
  right: 0;
  bottom: calc(var(--safe-bottom) + 56px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 16px;
}

/* タブバー — 下部固定 */
#tab-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  background: var(--bg-base);
  border-top: 1px solid var(--bg-border);
  padding-bottom: var(--safe-bottom);
  height: calc(56px + var(--safe-bottom));
  z-index: 100;
}

.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 2px 6px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-muted);
  transition: color 0.15s;
  min-width: 0;
}

.tab-btn.active {
  color: var(--accent-strong);
}

.tab-icon {
  width: 20px;
  height: 20px;
  stroke: currentColor;
}

.tab-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* ============================================================
   CARDS
   ============================================================ */

.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--bg-border);
  padding: 14px;
  margin-bottom: 12px;
}

.card-deep {
  background: var(--bg-card-deep);
  border-radius: var(--radius);
  border: 1px solid var(--accent-border);
  padding: 14px;
  margin-bottom: 12px;
}

.card-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--accent-strong);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
}

/* ============================================================
   STATS ROW
   ============================================================ */

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  padding: 10px 10px 8px;
}

.stat-val {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}

.stat-val-unit {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
}

.stat-lbl {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ============================================================
   PAGE HEADER
   ============================================================ */

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.page-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
}

.page-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.page-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ============================================================
   BUTTONS
   ============================================================ */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-appearance: none;
  appearance: none;
  flex-shrink: 0;
}

.btn:active {
  opacity: 0.8;
  transform: scale(0.97);
}

.btn-primary {
  background: var(--accent-strong);
  color: #0d1117;
}

.btn-secondary {
  background: var(--accent-bg);
  color: var(--accent-strong);
  border: 1px solid var(--accent-border);
}

.btn-danger {
  background: var(--bad-bg);
  color: var(--bad);
  border: 1px solid rgba(226, 75, 74, 0.25);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--bg-border);
}

.btn-sm {
  padding: 5px 11px;
  font-size: 12px;
  border-radius: var(--radius-xs);
}

.btn-icon {
  padding: 7px;
  border-radius: var(--radius-xs);
}

.btn-full {
  width: 100%;
  justify-content: center;
}

/* ============================================================
   FORM ELEMENTS
   ============================================================ */

.form-group {
  margin-bottom: 12px;
}

label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  background: var(--bg-base);
  font-size: 15px;
  color: var(--text-primary);
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent-soft);
}

input::placeholder, textarea::placeholder {
  color: var(--text-muted);
}

select option {
  background: var(--bg-card);
  color: var(--text-primary);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

/* ============================================================
   BADGES / CHIPS
   ============================================================ */

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.badge-accent  { background: var(--accent-bg);  color: var(--accent-strong); border: 1px solid var(--accent-border); }
.badge-ok      { background: var(--ok-bg);      color: var(--ok); }
.badge-warn    { background: var(--warn-bg);     color: var(--warn); }
.badge-bad     { background: var(--bad-bg);      color: var(--bad); }

.chip {
  padding: 6px 12px;
  border-radius: 18px;
  border: 1.5px solid var(--bg-border);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-muted);
  transition: all 0.12s;
}

.chip.active {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
  color: var(--accent-strong);
}

.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ============================================================
   BAR CHARTS
   ============================================================ */

.bar-track {
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
  min-width: 3px;
}

.week-bars {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  height: 60px;
  margin-top: 4px;
}

.week-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.week-bar-bg {
  width: 100%;
  height: 48px;
  background: var(--bg-border);
  border-radius: 3px 3px 0 0;
  position: relative;
  overflow: hidden;
}

.week-bar-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--accent-soft);
  border-radius: 3px 3px 0 0;
  transition: height 0.4s ease;
}

.week-bar-fill.today {
  background: var(--accent-strong);
}

.week-bar-day {
  font-size: 9px;
  color: var(--text-muted);
}

.week-bar-day.today {
  color: var(--accent-strong);
}

/* ============================================================
   PROGRESS RING (タイマー用)
   ============================================================ */

.progress-ring-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 8px 0;
}

/* ============================================================
   TIMER DISPLAY
   ============================================================ */

.timer-display {
  font-size: clamp(48px, 14vw, 72px);
  font-weight: 800;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
  text-align: center;
  line-height: 1;
  color: var(--text-primary);
  transition: color 0.3s;
}

.timer-display.running { color: var(--accent-strong); }
.timer-display.paused  { color: var(--warn); }

/* ============================================================
   FLASHCARD
   ============================================================ */

.flashcard-wrap {
  perspective: 1000px;
  max-width: 420px;
  margin: 0 auto 16px;
}

.flashcard {
  width: 100%;
  aspect-ratio: 16 / 9;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  border-radius: var(--radius);
}

.flashcard.flipped {
  transform: rotateY(180deg);
}

.flashcard-face {
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.flashcard-front {
  background: var(--bg-card-deep);
  border: 1px solid var(--accent-border);
}

.flashcard-back {
  background: var(--bg-card);
  border: 1px solid var(--bg-border);
  transform: rotateY(180deg);
}

.flashcard-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--accent-strong);
  margin-bottom: 8px;
}

.flashcard-text {
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 700;
  text-align: center;
  line-height: 1.5;
  color: var(--text-primary);
}

.flashcard-progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.flashcard-progress-track {
  flex: 1;
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
}

.flashcard-progress-fill {
  height: 100%;
  background: var(--accent-soft);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ============================================================
   CALENDAR
   ============================================================ */

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.calendar-day-header {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 3px 0;
}

.calendar-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.12s;
  border: 1.5px solid transparent;
  color: var(--text-secondary);
  min-height: 52px;
}

.calendar-day:hover { background: var(--accent-bg); }
.calendar-day.today { background: var(--accent-strong); color: #0d1117; font-weight: 800; }
.calendar-day.selected { border-color: var(--accent-soft); background: var(--accent-bg); }
.calendar-day.other-month { opacity: 0.3; }

.calendar-day-dots {
  display: flex;
  gap: 2px;
  margin-top: 2px;
}

.calendar-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent-soft);
}

.calendar-dot.high { background: var(--bad); }
.calendar-dot.mid  { background: var(--warn); }

.calendar-day-mini {
  font-size: 8px;
  line-height: 1.3;
  text-align: center;
  margin-top: 1px;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  color: var(--accent-soft);
}

.calendar-day.today .calendar-day-mini { color: rgba(13, 17, 23, 0.8); }

/* ============================================================
   EVENT LIST ITEM
   ============================================================ */

.event-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--accent-bg);
  border: 1px solid var(--bg-border);
  margin-bottom: 6px;
}

.event-bar {
  width: 4px;
  min-height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ============================================================
   SKILL TREE
   ============================================================ */

.skill-subj-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.skill-subj-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1.5px solid var(--bg-border);
  padding: 14px 12px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.skill-subj-card:active { transform: scale(0.97); }
.skill-subj-card.has-skills { border-color: var(--accent-soft); }

.skill-subj-name  { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
.skill-subj-count { font-size: 11px; color: var(--text-muted); }

.skill-subj-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  border-radius: 0 2px 0 0;
  transition: width 0.4s ease;
}

/* スキルマップオーバーレイ */
#skill-map-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: var(--bg-base);
  flex-direction: column;
}

#skill-map-overlay.open { display: flex; }

#skill-map-header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--bg-border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding-top: calc(10px + var(--safe-top));
}

#skill-map-body {
  flex: 1;
  overflow: hidden;
  padding: 14px;
  position: relative;
  cursor: grab;
  user-select: none;
}

#skill-map-body.panning { cursor: grabbing; }

#skill-map-svg-wrap {
  display: inline-block;
  min-width: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* ============================================================
   ACCORDION / TREND
   ============================================================ */

.accordion {
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  margin-bottom: 8px;
  overflow: hidden;
}

.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-card);
  cursor: pointer;
  gap: 8px;
}

.accordion-title {
  font-size: 13px;
  font-weight: 700;
  flex: 1;
  color: var(--text-primary);
}

.accordion-body {
  padding: 12px 14px;
  border-top: 1px solid var(--bg-border);
  display: none;
}

.accordion-body.open { display: block; }

/* ============================================================
   SECTION LABEL
   ============================================================ */

.section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-soft);
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--bg-border);
}

/* ============================================================
   LIST ROW
   ============================================================ */

.list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--bg-border);
  font-size: 13px;
  color: var(--text-primary);
}

.list-row:last-child { border-bottom: none; }

/* ============================================================
   BADGE CARDS (実績)
   ============================================================ */

.badge-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.achievement-card {
  background: var(--bg-card);
  border: 1.5px solid var(--bg-border);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
}

.achievement-card.earned {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
}

.achievement-icon {
  font-size: 22px;
  display: block;
  margin-bottom: 4px;
}

.achievement-name {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.achievement-hint {
  font-size: 9px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ============================================================
   MODAL
   ============================================================ */

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 18px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  padding-bottom: calc(20px + var(--safe-bottom));
  border-top: 2px solid var(--accent-soft);
  animation: modal-up 0.2s ease;
}

@keyframes modal-up {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

@media (min-width: 600px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: var(--radius); max-width: 460px; }
}

/* ============================================================
   TOAST
   ============================================================ */

#toast {
  position: fixed;
  bottom: calc(64px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(22, 27, 34, 0.95);
  color: var(--text-primary);
  border: 1px solid var(--bg-border);
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 2000;
  white-space: nowrap;
  pointer-events: none;
  max-width: calc(100vw - 32px);
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   OFFLINE BADGE
   ============================================================ */

#offline-badge {
  display: none;
  position: fixed;
  top: calc(8px + var(--safe-top));
  right: 8px;
  z-index: 9999;
  background: var(--warn);
  color: #fff;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
}

/* ============================================================
   GOAL PROGRESS BAR
   ============================================================ */

.goal-bar-bg {
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
}

.goal-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent-soft);
  transition: width 0.6s ease;
}

/* ============================================================
   PLAN ITEMS
   ============================================================ */

.plan-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.plan-item-subject {
  font-size: 12px;
  color: var(--text-secondary);
  width: 44px;
  flex-shrink: 0;
}

.plan-item-track {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-border);
  overflow: hidden;
}

.plan-item-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-soft);
}

.plan-item-fill.done {
  background: var(--ok);
}

.plan-item-time {
  font-size: 12px;
  color: var(--accent-strong);
  font-weight: 700;
  width: 44px;
  text-align: right;
  flex-shrink: 0;
}

/* ============================================================
   STREAK BADGE
   ============================================================ */

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(118, 192, 234, 0.12);
  border: 1px solid rgba(118, 192, 234, 0.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 10px;
  color: var(--accent-soft);
  font-weight: 700;
}

/* ============================================================
   TABS (ページ内タブ)
   ============================================================ */

.page-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.page-tab {
  padding: 6px 12px;
  border-radius: 18px;
  border: 1.5px solid var(--bg-border);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-muted);
  transition: all 0.12s;
  font-family: inherit;
}

.page-tab.active {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
  color: var(--accent-strong);
}

/* ============================================================
   SCROLLBAR（WebKit）
   ============================================================ */

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-border); border-radius: 2px; }

/* ============================================================
   UTILITIES
   ============================================================ */

.text-accent  { color: var(--accent-strong); }
.text-soft    { color: var(--accent-soft); }
.text-muted   { color: var(--text-muted); }
.text-ok      { color: var(--ok); }
.text-warn    { color: var(--warn); }
.text-bad     { color: var(--bad); }

.fw-bold { font-weight: 700; }
.fw-black { font-weight: 800; }

.mt-4  { margin-top: 4px; }
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }

.mb-4  { margin-bottom: 4px; }
.mb-8  { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }

.flex       { display: flex; }
.flex-col   { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-6  { gap: 6px; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.flex-1 { flex: 1; min-width: 0; }


</style>
</head>

<script>

// === config.js ===
// config.js
// 依存: なし
// 責務: アプリ全体の定数・教科・カラー・設定値の定義
// このファイルだけで対応できる修正: 教科の追加削除・色変更・定数調整
// ============================================================

const CFG = {

  // ----------------------------------------
  // アプリ情報
  // ----------------------------------------
  APP_NAME: 'Altair',
  APP_VERSION: '1.5',
  STORAGE_KEY: 'altair_v1',
  TIMER_KEY: 'altair_timer_v1',

  // ----------------------------------------
  // デフォルト教科
  // ユーザーが教科を追加・削除しても、
  // ここに定義された教科は常に存在する
  // ----------------------------------------
  DEFAULT_SUBJECTS: ['数学', '英語', '国語', '物理', '化学', '生物', '日本史', '世界史', '地理'],

  // 文理分類 (true=理系, false=文系)
  SUBJECT_SCIENCE: {
    '数学': true, '物理': true, '化学': true, '生物': true,
    '英語': false, '国語': false, '日本史': false, '世界史': false, '地理': false,
  },

  // ----------------------------------------
  // テスト種別
  // ----------------------------------------
  TEST_TYPES: ['定期試験', '模擬試験', '実力テスト', '小テスト', 'その他'],

  // ----------------------------------------
  // カラーパレット
  // アクセントカラーは #99d8ff（強）と #76c0ea（弱）の混在
  // ----------------------------------------
  COLORS: {
    // 背景系
    bgBase:       '#0d1117',   // アプリ背景
    bgCard:       '#161b22',   // カード背景
    bgCardDeep:   '#0d1f2d',   // 強調カード背景（今日の計画など）
    bgBorder:     '#21262d',   // ボーダー

    // アクセント
    accentStrong: '#99d8ff',   // テキスト・強調・タブ選択
    accentSoft:   '#76c0ea',   // グラフ塗り・バー・サブ要素
    accentBorder: 'rgba(153,216,255,0.25)',  // アクセントボーダー
    accentBg:     'rgba(153,216,255,0.08)', // アクセント背景

    // テキスト
    textPrimary:   '#ffffff',
    textSecondary: '#c9d1d9',
    textMuted:     '#8b949e',

    // ステータス
    ok:   '#3aaa72',
    warn: '#e09030',
    bad:  '#e24b4a',

    // ステータス背景
    okBg:   'rgba(58,170,114,0.12)',
    warnBg: 'rgba(224,144,48,0.12)',
    badBg:  'rgba(226,75,74,0.12)',
  },

  // ----------------------------------------
  // 教科カラー（グラフ・スキルツリーで使用）
  // 教科名をキーにした色定義
  // ----------------------------------------
  SUBJECT_COLORS: {
    '数学':   '#99d8ff',
    '英語':   '#76c0ea',
    '国語':   '#c084fc',
    '物理':   '#34d399',
    '化学':   '#fbbf24',
    '生物':   '#4ade80',
    '日本史': '#f87171',
    '世界史': '#fb923c',
    '地理':   '#a78bfa',
    // 追加教科はデフォルトカラーを使用
    '_default': '#8b949e',
  },

  // ----------------------------------------
  // タイマー設定
  // ----------------------------------------
  TIMER: {
    saveIntervalMs: 30000,   // 自動保存間隔（30秒）
    badgeCheckMs:   60000,   // 実績チェック間隔（60秒）
  },

  // ----------------------------------------
  // 計画エンジン設定
  // ----------------------------------------
  PLAN: {
    // 習熟度の重み（スキルツリーの完了率が低い教科を優先）
    skillWeight:    0.4,
    // テスト結果の重み（点数が低い教科を優先）
    testWeight:     0.3,
    // 直近学習の重み（最近やっていない教科を優先）
    recencyWeight:  0.3,
    // 1日の最小推奨時間（分）
    minDailyMinutes: 30,
    // 1教科あたりの最大推奨時間（分）
    maxSubjectMinutes: 180,
  },

  // ----------------------------------------
  // 週間目標のデフォルト値（時間）
  // 目標設定で変更可能
  // ----------------------------------------
  DEFAULT_WEEKLY_GOAL_HOURS: 35,

  // ----------------------------------------
  // カレンダー負荷レベルの色
  // ----------------------------------------
  LOAD_COLORS: {
    1: '#3aaa72',  // 軽い
    2: '#76c0ea',  // 普通
    3: '#e09030',  // やや重い
    4: '#e24b4a',  // 重い
    5: '#a855f7',  // 最大
  },

  // ----------------------------------------
  // 実績バッジのTier定義
  // ----------------------------------------
  BADGE_TIERS: {
    1: { label: 'Bronze', color: '#cd7f32' },
    2: { label: 'Silver', color: '#c0c0c0' },
    3: { label: 'Gold',   color: '#fbbf24' },
    4: { label: 'Plat',   color: '#99d8ff' },
    5: { label: '???',    color: '#a855f7' },  // 最高難易度
  },

};


// === store.js ===
// store.js
// 依存: config.js
// 責務: アプリ状態の定義・localStorage読み書き・データ管理
// このファイルだけで対応できる修正: データ保存系のバグ全般
// ============================================================

// ============================================================
// STATE — アプリ状態
// ============================================================

let S = {};

const STATE_DEFAULTS = {
  // 教科（ユーザー追加分）
  subjects: [],

  // カレンダー予定
  // { id, title, subj, date, load }
  events: [],

  // 学習セッション記録
  // { id, subj, dur, ts }  dur=ミリ秒, ts=タイムスタンプ
  sessions: [],

  // 暗記カード デッキ
  // { id, name, subj, cards: [{ id, q, a, correct, incorrect, lastReviewed }] }
  decks: [],

  // テスト記録
  // { id, name, date, type, subj, score, deviation }
  rounds: [],

  // スキルツリー
  // { '数学': [{ id, name, done, parentId }], ... }
  skills: {},

  // 実績
  earnedBadges: [],
  earnedDates: {},

  // 目標設定
  // { school, examDate, weeklyGoalHours }
  goal: null,

  // 学習計画
  // { date: 'YYYY-MM-DD', items: [{ subj, plannedMinutes, actualMinutes }] }
  plans: [],

  // 統計
  streak: 0,
  lastDate: '',
  todayMs: 0,
  todayMs_base: 0,
  weekMs: [0,0,0,0,0,0,0],

  // 設定
  settings: { bg: '' },
};

// ============================================================
// LOAD / SAVE — localStorage読み書き
// ============================================================

function loadState() {
  try {
    const raw = localStorage.getItem(CFG.STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      S = Object.assign({}, STATE_DEFAULTS, parsed);
    } else {
      S = Object.assign({}, STATE_DEFAULTS);
    }
  } catch(e) {
    S = Object.assign({}, STATE_DEFAULTS);
  }

// ============================================================
// HELPERS — データ操作ユーティリティ
// ============================================================

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function today() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function pad(n) {
  return String(n).padStart(2, '0');
}

function formatMs(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return h + ':' + pad(m) + ':' + pad(s);
}

function formatMsShort(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return m + '分';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function localDateStr(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function localMonthStr(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1);
}

function weekKeyOf(d) {
  const tmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = tmp.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  tmp.setDate(tmp.getDate() + diff);
  return localDateStr(tmp);
}

function sanitize(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getSubjectColor(subj) {
  return CFG.SUBJECT_COLORS[subj] || CFG.SUBJECT_COLORS['_default'];
}

function getAllSubjects() {
  const defaults = CFG.DEFAULT_SUBJECTS;
  const custom   = S.subjects || [];
  return defaults.concat(custom.filter(function(s) { return !defaults.includes(s); }));
}

// ============================================================
// STREAK — 連続学習日数の更新
// ============================================================

function updateStreak() {
  const todayStr = today();
  if (S.lastDate === todayStr) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = localDateStr(yesterday);

  if (S.lastDate === yesterdayStr) {
    S.streak = (S.streak || 0) + 1;
  } else if (S.lastDate !== todayStr) {
    S.streak = 1;
  }
  S.lastDate = todayStr;
  saveState();
}

// ============================================================
// SESSIONS — 学習時間の集計
// ============================================================

function getTodayMs() {
  const todayStr = today();
  return (S.sessions || []).reduce(function(sum, session) {
    const d = new Date(session.ts);
    if (localDateStr(d) === todayStr) return sum + (session.dur || 0);
    return sum;
  }, 0);
}

function getWeekMs() {
  const now = new Date();
  const weekStart = new Date(now);
  const dow = now.getDay();
  weekStart.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  weekStart.setHours(0,0,0,0);

  const result = [0,0,0,0,0,0,0];
  (S.sessions || []).forEach(function(session) {
    const d = new Date(session.ts);
    if (d >= weekStart) {
      const dayIndex = (d.getDay() + 6) % 7; // 月=0〜日=6
      result[dayIndex] += session.dur || 0;
    }
  });
  return result;
}

function getWeekTotalMs() {
  return getWeekMs().reduce(function(a,b) { return a+b; }, 0);
}

function getSessionsBySubject(sessions) {
  const map = {};
  (sessions || []).forEach(function(session) {
    const s = session.subj || '不明';
    map[s] = (map[s] || 0) + (session.dur || 0);
  });
  return map;
}

// ============================================================
// PLAN ENGINE — 今日の学習計画を自動生成
// ============================================================

function generateTodayPlan(availableMinutes) {
  const goal = S.goal;
  const weeklyGoalHours = goal ? (goal.weeklyGoalHours || CFG.DEFAULT_WEEKLY_GOAL_HOURS) : CFG.DEFAULT_WEEKLY_GOAL_HOURS;
  const weekGoalMs = weeklyGoalHours * 3600000;
  const weekDoneMs = getWeekTotalMs();

  // 週目標を既に達成している場合は自由学習モード（スコアのみで配分、時間は維持）
  const goalAchieved = weekDoneMs >= weekGoalMs;

  if (!availableMinutes) {
    if (goalAchieved) {
      // 目標達成済み → 苦手補強として1.5h推奨
      availableMinutes = 90;
    } else {
      const dow = (new Date().getDay() + 6) % 7; // 月=0
      const daysLeft = Math.max(1, 7 - dow);
      const remainMs = weekGoalMs - weekDoneMs;
      availableMinutes = Math.round(remainMs / daysLeft / 60000);
      availableMinutes = Math.max(30, Math.min(availableMinutes, 480));
    }
  }

  const subjects = getAllSubjects();
  if (subjects.length === 0) return [];

  const scores = {};
  subjects.forEach(function(subj) { scores[subj] = 0; });

  // 1. 直近学習スコア（recencyWeight=0.40）
  const now = Date.now();
  subjects.forEach(function(subj) {
    const subs = (S.sessions || []).filter(function(se) { return se.subj === subj; });
    if (!subs.length) {
      scores[subj] += CFG.PLAN.recencyWeight;
    } else {
      const lastTs = Math.max.apply(null, subs.map(function(se) { return se.ts; }));
      const daysSince = (now - lastTs) / 86400000;
      scores[subj] += CFG.PLAN.recencyWeight * Math.min(daysSince / 7, 1);
    }
  });

  // 2. 最新テスト結果 × 平均点との差（testWeight=0.35）
  // 全受験者平均が不明なため、全教科平均を「平均」として扱う
  subjects.forEach(function(subj) {
    const subjRounds = (S.rounds || []).filter(function(r) { return r.scores && r.scores[subj]; });
    if (!subjRounds.length) {
      scores[subj] += CFG.PLAN.testWeight * 0.6; // データなし→やや優先
    } else {
      // 最新1回の得点率
      const latest = subjRounds[subjRounds.length - 1];
      const sc = latest.scores[subj];
      const latestPct = sc.max > 0 ? sc.score / sc.max : 0.5;
      // 全教科の平均得点率
      let allTotal = 0, allCount = 0;
      (S.rounds || []).forEach(function(r) {
        Object.values(r.scores || {}).forEach(function(sc2) {
          if (sc2.max > 0) { allTotal += sc2.score / sc2.max; allCount++; }
        });
      });
      const overallAvg = allCount > 0 ? allTotal / allCount : 0.6;
      // 平均より低いほどスコア高（苦手優先）
      const gap = Math.max(0, overallAvg - latestPct);
      scores[subj] += CFG.PLAN.testWeight * (0.3 + gap * 1.4);
    }
  });

  // 3. スキル習熟度スコア（skillWeight=0.25）
  subjects.forEach(function(subj) {
    const skills = S.skills[subj] || [];
    if (!skills.length) {
      scores[subj] += CFG.PLAN.skillWeight * 0.5;
    } else {
      const done = skills.filter(function(sk) { return sk.done; }).length;
      scores[subj] += CFG.PLAN.skillWeight * (1 - done / skills.length);
    }
  });

  // スコア順ソート → 上位5教科
  const sorted = subjects.slice().sort(function(a, b) { return scores[b] - scores[a]; });
  const topN = Math.min(5, subjects.length);
  const topSubjects = sorted.slice(0, topN);

  const totalScore = topSubjects.reduce(function(sum, s) { return sum + scores[s]; }, 0);
  const plan = topSubjects.map(function(subj) {
    const ratio = totalScore > 0 ? scores[subj] / totalScore : 1 / topN;
    let minutes = Math.round(availableMinutes * ratio);
    minutes = Math.max(minutes, CFG.PLAN.minDailyMinutes);
    minutes = Math.min(minutes, CFG.PLAN.maxSubjectMinutes);
    return { subj: subj, plannedMinutes: minutes, actualMinutes: 0 };
  });

  return plan;
}

function getTodayPlan() {
  const todayStr = today();
  const existing = (S.plans || []).find(function(p) { return p.date === todayStr; });
  return existing || null;
}

function saveTodayPlan(plan) {
  const todayStr = today();
  S.plans = (S.plans || []).filter(function(p) { return p.date !== todayStr; });
  S.plans.push({ date: todayStr, items: plan });
  saveState();
}

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'altair_' + today() + '.json';
  a.click();
  showToast('エクスポート完了');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) {
        showToast('エラー：データ形式が不正です');
        return;
      }
      // 配列フィールドの型保証
      ['events','sessions','decks','rounds','subjects','earnedBadges','plans'].forEach(function(key) {
        if (parsed[key] !== undefined && !Array.isArray(parsed[key])) delete parsed[key];
      });
      // サニタイズ
      if (Array.isArray(parsed.events)) {
        parsed.events = parsed.events.map(function(ev) {
          return Object.assign({}, ev, { title: sanitize(ev.title || ''), subj: sanitize(ev.subj || '') });
        });
      }
      if (Array.isArray(parsed.decks)) {
        parsed.decks = parsed.decks.map(function(dk) {
          return Object.assign({}, dk, {
            name: sanitize(dk.name || ''),
            cards: Array.isArray(dk.cards) ? dk.cards.map(function(c) {
              return Object.assign({}, c, { q: sanitize(c.q || ''), a: sanitize(c.a || '') });
            }) : [],
          });
        });
      }
      S = Object.assign({}, S, parsed);
      CFG.DEFAULT_SUBJECTS.forEach(function(subj) {
        if (!S.skills[subj]) S.skills[subj] = [];
      });
      S.earnedBadges = S.earnedBadges || [];
      S.earnedDates  = S.earnedDates  || {};
      saveState();
      showToast('インポート完了');
      navigateTo('home');
    } catch(e) {
      showToast('エラー：ファイルが無効です');
    }
  };
  reader.readAsText(file);
}

// ============================================================
// 負荷値計算ユーティリティ
// 「負荷値1のタスクを1時間やる」= 負荷単位1
// 負荷値 × 時間(h) で統一指標を出す
// ============================================================

function calcDayLoad(ds) {
  // イベント負荷: load値 × 1h相当（タスク1件ごと）
  const evLoad = (S.events||[])
    .filter(e => e.date === ds)
    .reduce((a, e) => a + (e.load||1), 0);
  // セッション負荷: 時間(h) × デフォルト負荷1
  const sesLoad = (S.sessions||[])
    .filter(s => localDateStr(new Date(s.ts)) === ds)
    .reduce((a, s) => {
      // セッションの教科に紐づくその日のタスク平均負荷を使う
      const subj = s.subj;
      const relatedEvs = (S.events||[]).filter(e => e.date === ds && e.subj === subj);
      const avgLoad = relatedEvs.length
        ? relatedEvs.reduce((sum, e) => sum + (e.load||1), 0) / relatedEvs.length
        : 1;
      return a + avgLoad * (s.dur / 3600000);
    }, 0);
  return Math.round((evLoad + sesLoad) * 10) / 10;
}

function getWeekLoadByDay() {
  const now = new Date();
  const dow = now.getDay();
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  weekStart.setHours(0,0,0,0);
  const loads = [0,0,0,0,0,0,0];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const ds = localDateStr(d);
    loads[i] = calcDayLoad(ds);
  }
  return loads;
}

const PAGE_PARENT = {
  'timer':'study','calendar':'study','study-log':'study','flashcard':'study','flashcard-study':'study',
  'plan-engine':'study',
  'test-analysis':'grades','badges':'grades',
};

function navigateTo(page) {
  const noGuard=['settings','study-log','flashcard','flashcard-study','test-analysis','calendar'];
  if (currentPage===page && !noGuard.includes(page)) return;
  if (currentPage==='flashcard-study'&&page!=='flashcard-study') stopFlashcardTimer();
  currentPage = page;
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-page')===(PAGE_PARENT[page]||page));
  });
  const container = document.getElementById('main-content');
  if (!container) return;
  container.innerHTML = renderPage(page);
  container.scrollTop = 0;
  setTimeout(()=>postRender(page), 30);
}

function renderPage(page) {
  switch(page) {
    case 'home':            return renderHome();
    case 'study':           return renderStudyHub();
    case 'timer':           return renderTimer();
    case 'calendar':        return renderCalendar();
    case 'study-log':       return renderStudyLog();
    case 'flashcard':       return renderFlashcardHub();
    case 'flashcard-study': return renderFlashcardStudy();
    case 'skill':           return renderSkillHub();
    case 'plan-engine':     return renderPlanEngine();
    case 'grades':          return renderGradesHub();
    case 'test-analysis':   return renderTestAnalysis();
    case 'badges':          return renderBadges();
    case 'settings':        return renderSettings();
    default: return '';
  }
}

function postRender(page) {
  if (page==='calendar')      renderCalendarGrid();
  if (page==='study-log')     renderStudyLogCharts();
  if (page==='test-analysis') { renderTestChart(); setTimeout(animateTestBars,50); }
  if (page==='timer')         restoreTimer();
  if (page==='home')          { renderHomeWeekBar(); renderHomePieChart(); }
}

function renderHomeWeekBar() {
  const container=document.getElementById('home-week-bar'); if(!container)return;
  const weekLoad=getWeekLoadByDay();  // 負荷値配列（月〜日）
  const weekMs=getWeekMs();           // 時間配列（補助表示）
  const days=['月','火','水','木','金','土','日'];
  const todayDow=(new Date().getDay()+6)%7;
  const cid='wkbar'+(_trendCID++);
  container.innerHTML=`<canvas id="${cid}" style="width:100%;display:block"></canvas>
    <div style="display:flex;margin-top:6px">${days.map((d,i)=>`<div style="flex:1;text-align:center;font-size:9px;color:${i===todayDow?'var(--accent-strong)':i===6?'#76c0ea':i===5?'#e24b4a':'var(--text-muted)'}">${d}</div>`).join('')}</div>
    <div style="font-size:9px;color:var(--text-muted);margin-top:4px">負荷値 = タスク負荷 × 時間(h) の合計</div>`;
  requestAnimationFrame(()=>setTimeout(()=>{
    const cv=document.getElementById(cid);if(!cv)return;
    const dpr=window.devicePixelRatio||1,W=cv.parentElement.clientWidth||280,H=80;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
    const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    const maxLoad=Math.max(...weekLoad,0.1);
    const R=4,pd={t:R+4,r:R+4,b:R+2,l:R+4};
    const gW=W-pd.l-pd.r,gH=H-pd.t-pd.b;
    const xOf=i=>pd.l+(days.length>1?i/(days.length-1)*gW:gW/2);
    const yOf=v=>pd.t+gH*(1-v/maxLoad);
    const pts=weekLoad.map((v,i)=>({x:xOf(i),y:yOf(v),v,ms:weekMs[i]}));
    // グラデーション面
    const grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
    grad.addColorStop(0,'rgba(118,192,234,0.25)');grad.addColorStop(1,'rgba(118,192,234,0.0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,pd.t+gH);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));
    ctx.lineTo(pts[pts.length-1].x,pd.t+gH);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();
    // 折れ線
    ctx.beginPath();ctx.strokeStyle='#76c0ea';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    // ラベル（負荷値）
    pts.forEach((p,i)=>{
      if(p.v>0){
        ctx.font=`bold ${dpr>1?8:7}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
        ctx.fillStyle=i===todayDow?'#99d8ff':'#8b949e';
        ctx.fillText(p.v.toFixed(1),p.x,p.y-R-1);
      }
    });
    // 点
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(p.x,p.y,R,0,Math.PI*2);
      ctx.fillStyle=i===todayDow?'#99d8ff':'#76c0ea';ctx.fill();
      ctx.strokeStyle='#161b22';ctx.lineWidth=1.5;ctx.stroke();
    });
  },30));
}

function drawSpiderPieChart(cv, entries, tot, centerLabel) {
  const dpr=window.devicePixelRatio||1;
  const W=cv.parentElement.clientWidth||300;
  const H=Math.max(W*0.75, 200);
  cv.width=W*dpr; cv.height=H*dpr;
  cv.style.width=W+'px'; cv.style.height=H+'px';
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,W,H);

  const cx=W/2, cy=H/2;
  const R=Math.min(W,H)*0.3;
  const inner=R*0.52;
  const labelR=R*1.45;
  const lineR=R*1.08;

  const angles=[];
  let a=-Math.PI/2;
  entries.forEach(([subj,ms])=>{
    const sweep=(ms/tot)*Math.PI*2;
    angles.push({subj,ms,start:a,mid:a+sweep/2,end:a+sweep,sweep});
    a+=sweep;
  });

  angles.forEach(({subj,start,end})=>{
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,start,end);ctx.closePath();
    ctx.fillStyle=getSubjectColor(subj);ctx.fill();
    ctx.strokeStyle='#0d1117';ctx.lineWidth=1.5;ctx.stroke();
  });

  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#161b22';ctx.fill();
  const th=Math.floor(tot/3600000),tm=Math.floor((tot%3600000)/60000);
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='#fff';ctx.font=`bold 12px sans-serif`;ctx.fillText(`${th}h${pad(tm)}m`,cx,cy-6);
  ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.fillText(centerLabel,cx,cy+7);

  const labelSlots=angles.map(({subj,ms,mid})=>{
    const pct=Math.round(ms/tot*100);
    return {subj,ms,pct,mid,lx:cx+Math.cos(mid)*labelR,ly:cy+Math.sin(mid)*labelR,color:getSubjectColor(subj)};
  });

  const MIN_GAP=13;
  for(let iter=0;iter<30;iter++){
    let moved=false;
    for(let i=0;i<labelSlots.length;i++){
      for(let j=i+1;j<labelSlots.length;j++){
        const a2=labelSlots[i],b2=labelSlots[j];
        if(Math.sign(Math.cos(a2.mid))!==Math.sign(Math.cos(b2.mid)))continue;
        const dy=b2.ly-a2.ly;
        if(Math.abs(dy)<MIN_GAP){
          const push=(MIN_GAP-Math.abs(dy))/2+1;
          a2.ly-=push; b2.ly+=push; moved=true;
        }
      }
    }
    if(!moved)break;
  }

  labelSlots.forEach(({subj,ms,pct,mid,lx,ly,color})=>{
    const lx0=cx+Math.cos(mid)*lineR, ly0=cy+Math.sin(mid)*lineR;
    const isRight=lx>cx;
    const textX=isRight?lx+4:lx-4;
    ctx.beginPath();ctx.moveTo(cx+Math.cos(mid)*(R+1),cy+Math.sin(mid)*(R+1));
    ctx.lineTo(lx0,ly0);ctx.lineTo(lx,ly);
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.stroke();
    const h2=Math.floor(ms/3600000),m2=Math.floor((ms%3600000)/60000);
    const timeStr=h2>0?`${h2}h${m2>0?m2+'m':''}`:`${m2}m`;
    ctx.textAlign=isRight?'left':'right';ctx.textBaseline='middle';
    ctx.fillStyle=color;ctx.font=`bold 10px sans-serif`;
    ctx.fillText(sanitize(subj),textX,ly-5);
    ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';
    ctx.fillText(`${timeStr} ${pct}%`,textX,ly+5);
  });
}

function toggleEventDone(idx) {
  const ev=(S.events||[])[idx];if(!ev)return;
  ev.done=!ev.done;saveState();checkBadges();
  refreshHomeTaskList();
}

function calcRemainingDays(dateStr) {
  if(!dateStr)return 0;
  const now=new Date();now.setHours(0,0,0,0);
  return Math.max(0,Math.round((new Date(dateStr)-now)/86400000));
}

function calcTotalDays(dateStr) {
  if(!dateStr)return 365;
  const exam=new Date(dateStr),start=new Date(exam);
  start.setFullYear(start.getFullYear()-1);
  return Math.max(1,Math.round((exam-start)/86400000));
}

function formatMsShortSec(ms) {
  const totalSec=Math.floor(ms/1000);
  if(totalSec<60)return totalSec+'秒';
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60);
  if(h===0)return m+'分';
  if(m===0)return h+'h';
  return h+'h '+m+'m';
}

function renderPlanEngine() {
  const goal=S.goal;
  const dow=(new Date().getDay()+6)%7; // 月=0
  const weekTotal=getWeekTotalMs();
  const goalMs=(goal?.weeklyGoalHours||CFG.DEFAULT_WEEKLY_GOAL_HOURS)*3600000;
  const goalAchieved=weekTotal>=goalMs;
  const daysLeft=Math.max(1,7-dow);
  const remainMs=Math.max(0,goalMs-weekTotal);
  const weekPct=Math.min(Math.round(weekTotal/goalMs*100),100);
  const daysLabel=['月','火','水','木','金','土','日'][dow];

  // 今日の残り目標時間（今日すでに勉強した分を引く）
  const todayDone=getTodayMs();
  let recDailyMinutes;
  if(goalAchieved){
    recDailyMinutes=0; // 達成済みは推奨なし
  } else {
    // 残り目標 ÷ 残り日数 - 今日の勉強済み分
    const dailyTargetMs=remainMs/daysLeft;
    const todayRemMs=Math.max(0,dailyTargetMs-todayDone);
    recDailyMinutes=Math.round(todayRemMs/60000);
    recDailyMinutes=Math.min(recDailyMinutes,480); // 最大8h
  }

  const plan=generateTodayPlan(Math.max(recDailyMinutes,goalAchieved?0:30));

  const planHtml=plan.map(item=>{

      <div style="font-weight:700;color:${color};font-size:15px">${item.plannedMinutes}分</div>

  const todayLoad=calcDayLoad(today());

  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">

      <span>実績: ${formatMsShort(weekTotal)}</span>
      ${goalAchieved
        ? `<span style="color:var(--ok);font-weight:700">✓ 週目標達成！</span>`
        : `<span style="color:var(--accent-strong)">残り ${formatMsShort(remainMs)} (${weekPct}%)</span>`
      }
    </div>
    <div class="bar-track" style="height:8px">
      <div class="bar-fill" style="width:${weekPct}%;background:${weekPct>=100?'var(--ok)':'var(--accent-strong)'}"></div>
    </div>
    <div class="flex justify-between" style="font-size:10px;color:var(--text-muted);margin-top:6px">
      <span>今日の累積負荷: <b style="color:${todayLoadColor}">${todayLoad.toFixed(1)}</b></span>
      <span>${goalAchieved?'苦手強化モード':`残り${daysLeft}日で配分`}</span>

    <div class="section-label">
      ${goalAchieved?'苦手強化おすすめ配分':

function checkForUpdate() {
  if(!navigator.onLine)return;
  fetch(location.href.split('?')[0]+'?_cb='+Date.now(),{cache:'no-store'})
    .then(r=>r.text()).then(html=>{

function renderTimer() {

    <div style="font-size:12px;color:var(--text-muted);margin-top:4px" id="tslbl" style="color:${getSubjectColor(tSubj)}">${tSubj||'教科を選択'}</div>

      <button onclick="toggleT()" id="tbtn" style="width:72px;height:72px;border-radius:50%;border:none;font-size:28px;cursor:pointer;background:${btnBg};color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(76,168,216,.3);transition:background .2s">${btnIcon}</button>

    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:6px">${tRun?'タップで停止・記録':'タップで開始'}</div>
  </div>`;
}

function selTS(el, s) {
  tSubj = s; timerSubject = s;
  const sc = getSubjectColor(s);
  document.querySelectorAll('#tchips .chip').forEach(c=>{
    c.classList.toggle('active',c===el);
    if(c===el){c.style.borderColor=sc;c.style.color=sc;}
    else{c.style.borderColor='';c.style.color='';}
  });
  const lbl=document.getElementById('tslbl');
  if(lbl){lbl.textContent=s;lbl.style.color=sc;}
}

function toggleT() {
  if (tRun) {
    tRun=false;
    clearInterval(tIv);tIv=null;
    const elapsed=Date.now()-tStart;
    if (elapsed>4000) {
      recordSession(tSubj, elapsed);
    } else {
      tStart=0;
      const disp=document.getElementById('tdisp');
      if(disp){disp.textContent='0:00:00';disp.className='timer-display';}
    }
    try{localStorage.removeItem(CFG.TIMER_KEY);}catch(e){}
  } else {
    if (!tSubj) { showToast('教科を選択してください'); return; }
    if (tStart===0) tStart=Date.now();
    S.todayMs_base=getTodayMs();
    tRun=true;
    clearInterval(tIv);
    tIv=setInterval(tickT,500);
    try{localStorage.setItem(CFG.TIMER_KEY,JSON.stringify({ts:tStart,subj:tSubj}));}catch(e){}
  }
  const btn=document.getElementById('tbtn');
  if(btn){btn.innerHTML=tRun?'&#9646;&#9646;':'&#9654;';btn.style.background=tRun?'var(--warn)':'var(--accent-soft)';}
  const disp=document.getElementById('tdisp');
  if(disp)disp.className='timer-display '+(tRun?'running':tStart>0?'paused':'');
  updateStartLabel();
}

function tickT() {
  const elapsed=tStart>0?Date.now()-tStart:0;
  const d=document.getElementById('tdisp');if(d)d.textContent=formatMs(elapsed);
  const base=getTodayMs();
  const el=document.getElementById('t-today-disp');
  if(el)el.textContent=formatMs(base+elapsed);
}

function updateStartLabel() {
  const disp=document.getElementById('tdisp');if(!disp)return;
  const old=document.getElementById('t-start-label');if(old)old.remove();
  if(tStart>0){
    const st=new Date(tStart);
    const lbl=document.createElement('div');lbl.id='t-start-label';
    lbl.style.cssText='font-size:12px;color:var(--text-muted);margin-top:4px;text-align:center';
    lbl.textContent='開始: '+pad(st.getHours())+':'+pad(st.getMinutes())+':'+pad(st.getSeconds());
    disp.parentNode.insertBefore(lbl,disp.nextSibling);
  }
}

function recordSession(subj, dur) {
  if(!subj||dur<=0)return;
  S.sessions=S.sessions||[];
  S.sessions.push({id:generateId(),subj,dur,ts:tStart||Date.now()-dur});
  updateTodayPlanActual(subj,dur);
  updateStreak();
  tStart=0;saveState();checkBadges();
  const disp=document.getElementById('tdisp');
  if(disp){disp.textContent='0:00:00';disp.className='timer-display';}
  const btn=document.getElementById('tbtn');
  if(btn){btn.innerHTML='&#9654;';btn.style.background='var(--accent-soft)';}
  const lbl=document.getElementById('t-start-label');if(lbl)lbl.remove();
  showToast(`${formatMs(dur)} 記録しました`);
  navigateTo('timer');
}

function restoreTimer() {
  try{
    const stored=localStorage.getItem(CFG.TIMER_KEY);if(!stored)return;
    const obj=JSON.parse(stored);
    const ts=obj.ts,subj=obj.subj;
    const elapsed=Date.now()-ts;if(elapsed<=0)return;
    tStart=ts;tSubj=subj||tSubj;timerSubject=tSubj;
    tRun=true;S.todayMs_base=S.todayMs||0;
    clearInterval(tIv);tIv=setInterval(tickT,500);
    const disp=document.getElementById('tdisp');
    if(disp){disp.textContent=formatMs(elapsed);disp.className='timer-display running';}
    const btn=document.getElementById('tbtn');
    if(btn){btn.innerHTML='&#9646;&#9646;';btn.style.background='var(--warn)';}
    showToast('タイマーを復元して再開中（'+formatMs(elapsed)+'経過）— タップで停止して記録');
  }catch(e){}
}

function isJapaneseHoliday(year,month,day) {
  const m=month+1;
  const fixed={
    '1-1':1,'1-2':1,'1-3':1,
    '2-11':1,'2-23':1,
    '4-29':1,
    '5-3':1,'5-4':1,'5-5':1,
    '7-15':1,
    '8-11':1,
    '9-15':1,
    '10-14':1,
    '11-3':1,'11-23':1,
  };
  if(fixed[`${m}-${day}`])return true;
  if(m===3&&(day===20||day===21))return true;
  if(m===9&&(day===22||day===23))return true;
  return false;
}

function calcLoad(ds){
  const evLoad=(S.events||[]).filter(e=>e.date===ds).reduce((a,e)=>a+(e.load||1),0);
  const sesLoad=Math.round((S.sessions||[]).filter(s=>localDateStr(new Date(s.ts))===ds).reduce((a,s)=>a+s.dur,0)/900000);
  return evLoad+sesLoad;
}

function calNav(delta) {
  _calAnimDir=delta;
  const grid=document.getElementById('calendar-grid');
  if(grid){
    grid.style.transform=`translateX(${delta>0?'-':'+'}30px)`;
    grid.style.opacity='0';
  }
  setTimeout(()=>{
    currentCalDate=new Date(currentCalDate.getFullYear(),currentCalDate.getMonth()+delta,1);
    navigateTo('calendar');
  },180);
}

function renderCalendarGrid() {
  const grid=document.getElementById('calendar-grid');if(!grid)return;
  const year=currentCalDate.getFullYear(),month=currentCalDate.getMonth();
  const todayStr=today(),daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay();

  // アニメーション開始
  grid.style.transform=`translateX(${_calAnimDir>0?'30px':_calAnimDir<0?'-30px':'0'})`;
  grid.style.opacity=_calAnimDir!==0?'0':'1';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    grid.style.transition='transform 0.28s cubic-bezier(.4,0,.2,1),opacity 0.28s';
    grid.style.transform='translateX(0)';
    grid.style.opacity='1';
    _calAnimDir=0;
  }));

  let html='';
  for(let i=0;i<firstDow;i++){
    const d=new Date(year,month,-firstDow+i+1);
    html+=`<div style="min-height:46px;border-radius:6px;opacity:0.3;padding:3px 2px"><span style="font-size:12px;font-weight:700">${d.getDate()}</span></div>`;
  }

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${pad(month+1)}-${pad(d)}`;
    const isToday=ds===todayStr,isSel=ds===selectedCalDate;
    const dow=new Date(year,month,d).getDay(); // 0=日,6=土
    const isSun=dow===0, isSat=dow===6;
    const isHoliday=isJapaneseHoliday(year,month,d);
    const evs=(S.events||[]).filter(e=>e.date===ds);
    const sessMs=(S.sessions||[]).filter(s=>s.dur>0&&localDateStr(new Date(s.ts))===ds).reduce((a,s)=>a+s.dur,0);
    const load=calcLoad(ds),incomplete=evs.filter(e=>!e.done).length;

    let bg='',border='',textColor='var(--text-secondary)';
    if(isToday){bg='background:var(--accent-strong);';textColor='#0d1117';}
    else if(isSel){border='border:1.5px solid var(--accent-soft);background:var(--accent-bg)';textColor='var(--accent-strong)';}
    else if(isSun||isHoliday)textColor='#e87070';
    else if(isSat)textColor='#76c0ea';

    const mini=[];
    if(sessMs>0){
      const hh=Math.floor(sessMs/3600000),mm=Math.floor((sessMs%3600000)/60000);
      mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':'var(--accent-soft)'}">${hh>0?hh+'h':''}${mm}m</div>`);
    }
    if(load>0)mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':load>=8?'var(--bad)':load>=4?'var(--warn)':'var(--ok)'}">負${load}</div>`);
    if(incomplete>0)mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':'var(--warn)'}">□${incomplete}</div>`);

    html+=`<div onclick="selectCalDate('${ds}')" style="min-height:46px;border-radius:6px;padding:3px 2px;cursor:pointer;${bg}${border?border+';':''}color:${textColor}">
      <div style="font-size:12px;font-weight:700">${d}</div>
      ${mini.join('')}
    </div>`;
  }
  grid.innerHTML=html;
}

function renderStudyLogCharts(){
  const container=document.getElementById('study-log-content');if(!container)return;
  if(studyLogTab==='trend'){renderTrendTab(container);return;}

  const sessions=S.sessions||[];
  const groups={};
  sessions.forEach(s=>{
    if(!s.dur||s.dur<=0)return;
    const d=new Date(s.ts);
    let key;
    if(studyLogTab==='day')key=localDateStr(d);
    else if(studyLogTab==='week')key=weekKeyOf(d);
    else if(studyLogTab==='month')key=localMonthStr(d);
    else key=String(d.getFullYear());
    if(!groups[key])groups[key]={total:0,subj:{}};
    groups[key].total+=s.dur;
    groups[key].subj[s.subj]=(groups[key].subj[s.subj]||0)+s.dur;
  });

  const now=new Date(),allowed=new Set();
  if(studyLogTab==='day'){
    allowed.add(localDateStr(now));
    const yd=new Date(now);yd.setDate(yd.getDate()-1);allowed.add(localDateStr(yd));
  }else if(studyLogTab==='week'){
    allowed.add(weekKeyOf(now));
    const lw=new Date(now);lw.setDate(lw.getDate()-7);allowed.add(weekKeyOf(lw));
  }else if(studyLogTab==='month'){
    allowed.add(localMonthStr(now));
    const lm=new Date(now.getFullYear(),now.getMonth()-1,1);allowed.add(localMonthStr(lm));
  }else{allowed.add(String(now.getFullYear()));allowed.add(String(now.getFullYear()-1));}

  const keys=Object.keys(groups).filter(k=>allowed.has(k)).sort().reverse();
  if(!keys.length){
    container.innerHTML='<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px">記録がありません</div>';return;
  }

  const totalAll=keys.reduce((a,k)=>a+groups[k].total,0);
  const avgMs=keys.length?Math.round(totalAll/keys.length):0;
  const unitLabel={day:'日数',week:'週数',month:'月数',year:'年数'}[studyLogTab];

  const summaryHtml=`<div class="card"><div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="font-size:16px">${formatMsShort(totalAll)}</div><div class="stat-lbl">合計</div></div>
    <div class="stat-card"><div class="stat-val">${keys.length}</div><div class="stat-lbl">${unitLabel}</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:16px">${keys.length?formatMsShort(avgMs):'−'}</div><div class="stat-lbl">平均</div></div>
  </div></div>`;

    (function(cid,entries,tot,k){
      requestAnimationFrame(()=>setTimeout(()=>{

// トレンド分析タブ
function renderTrendTab(container) {
  const sessions=S.sessions||[];
  if(!sessions.length){
    container.innerHTML='<div style="text-align:center;padding:32px;color:var(--text-muted)">記録がありません</div>';return;
  }

  // 日別集計
  const byDay={};
  sessions.forEach(s=>{
    if(!s.dur||s.dur<=0)return;
    const k=localDateStr(new Date(s.ts));
    byDay[k]=(byDay[k]||0)+s.dur;
  });
  const dayKeys=Object.keys(byDay).sort();
  const dayVals=dayKeys.map(k=>byDay[k]);
  const avgMs=dayVals.length?Math.round(dayVals.reduce((a,b)=>a+b,0)/dayVals.length):0;

  // 直近7日と前7日で傾向判定
  const recent7=dayKeys.slice(-7).map(k=>byDay[k]);
  const prev7=dayKeys.slice(-14,-7).map(k=>byDay[k]);
  const recentAvg=recent7.length?recent7.reduce((a,b)=>a+b,0)/recent7.length:0;
  const prevAvg=prev7.length?prev7.reduce((a,b)=>a+b,0)/prev7.length:0;
  const trendDiff=recentAvg-prevAvg;
  const trendIcon=trendDiff>3600000?'📈':trendDiff<-3600000?'📉':'➡️';
  const trendText=trendDiff>3600000?'上昇傾向':trendDiff<-3600000?'下降傾向':'横ばい';
  const trendColor=trendDiff>3600000?'var(--ok)':trendDiff<-3600000?'var(--bad)':'var(--text-muted)';

  // 教科別集計
  const bySubj={};
  sessions.forEach(s=>{if(s.dur>0)bySubj[s.subj]=(bySubj[s.subj]||0)+s.dur;});
  const subjEntries=Object.entries(bySubj).sort((a,b)=>b[1]-a[1]);
  const topSubj=subjEntries[0],botSubj=subjEntries[subjEntries.length-1];

  // 最長勉強日
  const maxDay=dayKeys.reduce((best,k)=>byDay[k]>byDay[best]?k:best,dayKeys[0]);

  // 移動平均グラフ用データ
  const MA7=dayKeys.map((_,i)=>{
    const sl=dayVals.slice(Math.max(0,i-6),i+1);
    return sl.reduce((a,b)=>a+b,0)/sl.length;
  });

  const cid='trend-chart'+(_trendCID++);
  const pieCid='trend-pie'+(_trendCID++);
  const totSubj=Object.values(bySubj).reduce((a,b)=>a+b,0)||1;

  // 直近14日分 折れ線グラフ
  const recentKeys=dayKeys.slice(-14);
  const recentVals=recentKeys.map(k=>byDay[k]);

  setTimeout(()=>{
    // 折れ線グラフ（直近14日・画面内に収める）
    const cv=document.getElementById(cid);if(!cv)return;
    const dpr=window.devicePixelRatio||1,W=cv.parentElement.clientWidth||300,H=120;
    cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
    const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
    ctx.fillStyle='#161b22';ctx.fillRect(0,0,W,H);
    // padding: t=値ラベル用, b=x軸ラベル用, l=y軸ラベル用, r=右マージン
    const pd={t:16,r:10,b:22,l:34};
    const gW=W-pd.l-pd.r,gH=H-pd.t-pd.b;
    const maxV=Math.max(...recentVals,1);
    const n=recentVals.length;
    const xOf=i=>Math.round(pd.l+(n>1?i/(n-1)*gW:gW/2));
    const yOf=v=>Math.round(pd.t+gH*(1-v/maxV));
    const pts=recentVals.map((v,i)=>({x:xOf(i),y:yOf(v),v}));

    // y軸グリッド（0, 最大の半分, 最大）
    const ySteps=[0, maxV/2, maxV];
    ySteps.forEach(v=>{
      const y=yOf(v);
      ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(W-pd.r,y);ctx.stroke();
      const h=Math.floor(v/3600000),m2=Math.floor((v%3600000)/60000);
      const lbl=v===0?'0':h>0?h+'h':m2+'m';
      ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillText(lbl,pd.l-3,y);
    });

    // 平均線
    const clampedAvg=Math.min(avgMs,maxV);
    const avgY=yOf(clampedAvg);
    ctx.setLineDash([4,3]);ctx.strokeStyle='rgba(153,216,255,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(pd.l,avgY);ctx.lineTo(W-pd.r,avgY);ctx.stroke();
    ctx.setLineDash([]);

    // グラデーション塗り
    const grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
    grad.addColorStop(0,'rgba(118,192,234,0.2)');grad.addColorStop(1,'rgba(118,192,234,0)');
    ctx.beginPath();ctx.moveTo(pts[0].x,pd.t+gH);
    pts.forEach(p=>ctx.lineTo(p.x,Math.min(p.y,pd.t+gH)));
    ctx.lineTo(pts[pts.length-1].x,pd.t+gH);ctx.closePath();
    ctx.fillStyle=grad;ctx.fill();

    // 折れ線
    ctx.beginPath();ctx.strokeStyle='#76c0ea';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();

    // 点＋ラベル（値がある点のみ、labelをgraph内に収める）
    pts.forEach((p,i)=>{
      ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);
      ctx.fillStyle=i===pts.length-1?'#99d8ff':'#76c0ea';ctx.fill();
      if(p.v>0){
        const h=Math.floor(p.v/3600000),m2=Math.floor((p.v%3600000)/60000);
        const lbl=h>0?`${h}h${m2?m2+'m':''}`:m2+'m';
        ctx.font=`bold 7px sans-serif`;ctx.textAlign='center';
        // ラベルをy上側に置く。y-13が0より小さければ下側に
        const lblY=p.y-10<pd.t+4?p.y+10:p.y-4;
        ctx.textBaseline=p.y-10<pd.t+4?'top':'bottom';
        ctx.fillStyle=i===pts.length-1?'#99d8ff':'#8b949e';
        ctx.fillText(lbl,p.x,lblY);
      }
    });

    // x軸ラベル（最初・真ん中・最後）をgraph底部に固定
    const xAxisY=pd.t+gH+4; // グラフ底辺+余白
    ctx.textBaseline='top';ctx.fillStyle='#8b949e';ctx.font='7px sans-serif';
    if(recentKeys.length>0){
      ctx.textAlign='left';ctx.fillText(recentKeys[0].slice(5),pd.l,xAxisY);
      if(recentKeys.length>1){
        const mi=Math.floor((recentKeys.length-1)/2);
        ctx.textAlign='center';ctx.fillText(recentKeys[mi].slice(5),xOf(mi),xAxisY);
        ctx.textAlign='right';ctx.fillText(recentKeys[recentKeys.length-1].slice(5),W-pd.r,xAxisY);
      }
    }

    // 放射状円グラフ（全教科累計）
    const cv2=document.getElementById(pieCid);if(!cv2)return;
    drawSpiderPieChart(cv2,subjEntries,totSubj,'累計');
  },50);

  container.innerHTML=`
  <div class="card">
    <div class="section-label">直近傾向</div>
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <div style="flex:1;min-width:70px;background:var(--bg-base);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--bg-border)">
        <div style="font-size:16px">${trendIcon}</div>
        <div style="font-size:12px;font-weight:800;color:${trendColor}">${trendText}</div>
        <div style="font-size:9px;color:var(--text-muted)">直近7日 vs 前7日</div>
      </div>
      <div style="flex:1;min-width:70px;background:var(--bg-base);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--bg-border)">
        <div style="font-size:12px;font-weight:800;color:var(--accent-strong)">${formatMsShort(avgMs)}</div>
        <div style="font-size:9px;color:var(--text-muted)">日平均</div>
      </div>
      <div style="flex:1;min-width:70px;background:var(--bg-base);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--bg-border)">
        <div style="font-size:12px;font-weight:800;color:var(--accent-soft)">${dayKeys.length}日</div>
        <div style="font-size:9px;color:var(--text-muted)">記録日数</div>
      </div>
      ${maxDay?`<div style="flex:1;min-width:70px;background:var(--bg-base);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--bg-border)">
        <div style="font-size:11px;font-weight:800;color:var(--accent-strong)">${formatMsShort(byDay[maxDay])}</div>
        <div style="font-size:9px;color:var(--text-muted)">最長 ${maxDay.slice(5)}</div>
      </div>`:''}
    </div>
    <canvas id="${cid}" style="width:100%;display:block"></canvas>
    <div style="font-size:9px;color:var(--text-muted);margin-top:3px">直近14日の学習時間（-- 全体平均）</div>
  </div>

  <div class="card">
    <div class="section-label">全教科の累計時間</div>
    ${topSubj?`<div style="display:flex;gap:12px;margin-bottom:8px">
      <span style="font-size:11px;color:var(--text-muted)">🏆 最多: <b style="color:${getSubjectColor(topSubj[0])}">${sanitize(topSubj[0])}</b> ${formatMsShort(topSubj[1])}</span>
      ${botSubj&&botSubj[0]!==topSubj?.[0]?`<span style="font-size:11px;color:var(--text-muted)">📌 最少: <b style="color:${getSubjectColor(botSubj[0])}">${sanitize(botSubj[0])}</b> ${formatMsShort(botSubj[1])}</span>`:''}
    </div>`:''}
    <canvas id="${pieCid}" style="width:100%;display:block"></canvas>
  </div>`;
}

function fmtLogKey(k){
  if(studyLogTab==='day'){const p=k.split('-');return `${p[0]}年${+p[1]}月${+p[2]}日`;}
  if(studyLogTab==='week'){const ws=new Date(k+'T00:00:00'),we=new Date(ws);we.setDate(ws.getDate()+6);return `${ws.getMonth()+1}/${ws.getDate()}〜${we.getMonth()+1}/${we.getDate()}`;}
  if(studyLogTab==='month'){const p=k.split('-');return `${p[0]}年${+p[1]}月`;}
  return k+'年';
}

function isDue(c) {
  if (!c.lastReview) return true;
  const t  = (Date.now() - c.lastReview) / 86400000;
  const st = c.stability || 1;
  return Math.exp(-t / st) < 0.7;
}

function isNew(c) { return !c.reps || c.reps === 0; }

function buildFCQueue(cards) {
  let arr;
  if      (fcStudyMode === 'rec') arr = cards.filter(isDue);
  else if (fcStudyMode === 'new') arr = cards.filter(isNew);
  else                            arr = [...cards];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderFlashcardSetup(deck, all) {

  const modesHtml = modes.map(m => `<button class="btn ${fcStudyMode===m.k?'btn-primary':'btn-secondary'}"
    onclick="fcStudyMode='${m.k}';navigateTo('flashcard-study')"

function startStudySession() {
  const deck = (S.decks||[])[currentDeckIndex];
  if (!deck) return;
  fcQueue = buildFCQueue(deck.cards || []);
  fcQueueIndex = 0;
  fcFlipped = false;
  if (!fcQueue.length) { showToast('このモードにカードがありません'); return; }
  fcTimerStart   = Date.now();
  fcTimerSubject = deck.subj || timerSubject || getAllSubjects()[0] || '';
  navigateTo('flashcard-study');
}

function backToFlashcardSetup() {
  stopFlashcardTimer();
  fcQueue = []; fcQueueIndex = 0; fcFlipped = false;
  navigateTo('flashcard-study');
}

function restartFlashcardSession() {
  fcQueueIndex = 0; fcFlipped = false;
  const deck = (S.decks||[])[currentDeckIndex];
  if (deck) {
    fcQueue = buildFCQueue(deck.cards || []);
    fcTimerStart   = Date.now();
    fcTimerSubject = deck.subj || '';
  }
  navigateTo('flashcard-study');
}

function flipCard() {
  if (fcFlipped) return;
  const el = document.getElementById('fc-card');
  if (el) el.classList.add('flipped');
  const ans = document.getElementById('fc-answer-btns');
  if (ans) ans.style.display = 'flex';
  fcFlipped = true;
}

function rateCard(result) {
  if (fcQueueIndex >= fcQueue.length) return;
  const card = fcQueue[fcQueueIndex];
  const deck = (S.decks||[])[currentDeckIndex];
  if (!deck) return;
  const real = (deck.cards||[]).find(c => c.id === card.id);

  if (real && result !== 'skip') {
    real.reps       = (real.reps || 0) + 1;
    real.lastReview = Date.now();
    let st = real.stability || 1;
    if (result === 'ok') st = st * (1.8 + 0.1 * (real.reps||1));
    else                 st = Math.max(1, st * 0.3);
    real.stability = Math.min(st, 365);
    real.status    = result;
    const nd = new Date(); nd.setDate(nd.getDate() + Math.round(real.stability));
    real.dueDate = localDateStr(nd);
  }

  fcQueueIndex++;
  fcFlipped = false;
  saveState(); checkBadges();
  navigateTo('flashcard-study');
}

function stopFlashcardTimer() {
  if (fcTimerStart <= 0) return;
  const dur  = Date.now() - fcTimerStart;
  const subj = fcTimerSubject;
  fcTimerStart = 0; fcTimerSubject = '';
  if (dur >= 4000 && subj && currentDeckIndex >= 0) {
    S.sessions = S.sessions || [];
    S.sessions.push({ id: generateId(), subj, dur, ts: Date.now() - dur });
    updateStreak(); saveState();
    showToast(`${formatMsShort(dur)} 暗記カード記録`);
  }
}
