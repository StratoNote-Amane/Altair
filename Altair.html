function renderSkillTree(subj) {
  subj = subj || currentSkillSubject;
  const titleEl = document.getElementById('sk-map-title');
  const countEl = document.getElementById('sk-map-count');
  if (titleEl) titleEl.textContent = subj;
  const skills = S.skills[subj] || [];
  const done   = skills.filter(s => s.done).length;
  if (countEl) countEl.textContent = `解除 ${done}/${skills.length}`;

  const wrap = document.getElementById('sk-map-svg-wrap');
  if (!wrap) return;

  if (!skills.length) {
    wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px">スキルを追加してください</div>';
    return;
  }

  const NW = 130, NH = 38, hGap = 36, vGap = 64;
  const MARGIN = 14;
  const color  = getSubjectColor(subj);
  // 追加ボタンの色：教科色と被らない白系固定
  const addBtnColor = '#c9d1d9';

  const im = {};
  skills.forEach(sk => im[sk.id] = sk);

  // 祖先チェーンの完了確認（ロック判定）
  function isLocked(id) {
    let cur = im[id];
    if (!cur || !cur.parentId) return false;
    const parent = im[cur.parentId];
    if (!parent) return false;
    if (!parent.done) return true;
    return isLocked(cur.parentId);
  }

  const roots = skills.filter(sk => !sk.parentId);
  const pos   = {};

  let colIdx = 0;
  function calcPos(sk, depth) {
    const children = skills.filter(s => s.parentId === sk.id);
    if (!children.length) {
      pos[sk.id] = { x: MARGIN + colIdx * (NW + hGap), y: 20 + depth * (NH + vGap) };
      colIdx++;
    } else {
      children.forEach(c => calcPos(c, depth + 1));
      const xs = children.map(c => pos[c.id].x);
      pos[sk.id] = { x: (Math.min(...xs) + Math.max(...xs) + NW) / 2 - NW/2, y: 20 + depth * (NH + vGap) };
    }
  }
  roots.forEach(r => calcPos(r, 0));

  // 重なり防止
  function resolveOverlaps() {
    const keys = Object.keys(pos);
    let changed = true, iter = 0;
    while (changed && iter < 20) {
      changed = false; iter++;
      for (let i = 0; i < keys.length; i++) {
        for (let j = i+1; j < keys.length; j++) {
          const a = pos[keys[i]], b = pos[keys[j]];
          if (!a || !b) continue;
          const dx = Math.abs(a.x - b.x), dy = Math.abs(a.y - b.y);
          if (dx < NW + hGap/2 && dy < NH + vGap/2) {
            const pushX = (NW + hGap/2 - dx) / 2 + 2;
            if (a.x <= b.x) { a.x -= pushX; b.x += pushX; }
            else             { a.x += pushX; b.x -= pushX; }
            a.x = Math.max(MARGIN, a.x); b.x = Math.max(MARGIN, b.x);
            changed = true;
          }
        }
      }
    }
  }
  resolveOverlaps();

  // 手動位置を適用
  skills.forEach(sk => {
    if (sk.manualX !== undefined) pos[sk.id] = { x: sk.manualX, y: sk.manualY };
  });

  const maxX = Math.max(...Object.values(pos).map(p => p.x)) + NW + 30;
  const maxY = Math.max(...Object.values(pos).map(p => p.y)) + NH + 30;

  let linesSvg = '', nodesSvg = '';

  skills.forEach(sk => {
    if (!sk.parentId || !pos[sk.id] || !pos[sk.parentId]) return;
    const pp = pos[sk.parentId];
    const cp = pos[sk.id];
    const x1 = pp.x + NW/2, y1 = pp.y + NH, x2 = cp.x + NW/2, y2 = cp.y;
    const midy = (y1 + y2) / 2;
    const locked = isLocked(sk.id);
    const isDoneConn = sk.done && im[sk.parentId]?.done;
    linesSvg += `<path d="M${x1},${y1} C${x1},${midy} ${x2},${midy} ${x2},${y2}"
      fill="none" stroke="${isDoneConn ? color : locked ? '#444' : '#2d333b'}" stroke-width="${isDoneConn?2:1.5}"
      ${locked ? 'stroke-dasharray="3,4"' : !isDoneConn ? 'stroke-dasharray="5,4"' : ''} opacity="${locked?0.4:1}"/>`;
  });

  skills.forEach(sk => {
    const p = pos[sk.id]; if (!p) return;
    const x = p.x, y = p.y;
    const locked = isLocked(sk.id);
    const fillC  = locked ? '#1a1f26' : sk.done ? color : '#21262d';
    const textC  = locked ? '#555' : sk.done ? '#0d1117' : '#8b949e';
    const strokeC= locked ? '#333' : sk.done ? color : '#2d333b';
    const label  = sanitize(sk.name).slice(0, 14);
    const lockIcon = locked ? `<text x="${x+NW/2-32}" y="${y+NH/2+1}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#555" pointer-events="none">🔒</text>` : '';

    nodesSvg += `<g data-drag="1" data-id="${sk.id}" style="cursor:${locked?'not-allowed':'pointer'}" ${locked?'data-locked="1"':''}>
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="8" fill="${fillC}" stroke="${strokeC}" stroke-width="1.5"/>
      ${lockIcon}
      <text x="${x+NW/2+(locked?8:0)}" y="${y+NH/2+1}" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="${textC}" font-family="sans-serif" pointer-events="none">${label}</text>
      <text x="${x+NW-6}" y="${y+8}" text-anchor="end" dominant-baseline="hanging" font-size="14" fill="#8b949e" style="cursor:pointer"
        onclick="deleteSkillNode('${sk.id}')">✕</text>
      <text x="${x+NW-6}" y="${y+NH-6}" text-anchor="end" dominant-baseline="auto" font-size="14" fill="${addBtnColor}" style="cursor:pointer;font-weight:900"
        onclick="addSkillNode('${sk.id}')">＋</text>
    </g>`;
  });

  const svgW = Math.max(maxX, 300);
  const svgH = Math.max(maxY, 200);

  wrap.innerHTML = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}"
    style="display:block;min-width:${svgW}px;min-height:${svgH}px">
    ${linesSvg}${nodesSvg}
  </svg>`;

  // ズームスタイルを再適用
  const m=(wrap.style.transform||'').match(/translate\((-?[\d.]+)px,\s*(-?[\d.]+)px\)/);
  const px=m?parseFloat(m[1]):0, py=m?parseFloat(m[2]):0;
  wrap.style.transform=`translate(${px}px,${py}px) scale(${skMapScale})`;
  wrap.style.transformOrigin='top left';

  const svg = wrap.querySelector('svg');
  const THRESHOLD = 6;
  wrap.querySelectorAll('g[data-drag="1"]').forEach(g => {
    const id = g.getAttribute('data-id');
    const locked = g.getAttribute('data-locked')==='1';
    let dragging = false, moved = false, startX = 0, startY = 0, origX = 0, origY = 0;
    function getXY(e) {
      const t = e.touches ? e.touches[0] : e;
      const rect = svg.getBoundingClientRect();
      return { x: (t.clientX - rect.left)/skMapScale, y: (t.clientY - rect.top)/skMapScale };
    }
    function onStart(e) {
      if (e.target.tagName === 'text') return;
      const xy = getXY(e);
      startX = xy.x; startY = xy.y;
      origX = pos[id]?.x || 0; origY = pos[id]?.y || 0;
      dragging = true; moved = false; g._dragged = false;
    }
    function onMove(e) {
      if (!dragging) return;
      const xy = getXY(e);
      const dx = xy.x - startX, dy = xy.y - startY;
      if (!moved && Math.sqrt(dx*dx+dy*dy) < THRESHOLD) return;
      moved = true; g._dragged = true;
      const nx = Math.max(MARGIN, origX + dx), ny = Math.max(10, origY + dy);
      const rect = g.querySelector('rect');
      if (rect) { rect.setAttribute('x', nx); rect.setAttribute('y', ny); }
      g.querySelectorAll('text').forEach(t => {
        const ox = parseFloat(t.getAttribute('data-ox') || t.getAttribute('x'));
        const oy = parseFloat(t.getAttribute('data-oy') || t.getAttribute('y'));
        if (!t.getAttribute('data-ox')) { t.setAttribute('data-ox', ox); t.setAttribute('data-oy', oy); }
        t.setAttribute('x', parseFloat(t.getAttribute('data-ox')) + (nx - origX));
        t.setAttribute('y', parseFloat(t.getAttribute('data-oy')) + (ny - origY));
      });
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      if (moved) {
        const rect = g.querySelector('rect');
        if (rect) {
          const sk = im[id];
          if (sk) { sk.manualX = Math.round(parseFloat(rect.getAttribute('x'))); sk.manualY = Math.round(parseFloat(rect.getAttribute('y'))); }
        }
        saveState();
        renderSkillTree(currentSkillSubject);
      }
      setTimeout(() => { g._dragged = false; }, 50);
    }
    g.addEventListener('pointerdown', onStart);
    g.addEventListener('pointermove', onMove);
    g.addEventListener('pointerup',   onEnd);
    g.addEventListener('pointercancel', onEnd);
    g.addEventListener('click', e => {
      if (g._dragged || e.target.tagName === 'text') return;
      if (locked) { showToast('親スキルを先に達成してください'); return; }
      const sk = im[id]; if (!sk) return;
      sk.done = !sk.done; saveState(); checkBadges(); renderSkillTree(currentSkillSubject);
    });
  });

  initSkillMapPan(wrap);
}

function initSkillMapPan(wrap) {
  const body = document.getElementById('sk-map-body'); if (!body) return;
  if (skMapPanCleanup) { skMapPanCleanup(); skMapPanCleanup = null; }
  let panX = 0, panY = 0, startX = 0, startY = 0, startPanX = 0, startPanY = 0, isPanning = false;
  const m = (wrap.style.transform || '').match(/translate\((-?[\d.]+)px,\s*(-?[\d.]+)px\)/);
  if (m) { panX = parseFloat(m[1]); panY = parseFloat(m[2]); }
  function applyTransform() {
    wrap.style.transform = `translate(${panX}px,${panY}px) scale(${skMapScale})`;
    wrap.style.transformOrigin = 'top left';
  }
  applyTransform();
  // ホイールズーム
  function onWheel(e) {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.91;
    skMapScale = Math.max(0.3, Math.min(3.0, skMapScale * factor));
    applyTransform();
  }
  body.addEventListener('wheel', onWheel, { passive: false });
  function isOnNode(t) { return !!(t && t.closest && t.closest('g[data-drag="1"]')); }
  function onStart(e) {
    if (isOnNode(e.target)) return;
    isPanning = true; startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY;
    body.style.cursor = 'grabbing';
  }
  function onMove(e) {
    if (!isPanning) return;
    panX = startPanX + (e.clientX - startX); panY = startPanY + (e.clientY - startY); applyTransform();
  }
  function onEnd() { isPanning = false; body.style.cursor = 'grab'; }
  let touchId = null;
  function onTouchStart(e) {
    if (isOnNode(e.target) || e.touches.length !== 1) return;
    touchId = e.touches[0].identifier; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY; isPanning = true;
  }
  function onTouchMove(e) {
    if (!isPanning || touchId === null) return;
    const t = Array.from(e.changedTouches).find(x => x.identifier === touchId); if (!t) return;
    e.preventDefault(); panX = startPanX + (t.clientX - startX); panY = startPanY + (t.clientY - startY); applyTransform();
  }
  function onTouchEnd() { isPanning = false; touchId = null; }
  body.addEventListener('pointerdown', onStart);
  body.addEventListener('pointermove', onMove);
  body.addEventListener('pointerup',   onEnd);
  body.addEventListener('pointercancel', onEnd);
  body.addEventListener('touchstart', onTouchStart, { passive: true });
  body.addEventListener('touchmove',  onTouchMove,  { passive: false });
  body.addEventListener('touchend',   onTouchEnd);
  skMapPanCleanup = () => {
    body.removeEventListener('pointerdown', onStart);
    body.removeEventListener('pointermove', onMove);
    body.removeEventListener('pointerup',   onEnd);
    body.removeEventListener('pointercancel', onEnd);
    body.removeEventListener('touchstart', onTouchStart);
    body.removeEventListener('touchmove',  onTouchMove);
    body.removeEventListener('touchend',   onTouchEnd);
    body.removeEventListener('wheel', onWheel);
  };
}

    const subjAvgAll=Object.values(subjAvgMap).length?Math.round(Object.values(subjAvgMap).reduce((a,b)=>a+b,0)/Object.values(subjAvgMap).length):0;
    // 平均点・偏差値差分も使った苦手/得意分析

// グラフ描画 — スコアレンジを自動調整
function renderTestChart() {
  const rounds = (S.rounds||[])
    .filter(r => testAnalysisType==='全て'||(r.type||'その他')===testAnalysisType)
    .sort((a,b) => a.date.localeCompare(b.date));
  if (rounds.length < 2) return;

  const allDates = rounds.map(r => r.date);
  const dpr = window.devicePixelRatio || 1;
  const avgs = rounds.map(r => calcRoundAvg(r));

  // スコアレンジ自動調整（最小値-10〜最大値+10、5の倍数にスナップ）
  function getRange(values) {
    const minV=Math.min(...values), maxV=Math.max(...values);
    const pad=Math.max(5, Math.round((maxV-minV)*0.15));
    const lo=Math.max(0, Math.floor((minV-pad)/5)*5);
    const hi=Math.min(100, Math.ceil((maxV+pad)/5)*5);
    return {lo, hi};
  }

  // 教科別トレンド
  requestAnimationFrame(() => {
    const cv2=document.getElementById('subj-trend-chart'); if(!cv2)return;
    const bySubj={};
    rounds.forEach((r,ri)=>{Object.entries(r.scores||{}).forEach(([subj,sc])=>{
      if(!bySubj[subj])bySubj[subj]=Array(rounds.length).fill(null);
      bySubj[subj][ri]=calcSubjPct(sc);
    });});
    const subjKeys=Object.keys(bySubj); if(!subjKeys.length)return;
    const allVals=Object.values(bySubj).flat().filter(v=>v!=null);
    const {lo,hi}=getRange(allVals);
    const W2=cv2.offsetWidth||300, H2=140;
    cv2.width=W2*dpr;cv2.height=H2*dpr;cv2.style.width=W2+'px';cv2.style.height=H2+'px';
    const ctx2=cv2.getContext('2d');ctx2.scale(dpr,dpr);
    const series=subjKeys.map(s=>({label:s,values:bySubj[s],color:getSubjectColor(s)}));
    drawLineChart(ctx2,W2,H2,rounds,series,lo,hi,dpr);
    const labelsEl2=document.getElementById('subj-trend-labels');
    if(labelsEl2)labelsEl2.innerHTML=allDates.map(d=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted);overflow:hidden;white-space:nowrap">${d.slice(5)}</div>`).join('');
    const legendEl=document.getElementById('subj-legend');
    if(legendEl)legendEl.innerHTML=subjKeys.map(s=>`<div style="display:flex;align-items:center;gap:4px">
      <div style="width:10px;height:3px;border-radius:2px;background:${getSubjectColor(s)}"></div>
      <span style="font-size:10px;color:var(--text-muted)">${sanitize(s)}</span>
    </div>`).join('');

    // ホバーで点数詳細表示（修正: bySubjはindex配列なので i で参照）
    const tooltip=document.getElementById('chart-tooltip');
    const allPts2=[];
    const gH2=H2-pd.t-pd.b;
    subjKeys.forEach(subj=>{
      const color=getSubjectColor(subj);
      (bySubj[subj]||[]).forEach((pct,i)=>{
        if(pct==null)return;
        const x=pd.l+(rounds.length>1?i/(rounds.length-1)*gW:gW/2);
        const y=pd.t+gH2-((pct-lo)/Math.max(hi-lo,1)*gH2);
        // 詳細ラベル: 得点/満点 + 平均点/偏差値
        const sc=rounds[i]?.scores?.[subj];
        let detail=`${subj}: ${pct}%`;
        if(sc){
          detail=`${subj}  ${sc.score}/${sc.max}点 (${pct}%)`;
          if(sc.avg!=null)detail+=`  平均${sc.avg}`;
          if(sc.dev!=null)detail+=`  偏差値${sc.dev}`;
        }
        allPts2.push({x,y,label:detail,color});
      });
    });
    cv2.addEventListener('mousemove',ev=>{
      const r=cv2.getBoundingClientRect();
      const mx=(ev.clientX-r.left)*W2/r.width,my=(ev.clientY-r.top)*H2/r.height;
      let closest=null,minD=22;
      allPts2.forEach(p=>{const d=Math.sqrt((p.x-mx)**2+(p.y-my)**2);if(d<minD){minD=d;closest=p;}});
      if(closest&&tooltip){
        tooltip.style.display='block';
        tooltip.innerHTML=`<b style="color:${closest.color}">${closest.label}</b>`;
        const tx=Math.min(closest.x+10,W2-130);
        const ty=Math.max(closest.y-30,0);
        tooltip.style.left=tx+'px';
        tooltip.style.top=ty+'px';
      }else if(tooltip){tooltip.style.display='none';}
    });
    cv2.addEventListener('mouseleave',()=>{if(tooltip)tooltip.style.display='none';});
    cv2.addEventListener('touchmove',ev=>{
      ev.preventDefault();
      const r=cv2.getBoundingClientRect(),t=ev.touches[0];
      const mx=(t.clientX-r.left)*W2/r.width,my=(t.clientY-r.top)*H2/r.height;
      let closest=null,minD=30;
      allPts2.forEach(p=>{const d=Math.sqrt((p.x-mx)**2+(p.y-my)**2);if(d<minD){minD=d;closest=p;}});
      if(closest&&tooltip){
        tooltip.style.display='block';
        tooltip.innerHTML=`<b style="color:${closest.color}">${closest.label}</b>`;
        tooltip.style.left=Math.min(closest.x+10,W2-130)+'px';
        tooltip.style.top=Math.max(closest.y-30,0)+'px';
      }
    },{passive:false});
    cv2.addEventListener('touchend',()=>{if(tooltip)setTimeout(()=>tooltip.style.display='none',1200);});
  });
}

// 汎用折れ線グラフ（スコアレンジ指定可能）
function drawLineChart(ctx, W, H, rounds, series, lo, hi, dpr) {
  const pd={t:16,r:12,b:4,l:32}, gW=W-pd.l-pd.r, gH=H-pd.t-pd.b;
  ctx.fillStyle='#161b22'; ctx.fillRect(0,0,W,H);
  const range=hi-lo||1;
  const yOf=v=>pd.t+gH-((v-lo)/range*gH);
  const xOf=i=>pd.l+(rounds.length>1?i/(rounds.length-1)*gW:gW/2);

  // グリッド線 & Yラベル
  const steps=4;
  for(let i=0;i<=steps;i++){
    const v=lo+Math.round(range/steps*i);
    const y=yOf(v);
    ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(W-pd.r,y);ctx.stroke();
    ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.textAlign='right';
    ctx.fillText(v,pd.l-3,y+3);
  }

  series.forEach(({values,color})=>{
    const pts=values.map((v,i)=>v!=null?{x:xOf(i),y:yOf(v),v}:null).filter(Boolean);
    if(pts.length<1)return;
    if(pts.length===1){
      ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,4,0,Math.PI*2);ctx.fillStyle=color;ctx.fill();
      return;
    }
    // グラデーション塗り
    if(series.length===1){
      const grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
      grad.addColorStop(0,color.replace('#','rgba(')+'33)'.replace('rgba(','rgba(')||'rgba(153,216,255,0.2)');
      grad.addColorStop(1,'rgba(0,0,0,0)');
      try{
        grad.addColorStop(0,'rgba(153,216,255,0.2)');
        ctx.beginPath();ctx.moveTo(pts[0].x,pd.t+gH);
        pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pd.t+gH);
        ctx.closePath();ctx.fillStyle=grad;ctx.fill();
      }catch(e){}
    }
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=series.length===1?2:1.5;ctx.lineJoin='round';
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    pts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,series.length===1?4:3,0,Math.PI*2);
      ctx.fillStyle=series.length===1?(p.v>=80?'#3aaa72':p.v>=60?'#e09030':'#e24b4a'):color;
      ctx.fill();
    });
  });
}

function expandChart(type) {
  const prev = document.getElementById('chart-expand-overlay'); if (prev) prev.remove();
  const overlay = document.createElement('div');
  overlay.id = 'chart-expand-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px';
  const box = document.createElement('div');
  box.style.cssText = 'background:var(--bg-card);border-radius:14px;padding:16px;width:100%;max-width:520px;border-top:2px solid var(--accent-soft)';
  const titleTxt = type==='avg' ? '平均点推移' : '教科別点数推移';
  const rounds = (S.rounds||[]).filter(r=>testAnalysisType==='全て'||(r.type||'その他')===testAnalysisType).sort((a,b)=>a.date.localeCompare(b.date));
  const allDates = rounds.map(r=>r.date);
  const cid = 'expand-chart-'+Date.now();
  const h = type==='avg' ? 200 : 260;
  box.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:14px;font-weight:800">${titleTxt}</div>
    <button onclick="document.getElementById('chart-expand-overlay').remove()" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer">✕</button>
  </div>
  <canvas id="${cid}" style="width:100%;height:${h}px;display:block" height="${h}"></canvas>
  <div style="display:flex;margin-top:4px">${allDates.map(d=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted);overflow:hidden;white-space:nowrap">${d.slice(5)}</div>`).join('')}</div>
  <div id="expand-legend" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px"></div>`;
  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);

  requestAnimationFrame(()=>{
    const cv=document.getElementById(cid);if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.offsetWidth||480;
    cv.width=W*dpr;cv.height=h*dpr;cv.style.width=W+'px';cv.style.height=h+'px';
    const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
    if(type==='avg'){
      const avgs=rounds.map(r=>calcRoundAvg(r));
      const {lo,hi}=getRange2(avgs);
      drawLineChart(ctx,W,h,rounds,[{label:'平均',values:avgs,color:'#99d8ff'}],lo,hi,dpr);
    }else{
      const bySubj={};
      rounds.forEach((r,ri)=>{Object.entries(r.scores||{}).forEach(([subj,sc])=>{
        if(!bySubj[subj])bySubj[subj]=Array(rounds.length).fill(null);
        bySubj[subj][ri]=calcSubjPct(sc);
      });});
      const subjKeys=Object.keys(bySubj);
      const allVals=Object.values(bySubj).flat().filter(v=>v!=null);
      const {lo,hi}=getRange2(allVals);
      const series=subjKeys.map(s=>({label:s,values:bySubj[s],color:getSubjectColor(s)}));
      drawLineChart(ctx,W,h,rounds,series,lo,hi,dpr);
      const leg=document.getElementById('expand-legend');
      if(leg)leg.innerHTML=subjKeys.map(s=>`<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:3px;background:${getSubjectColor(s)};border-radius:2px"></div><span style="font-size:10px;color:var(--text-muted)">${sanitize(s)}</span></div>`).join('');
    }
  });
}

function getRange2(values) {
  const minV=Math.min(...values.filter(v=>v!=null)), maxV=Math.max(...values.filter(v=>v!=null));
  const pad=Math.max(5, Math.round((maxV-minV)*0.15));
  return {lo:Math.max(0,Math.floor((minV-pad)/5)*5), hi:Math.min(100,Math.ceil((maxV+pad)/5)*5)};
}
// エイリアス
function getRange(values){return getRange2(values);}

function calcRoundAvg(r) {
  const entries=Object.values(r.scores||{});if(!entries.length)return 0;
  const ts=entries.reduce((a,s)=>a+(parseFloat(s.score)||0),0);
  const tm=entries.reduce((a,s)=>a+(parseFloat(s.max)||0),0);
  return tm>0?Math.round(ts/tm*100):0;
}

function calcSubjPct(sc) {
  const score=parseFloat(sc.score)||0,max=parseFloat(sc.max)||0;
  return max>0?Math.round(score/max*100):0;
}

function calcSubjDiffFromAvg(sc) {
  // ユーザーが入力した平均点がある場合: (得点-平均点)/満点 の差分率
  if(sc.avg!=null && sc.max>0){
    return Math.round((sc.score - sc.avg) / sc.max * 100);
  }
  // 偏差値がある場合: 50（全体平均）基準の差
  if(sc.dev!=null){
    return Math.round(sc.dev - 50);
  }
  return null;
}

function setTestInputMode(mode) {
  testInputMode=mode;

  nextTestStep();
  document.getElementById('modal-test-score')?.classList.add('open');
}

function saveTestScore() {
  if(!tempTest)return;
  // 得点・満点は必須
  let hasError=false;
  tempTestSubjects.forEach((s,i)=>{
    const scoreV=document.getElementById(`sc-score-${i}`)?.value.trim();
    const maxV=document.getElementById(`sc-max-${i}`)?.value.trim();
    if(!scoreV||!maxV){showToast(`${s}の得点と満点を入力してください`);hasError=true;}
  });
  if(hasError)return;

  tempTestSubjects.forEach((s,i)=>{
    const score=parseFloat(document.getElementById(`sc-score-${i}`)?.value)||0;
    const max  =parseFloat(document.getElementById(`sc-max-${i}`)?.value)||100;
    if(testInputMode==='score_dev'){
      const devV=document.getElementById(`sc-dev-${i}`)?.value?.trim();
      const dev=devV?parseFloat(devV):null;
      tempTest.scores[s]={score,max,dev};
    }else{
      // score_avg モード
      const avgV=document.getElementById(`sc-avg-${i}`)?.value?.trim();
      const avg=avgV?parseFloat(avgV):null;
      tempTest.scores[s]={score,max,avg};
    }
  });
  S.rounds=S.rounds||[];
  if(editTestIndex>=0&&editTestIndex<S.rounds.length){
    S.rounds[editTestIndex]=tempTest;editTestIndex=-1;
  }else{S.rounds.push(tempTest);}
  S.rounds.sort((a,b)=>a.date.localeCompare(b.date));
  tempTest=null;tempTestSubjects=[];
  saveState();checkBadges();
  document.getElementById('modal-test-score')?.classList.remove('open');
  showToast('テストを記録しました');navigateTo('test-analysis');
}

function renderBadges() {
  const earned=new Set(S.earnedBadges),dates=S.earnedDates||{};
  const total=BADGE_DEFS.length,count=S.earnedBadges.length;
  const pct=total>0?Math.round(count/total*100):0;
  const tierNames=['','Tier 1  第一歩','Tier 2  天界学園','Tier 3  ケツイを力に','Tier 4  ゴリラ','Tier 5  THE ABSOLUTE IDOL','最高難易度'];
  const tierColors=['','#8b949e','#3aaa72','#76c0ea','#e09030','#e24b4a','#e24b4a'];
  let tiersHtml='';
  for(let tier=1;tier<=6;tier++){
    const tb=BADGE_DEFS.filter(b=>b.tier===tier);if(!tb.length)continue;
    const ec=tb.filter(b=>earned.has(b.id)).length;
    tiersHtml+=`<div style="font-size:10px;font-weight:700;color:${tierColors[tier]};margin:14px 0 8px;letter-spacing:.8px">${tierNames[tier]} (${ec}/${tb.length})</div>

      <div class="badge-grid">${gag.map(b=>makeBadgeCard(b,earned,dates,true)).join('')}</div>`;

  const hintHtml=b.hint ? `<div class="achievement-hint" style="color:${isEarned?'var(--accent-strong)':'var(--text-muted)'}">${isEarned?b.hint:'💡 '+b.hint}</div>` : (isGag&&!isEarned?`<div class="achievement-hint">???</div>`:'');
  return `<div class="achievement-card ${isEarned?'earned':''}" style="${border}" onclick="showBadgeDetail('${b.id}')">
    <span class="achievement-icon">${isEarned?b.icon:'?'}</span>
    <div class="achievement-name">${isEarned?sanitize(b.name):'???'}</div>
    ${hintHtml}${dateHtml}

}

function previewBgOpacity(val) {
  const overlay = document.querySelector('#bg-image div');
  if (overlay) overlay.style.background = `rgba(13,17,23,${(100-parseInt(val))/100})`;
}

function saveBgOpacity() {
  const val = parseInt(document.getElementById('bg-opacity-input')?.value) || 0;
  S.settings = S.settings || {};
  S.settings.bgOpacity = 100 - val;
  saveState();
  showToast('透明度を保存しました');
}

function applyColorPreset(strong, soft) {
  document.getElementById('color-accent-strong').value = strong;
  document.getElementById('color-accent-strong-hex').value = strong;
  document.getElementById('color-accent-soft').value = soft;
  document.getElementById('color-accent-soft-hex').value = soft;
  applyAccentColors(strong, soft);
}

function syncColorInput(type) {
  const hexEl = document.getElementById(`color-accent-${type}-hex`);
  const pickerEl = document.getElementById(`color-accent-${type}`);
  if (!hexEl || !pickerEl) return;
  const hex = hexEl.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    pickerEl.value = hex;
    previewAccentColor();
  }
}

function previewAccentColor() {
  const strong = document.getElementById('color-accent-strong')?.value || '#99d8ff';
  const soft   = document.getElementById('color-accent-soft')?.value   || '#76c0ea';
  document.getElementById('color-accent-strong-hex').value = strong;
  document.getElementById('color-accent-soft-hex').value   = soft;
  applyAccentColors(strong, soft);
}

function applyAccentColors(strong, soft) {
  document.documentElement.style.setProperty('--accent-strong', strong);
  document.documentElement.style.setProperty('--accent-soft', soft);
  document.documentElement.style.setProperty('--accent-border', hexToRgba(strong, 0.25));
  document.documentElement.style.setProperty('--accent-bg',    hexToRgba(strong, 0.08));
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function saveAccentColor() {
  const strong = document.getElementById('color-accent-strong')?.value || '#99d8ff';
  const soft   = document.getElementById('color-accent-soft')?.value   || '#76c0ea';
  S.settings = S.settings || {};
  S.settings.accentStrong = strong;
  S.settings.accentSoft   = soft;
  saveState();
  applyAccentColors(strong, soft);
  showToast('カラーを保存しました');
}

function resetAccentColor() {
  S.settings = S.settings || {};
  delete S.settings.accentStrong;
  delete S.settings.accentSoft;
  saveState();
  applyAccentColors('#99d8ff', '#76c0ea');
  navigateTo('settings');
  showToast('カラーをリセットしました');
}

function loadBackground(e) {
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=function(){
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const sc=Math.min(MAX/w,MAX/h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=cv.toDataURL('image/jpeg',0.72);
      S.settings=S.settings||{};S.settings.bg=compressed;
      applyBackground(compressed);saveState();
      const kb=Math.round(compressed.length*0.75/1024);
      showToast(`背景を設定 (${kb}KB)`);navigateTo('settings');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearBackground() {
  S.settings=S.settings||{};S.settings.bg='';
  applyBackground('');saveState();showToast('背景を解除');navigateTo('settings');
}

function renderChangelogAccordion() {
  return CHANGELOGS.map((log, idx) => {
    const isLatest = idx === 0;
    const bid = `cl-${log.ver.replace('.','_')}`;
    const items = log.items.map(i => `・${i}`).join('<br>');
    const accent = isLatest ? 'var(--accent-soft)' : 'var(--bg-border)';
    const textColor = isLatest ? 'var(--accent-strong)' : 'var(--text-muted)';
    return `<div class="card" style="border-left:3px solid ${accent}">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer"
           onclick="toggleAccordionInfo('${bid}')">
        <div style="font-size:11px;font-weight:700;color:${textColor}">v${log.ver} 更新情報</div>
        <span id="${bid}-arrow" style="color:var(--text-muted);font-size:14px;transition:transform .2s">▶</span>
      </div>
      <div id="${bid}" style="display:none;font-size:11px;color:var(--text-secondary);line-height:1.9;margin-top:8px">
        ${items}
      </div>
    </div>`;
  }).join('');
}

function toggleAccordionInfo(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById(id+'-arrow');
  if (!el) return;
  const isOpen = el.style.display !== 'none';
  el.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
}
