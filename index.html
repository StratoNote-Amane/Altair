<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,minimum-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Altair">
<meta name="theme-color" content="#0d1117">
<link rel="apple-touch-icon" id="altair-icon" href="">
<script id="altair-icon-gen">(function(){
function drawAltairIcon(canvas,scale){
  var S=canvas.width,ctx=canvas.getContext('2d'),cx=S/2,cy=S/2,r=S*0.21;
  ctx.fillStyle='#0d1117';
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(S-r,0);ctx.arcTo(S,0,S,r,r);
  ctx.lineTo(S,S-r);ctx.arcTo(S,S,S-r,S,r);ctx.lineTo(r,S);ctx.arcTo(0,S,0,S-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);ctx.closePath();ctx.fill();
  ctx.save();
  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(S-r,0);ctx.arcTo(S,0,S,r,r);
  ctx.lineTo(S,S-r);ctx.arcTo(S,S,S-r,S,r);ctx.lineTo(r,S);ctx.arcTo(0,S,0,S-r,r);
  ctx.lineTo(0,r);ctx.arcTo(0,0,r,0,r);ctx.closePath();ctx.clip();
  var ratio=S/160;ctx.translate(cx,cy);ctx.scale(scale*ratio,scale*ratio);ctx.translate(-80,-80);
  var pts=[[80,12],[108,52],[148,80],[108,108],[80,148],[52,108],[12,80],[52,52]];
  function ds(ss,lw,alpha){ctx.globalAlpha=alpha;ctx.strokeStyle=ss;ctx.lineWidth=lw;ctx.lineJoin='miter';ctx.miterLimit=10;ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);for(var i=1;i<pts.length;i++)ctx.lineTo(pts[i][0],pts[i][1]);ctx.closePath();ctx.stroke();}
  var g=ctx.createLinearGradient(12,12,148,148);g.addColorStop(0,'#d8f2ff');g.addColorStop(0.32,'#3a9ade');g.addColorStop(0.62,'#1a5fa8');g.addColorStop(1,'#5ab8f0');ds(g,20,1);
  var gs=ctx.createLinearGradient(148,148,60,60);gs.addColorStop(0,'rgba(0,16,48,0.3)');gs.addColorStop(1,'rgba(0,16,48,0)');ds(gs,20,1);ds('#fff',5,0.18);ds('#d8f2ff',1.5,0.4);ctx.restore();
}
var c=document.createElement('canvas');c.width=180;c.height=180;drawAltairIcon(c,0.75);
var png=c.toDataURL('image/png');document.getElementById('altair-icon').href=png;
['57','72','76','114','120','144','152','180'].forEach(function(sz){var l=document.createElement('link');l.rel='apple-touch-icon';l.setAttribute('sizes',sz+'x'+sz);l.href=png;document.head.appendChild(l);});
})();</script>
<title>Altair</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="offline-badge">オフライン</div>
<div id="toast"></div>
<div id="app">
  <div id="mobile-header">
    <div id="mobile-header-title">Altair</div>
  </div>
  <div id="main-content"></div>
  <nav id="tab-bar">
    <button class="tab-btn active" data-page="home" onclick="navigateTo('home')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><rect x="3" y="12" width="7" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="14" y="6" width="7" height="15" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="tab-label">ホーム</span>
    </button>
    <button class="tab-btn" data-page="study" onclick="navigateTo('study')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><polyline points="12,8 12,12 15,12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab-label">学習</span>
    </button>
    <button class="tab-btn" data-page="skill" onclick="navigateTo('skill')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="5" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="17" r="2" stroke="currentColor" stroke-width="1.5"/><circle cx="19" cy="17" r="2" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="7" x2="5" y2="15" stroke="currentColor" stroke-width="1.2"/><line x1="12" y1="7" x2="19" y2="15" stroke="currentColor" stroke-width="1.2"/></svg>
      <span class="tab-label">スキル</span>
    </button>
    <button class="tab-btn" data-page="grades" onclick="navigateTo('grades')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><polyline points="3,17 8,11 13,13 21,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span class="tab-label">成績</span>
    </button>
    <button class="tab-btn" data-page="settings" onclick="navigateTo('settings')">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/></svg>
      <span class="tab-label">設定</span>
    </button>
  </nav>
</div>

<!-- === MODALS === -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-title" id="modal-event-title">予定を追加</div>
    <div class="form-group"><label>タイトル</label><input type="text" id="input-event-title" placeholder="例：数学演習"></div>
    <div class="form-group"><label>日付</label><input type="date" id="input-event-date"></div>
    <div class="form-group"><label>教科</label><select id="input-event-subject"></select></div>
    <div class="form-group">
      <label>負荷レベル：<b id="input-event-load-display" style="color:var(--accent-strong)">2</b></label>
      <input type="range" id="input-event-load" min="1" max="5" value="2" oninput="document.getElementById('input-event-load-display').textContent=this.value" style="padding:4px 0;border:none;background:none;width:100%">
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-event')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-test">
  <div class="modal">
    <div class="modal-title" id="modal-test-title">テストを追加</div>
    <div class="form-group"><label>テスト名</label><input type="text" id="input-test-name" placeholder="例：第3回定期試験"></div>
    <div class="form-group"><label>種別</label><select id="input-test-type"></select></div>
    <div class="form-group"><label>日付</label><input type="date" id="input-test-date"></div>
    <div class="form-group">
      <label>教科（複数選択可）</label>
      <div class="chips" id="test-subj-chips" style="margin-top:6px;gap:6px;flex-wrap:wrap"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-test')">キャンセル</button>
      <button class="btn btn-primary" onclick="nextTestStep()">次へ →</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-test-score">
  <div class="modal">
    <div class="modal-title">点数を入力</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px" id="test-score-info"></div>
    <div id="test-score-inputs"></div>
    <div style="font-size:10px;color:var(--text-muted);margin-top:4px" id="test-score-hint"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-test-score')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTestScore()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-deck">
  <div class="modal">
    <div class="modal-title">デッキを作成</div>
    <div class="form-group"><label>デッキ名</label><input type="text" id="input-deck-name" placeholder="例：英単語 Level 1"></div>
    <div class="form-group"><label>教科</label><select id="input-deck-subject"></select></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-deck')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveDeck()">作成</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-card">
  <div class="modal">
    <div class="modal-title">カードを追加</div>
    <div class="form-group">
      <label>一括貼り付け（問題[Tab or カンマ]答え）</label>
      <textarea id="input-card-bulk" rows="4" placeholder="apple	リンゴ&#10;book	本"></textarea>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:1"><label style="font-size:11px;font-weight:700;color:var(--text-secondary);display:block;margin-bottom:5px">問題</label><input type="text" id="input-card-front" placeholder="表面"></div>
      <div style="flex:1"><label style="font-size:11px;font-weight:700;color:var(--text-secondary);display:block;margin-bottom:5px">答え</label><input type="text" id="input-card-back" placeholder="裏面"></div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="document.getElementById('card-file-input').click()">📂 ファイルから読み込み</button>
    <input type="file" id="card-file-input" accept=".csv,.txt,.tsv" style="display:none" onchange="loadCardFile(event)">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-card')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCards()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-subject">
  <div class="modal">
    <div class="modal-title">教科を追加</div>
    <div class="form-group"><label>教科名</label><input type="text" id="input-subject-name" placeholder="例：化学"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-subject')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveSubject()">追加</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-goal">
  <div class="modal">
    <div class="modal-title">目標を設定</div>
    <div class="form-group"><label>志望校</label><input type="text" id="input-goal-school" placeholder="例：東京大学 理科一類"></div>
    <div class="form-group"><label>入試日</label><input type="date" id="input-goal-date"></div>
    <div class="form-group"><label>週間目標時間（h）</label><input type="number" id="input-goal-hours" min="1" max="100" placeholder="例：35"></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('modal-goal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- === LOAD MODULES IN ORDER === -->
<script src="js/config.js"></script>
<script src="js/store.js"></script>
<script src="js/badges.js"></script>
<script src="js/app-common.js"></script>
<script src="js/app-core.js"></script>
<script src="js/app-study.js"></script>
<script src="js/app-flash.js"></script>
<script src="js/app-skill.js"></script>
<script src="js/app-grades.js"></script>
<script src="js/app-settings.js"></script>

<script>
// アプリケーション初期化
init();
</script>

</body>
</html>

<script>
// アプリケーション初期化
document.addEventListener('DOMContentLoaded', function() {
  loadState();
  loadTimerState();
  init();
});
</script>

</body>
</html>
