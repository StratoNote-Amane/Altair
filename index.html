<style>
/* ============================================================
   style.css
   依存: なし
   責務: アプリ全体のスタイル定義
   このファイルだけで対応できる修正: デザイン変更全般
   ============================================================ */

/* ============================================================
   CSS VARIABLES — デザイントークン
   ============================================================ */

:root {
  /* 背景 */
  --bg-base:       #0d1117;
  --bg-card:       #161b22;
  --bg-card-deep:  #0d1f2d;
  --bg-border:     #21262d;

  /* アクセント */
  --accent-strong: #99d8ff;
  --accent-soft:   #76c0ea;
  --accent-border: rgba(153, 216, 255, 0.25);
  --accent-bg:     rgba(153, 216, 255, 0.08);

  /* テキスト */
  --text-primary:   #ffffff;
  --text-secondary: #c9d1d9;
  --text-muted:     #8b949e;

  /* ステータス */
  --ok:      #3aaa72;
  --warn:    #e09030;
  --bad:     #e24b4a;
  --ok-bg:   rgba(58, 170, 114, 0.12);
  --warn-bg: rgba(224, 144, 48, 0.12);
  --bad-bg:  rgba(226, 75, 74, 0.12);

  /* レイアウト */
  --radius:    14px;
  --radius-sm: 9px;
  --radius-xs: 6px;

  /* セーフエリア */
  --safe-top:    env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ============================================================
   RESET & BASE
   ============================================================ */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
}

/* ============================================================
   APP LAYOUT
   ============================================================ */

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  padding-top: var(--safe-top);
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* モバイルヘッダー */
#mobile-header {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 44px;
  padding: 0 16px;
  background: var(--bg-base);
  border-bottom: 1px solid var(--bg-border);
  flex-shrink: 0;
}

#mobile-header-title {
  font-size: 17px;
  font-weight: 800;
  color: var(--accent-strong);
  letter-spacing: 2px;
}

/* メインコンテンツ */
#main-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 16px 16px;
  min-height: 0;
}

/* タブバー */
#tab-bar {
  display: flex;
  background: var(--bg-base);
  border-top: 1px solid var(--bg-border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}

.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 2px 6px;
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
  color: var(--text-muted);
  transition: color 0.15s;
  min-width: 0;
}

.tab-btn.active {
  color: var(--accent-strong);
}

.tab-icon {
  width: 20px;
  height: 20px;
  stroke: currentColor;
}

.tab-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.3px;
}

/* ============================================================
   CARDS
   ============================================================ */

.card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--bg-border);
  padding: 14px;
  margin-bottom: 12px;
}

.card-deep {
  background: var(--bg-card-deep);
  border-radius: var(--radius);
  border: 1px solid var(--accent-border);
  padding: 14px;
  margin-bottom: 12px;
}

.card-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--accent-strong);
  letter-spacing: 1.2px;
  margin-bottom: 8px;
}

/* ============================================================
   STATS ROW
   ============================================================ */

.stats-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}

.stat-card {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  padding: 10px 10px 8px;
}

.stat-val {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1;
}

.stat-val-unit {
  font-size: 11px;
  font-weight: 400;
  color: var(--text-muted);
}

.stat-lbl {
  font-size: 9px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ============================================================
   PAGE HEADER
   ============================================================ */

.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}

.page-title {
  font-size: 20px;
  font-weight: 800;
  color: var(--text-primary);
}

.page-subtitle {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 2px;
}

.page-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ============================================================
   BUTTONS
   ============================================================ */

.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 9px 16px;
  border-radius: var(--radius-sm);
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
  -webkit-appearance: none;
  appearance: none;
  flex-shrink: 0;
}

.btn:active {
  opacity: 0.8;
  transform: scale(0.97);
}

.btn-primary {
  background: var(--accent-strong);
  color: #0d1117;
}

.btn-secondary {
  background: var(--accent-bg);
  color: var(--accent-strong);
  border: 1px solid var(--accent-border);
}

.btn-danger {
  background: var(--bad-bg);
  color: var(--bad);
  border: 1px solid rgba(226, 75, 74, 0.25);
}

.btn-ghost {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--bg-border);
}

.btn-sm {
  padding: 5px 11px;
  font-size: 12px;
  border-radius: var(--radius-xs);
}

.btn-icon {
  padding: 7px;
  border-radius: var(--radius-xs);
}

.btn-full {
  width: 100%;
  justify-content: center;
}

/* ============================================================
   FORM ELEMENTS
   ============================================================ */

.form-group {
  margin-bottom: 12px;
}

label {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-secondary);
  display: block;
  margin-bottom: 5px;
}

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  background: var(--bg-base);
  font-size: 15px;
  color: var(--text-primary);
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
  -webkit-appearance: none;
  appearance: none;
}

input:focus, select:focus, textarea:focus {
  border-color: var(--accent-soft);
}

input::placeholder, textarea::placeholder {
  color: var(--text-muted);
}

select option {
  background: var(--bg-card);
  color: var(--text-primary);
}

textarea {
  resize: vertical;
  min-height: 80px;
}

/* ============================================================
   BADGES / CHIPS
   ============================================================ */

.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}

.badge-accent  { background: var(--accent-bg);  color: var(--accent-strong); border: 1px solid var(--accent-border); }
.badge-ok      { background: var(--ok-bg);      color: var(--ok); }
.badge-warn    { background: var(--warn-bg);     color: var(--warn); }
.badge-bad     { background: var(--bad-bg);      color: var(--bad); }

.chip {
  padding: 6px 12px;
  border-radius: 18px;
  border: 1.5px solid var(--bg-border);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-muted);
  transition: all 0.12s;
}

.chip.active {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
  color: var(--accent-strong);
}

.chips {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

/* ============================================================
   BAR CHARTS
   ============================================================ */

.bar-track {
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}

.bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
  min-width: 3px;
}

.week-bars {
  display: flex;
  gap: 4px;
  align-items: flex-end;
  height: 60px;
  margin-top: 4px;
}

.week-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.week-bar-bg {
  width: 100%;
  height: 48px;
  background: var(--bg-border);
  border-radius: 3px 3px 0 0;
  position: relative;
  overflow: hidden;
}

.week-bar-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--accent-soft);
  border-radius: 3px 3px 0 0;
  transition: height 0.4s ease;
}

.week-bar-fill.today {
  background: var(--accent-strong);
}

.week-bar-day {
  font-size: 9px;
  color: var(--text-muted);
}

.week-bar-day.today {
  color: var(--accent-strong);
}

/* ============================================================
   PROGRESS RING (タイマー用)
   ============================================================ */

.progress-ring-wrap {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 8px 0;
}

/* ============================================================
   TIMER DISPLAY
   ============================================================ */

.timer-display {
  font-size: clamp(48px, 14vw, 72px);
  font-weight: 800;
  letter-spacing: -2px;
  font-variant-numeric: tabular-nums;
  text-align: center;
  line-height: 1;
  color: var(--text-primary);
  transition: color 0.3s;
}

.timer-display.running { color: var(--accent-strong); }
.timer-display.paused  { color: var(--warn); }

/* ============================================================
   FLASHCARD
   ============================================================ */

.flashcard-wrap {
  perspective: 1000px;
  max-width: 420px;
  margin: 0 auto 16px;
}

.flashcard {
  width: 100%;
  aspect-ratio: 16 / 9;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  border-radius: var(--radius);
}

.flashcard.flipped {
  transform: rotateY(180deg);
}

.flashcard-face {
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.flashcard-front {
  background: var(--bg-card-deep);
  border: 1px solid var(--accent-border);
}

.flashcard-back {
  background: var(--bg-card);
  border: 1px solid var(--bg-border);
  transform: rotateY(180deg);
}

.flashcard-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--accent-strong);
  margin-bottom: 8px;
}

.flashcard-text {
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 700;
  text-align: center;
  line-height: 1.5;
  color: var(--text-primary);
}

.flashcard-progress-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 12px;
  color: var(--text-muted);
}

.flashcard-progress-track {
  flex: 1;
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
}

.flashcard-progress-fill {
  height: 100%;
  background: var(--accent-soft);
  border-radius: 3px;
  transition: width 0.3s;
}

/* ============================================================
   CALENDAR
   ============================================================ */

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.calendar-day-header {
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  padding: 3px 0;
}

.calendar-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4px 2px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12px;
  transition: background 0.12s;
  border: 1.5px solid transparent;
  color: var(--text-secondary);
  min-height: 52px;
}

.calendar-day:hover { background: var(--accent-bg); }
.calendar-day.today { background: var(--accent-strong); color: #0d1117; font-weight: 800; }
.calendar-day.selected { border-color: var(--accent-soft); background: var(--accent-bg); }
.calendar-day.other-month { opacity: 0.3; }

.calendar-day-dots {
  display: flex;
  gap: 2px;
  margin-top: 2px;
}

.calendar-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent-soft);
}

.calendar-dot.high { background: var(--bad); }
.calendar-dot.mid  { background: var(--warn); }

.calendar-day-mini {
  font-size: 8px;
  line-height: 1.3;
  text-align: center;
  margin-top: 1px;
  width: 100%;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  color: var(--accent-soft);
}

.calendar-day.today .calendar-day-mini { color: rgba(13, 17, 23, 0.8); }

/* ============================================================
   EVENT LIST ITEM
   ============================================================ */

.event-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  background: var(--accent-bg);
  border: 1px solid var(--bg-border);
  margin-bottom: 6px;
}

.event-bar {
  width: 4px;
  min-height: 36px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ============================================================
   SKILL TREE
   ============================================================ */

.skill-subj-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}

.skill-subj-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1.5px solid var(--bg-border);
  padding: 14px 12px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.skill-subj-card:active { transform: scale(0.97); }
.skill-subj-card.has-skills { border-color: var(--accent-soft); }

.skill-subj-name  { font-size: 14px; font-weight: 800; margin-bottom: 4px; }
.skill-subj-count { font-size: 11px; color: var(--text-muted); }

.skill-subj-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  border-radius: 0 2px 0 0;
  transition: width 0.4s ease;
}

/* スキルマップオーバーレイ */
#skill-map-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 500;
  background: var(--bg-base);
  flex-direction: column;
}

#skill-map-overlay.open { display: flex; }

#skill-map-header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--bg-border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  padding-top: calc(10px + var(--safe-top));
}

#skill-map-body {
  flex: 1;
  overflow: hidden;
  padding: 14px;
  position: relative;
  cursor: grab;
  user-select: none;
}

#skill-map-body.panning { cursor: grabbing; }

#skill-map-svg-wrap {
  display: inline-block;
  min-width: 100%;
  position: absolute;
  top: 0;
  left: 0;
}

/* ============================================================
   ACCORDION / TREND
   ============================================================ */

.accordion {
  border-radius: var(--radius-sm);
  border: 1px solid var(--bg-border);
  margin-bottom: 8px;
  overflow: hidden;
}

.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-card);
  cursor: pointer;
  gap: 8px;
}

.accordion-title {
  font-size: 13px;
  font-weight: 700;
  flex: 1;
  color: var(--text-primary);
}

.accordion-body {
  padding: 12px 14px;
  border-top: 1px solid var(--bg-border);
  display: none;
}

.accordion-body.open { display: block; }

/* ============================================================
   SECTION LABEL
   ============================================================ */

.section-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-soft);
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--bg-border);
}

/* ============================================================
   LIST ROW
   ============================================================ */

.list-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid var(--bg-border);
  font-size: 13px;
  color: var(--text-primary);
}

.list-row:last-child { border-bottom: none; }

/* ============================================================
   BADGE CARDS (実績)
   ============================================================ */

.badge-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.achievement-card {
  background: var(--bg-card);
  border: 1.5px solid var(--bg-border);
  border-radius: var(--radius-sm);
  padding: 12px 8px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s;
}

.achievement-card.earned {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
}

.achievement-icon {
  font-size: 22px;
  display: block;
  margin-bottom: 4px;
}

.achievement-name {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.achievement-hint {
  font-size: 9px;
  color: var(--text-muted);
  line-height: 1.4;
}

/* ============================================================
   MODAL
   ============================================================ */

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  z-index: 1000;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg-card);
  border-radius: var(--radius) var(--radius) 0 0;
  padding: 20px 18px;
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
  padding-bottom: calc(20px + var(--safe-bottom));
  border-top: 2px solid var(--accent-soft);
  animation: modal-up 0.2s ease;
}

@keyframes modal-up {
  from { transform: translateY(24px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

.modal-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 16px;
}

@media (min-width: 600px) {
  .modal-overlay { align-items: center; }
  .modal { border-radius: var(--radius); max-width: 460px; }
}

/* ============================================================
   TOAST
   ============================================================ */

#toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: rgba(22, 27, 34, 0.95);
  color: var(--text-primary);
  border: 1px solid var(--bg-border);
  padding: 9px 18px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 2000;
  white-space: nowrap;
  pointer-events: none;
  max-width: calc(100vw - 32px);
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ============================================================
   OFFLINE BADGE
   ============================================================ */

#offline-badge {
  display: none;
  position: fixed;
  top: calc(8px + var(--safe-top));
  right: 8px;
  z-index: 9999;
  background: var(--warn);
  color: #fff;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 10px;
  font-weight: 700;
}

/* ============================================================
   GOAL PROGRESS BAR
   ============================================================ */

.goal-bar-bg {
  height: 5px;
  background: var(--bg-border);
  border-radius: 3px;
  overflow: hidden;
}

.goal-bar-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--accent-soft);
  transition: width 0.6s ease;
}

/* ============================================================
   PLAN ITEMS
   ============================================================ */

.plan-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.plan-item-subject {
  font-size: 12px;
  color: var(--text-secondary);
  width: 44px;
  flex-shrink: 0;
}

.plan-item-track {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--bg-border);
  overflow: hidden;
}

.plan-item-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-soft);
}

.plan-item-fill.done {
  background: var(--ok);
}

.plan-item-time {
  font-size: 12px;
  color: var(--accent-strong);
  font-weight: 700;
  width: 44px;
  text-align: right;
  flex-shrink: 0;
}

/* ============================================================
   STREAK BADGE
   ============================================================ */

.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(118, 192, 234, 0.12);
  border: 1px solid rgba(118, 192, 234, 0.25);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 10px;
  color: var(--accent-soft);
  font-weight: 700;
}

/* ============================================================
   TABS (ページ内タブ)
   ============================================================ */

.page-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.page-tab {
  padding: 6px 12px;
  border-radius: 18px;
  border: 1.5px solid var(--bg-border);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  background: var(--bg-card);
  color: var(--text-muted);
  transition: all 0.12s;
  font-family: inherit;
}

.page-tab.active {
  border-color: var(--accent-soft);
  background: var(--accent-bg);
  color: var(--accent-strong);
}

/* ============================================================
   SCROLLBAR（WebKit）
   ============================================================ */

::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-border); border-radius: 2px; }

/* ============================================================
   UTILITIES
   ============================================================ */

.text-accent  { color: var(--accent-strong); }
.text-soft    { color: var(--accent-soft); }
.text-muted   { color: var(--text-muted); }
.text-ok      { color: var(--ok); }
.text-warn    { color: var(--warn); }
.text-bad     { color: var(--bad); }

.fw-bold { font-weight: 700; }
.fw-black { font-weight: 800; }

.mt-4  { margin-top: 4px; }
.mt-8  { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }

.mb-4  { margin-bottom: 4px; }
.mb-8  { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }

.flex       { display: flex; }
.flex-col   { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-6  { gap: 6px; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.flex-1 { flex: 1; min-width: 0; }

  });

  });

function saveState() {

    localStorage.setItem(CFG.STORAGE_KEY, JSON.stringify(S));

// ============================================================
// HELPERS — データ操作ユーティリティ
// ============================================================

function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function today() {
  const d = new Date();
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}

function pad(n) {
  return String(n).padStart(2, '0');
}

function formatMs(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  return h + ':' + pad(m) + ':' + pad(s);
}

function formatMsShort(ms) {
  const totalMin = Math.floor(ms / 60000);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;
  if (h === 0) return m + '分';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function localDateStr(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}

function localMonthStr(d) {
  return d.getFullYear() + '-' + pad(d.getMonth()+1);
}

function weekKeyOf(d) {
  const tmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  const dow = tmp.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  tmp.setDate(tmp.getDate() + diff);
  return localDateStr(tmp);
}

function sanitize(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getSubjectColor(subj) {
  return CFG.SUBJECT_COLORS[subj] || CFG.SUBJECT_COLORS['_default'];
}

function getAllSubjects() {
  const defaults = CFG.DEFAULT_SUBJECTS;
  const custom   = S.subjects || [];
  return defaults.concat(custom.filter(function(s) { return !defaults.includes(s); }));
}

// ============================================================
// STREAK — 連続学習日数の更新
// ============================================================

function updateStreak() {
  const todayStr = today();
  if (S.lastDate === todayStr) return;

  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yesterdayStr = localDateStr(yesterday);

  if (S.lastDate === yesterdayStr) {
    S.streak = (S.streak || 0) + 1;
  } else if (S.lastDate !== todayStr) {
    S.streak = 1;
  }
  S.lastDate = todayStr;
  saveState();
}

// ============================================================
// SESSIONS — 学習時間の集計
// ============================================================

function getTodayMs() {
  const todayStr = today();
  return (S.sessions || []).reduce(function(sum, session) {
    const d = new Date(session.ts);
    if (localDateStr(d) === todayStr) return sum + (session.dur || 0);
    return sum;
  }, 0);
}

function getWeekMs() {
  const now = new Date();
  const weekStart = new Date(now);
  const dow = now.getDay();
  weekStart.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
  weekStart.setHours(0,0,0,0);

  const result = [0,0,0,0,0,0,0];
  (S.sessions || []).forEach(function(session) {
    const d = new Date(session.ts);
    if (d >= weekStart) {
      const dayIndex = (d.getDay() + 6) % 7; // 月=0〜日=6
      result[dayIndex] += session.dur || 0;
    }
  });
  return result;
}

function getWeekTotalMs() {
  return getWeekMs().reduce(function(a,b) { return a+b; }, 0);
}

function getSessionsBySubject(sessions) {
  const map = {};
  (sessions || []).forEach(function(session) {
    const s = session.subj || '不明';
    map[s] = (map[s] || 0) + (session.dur || 0);
  });
  return map;
}

// ============================================================
// PLAN ENGINE — 今日の学習計画を自動生成
// ============================================================

function generateTodayPlan(availableMinutes) {
  const subjects = getAllSubjects();
  if (subjects.length === 0) return [];

  const scores = {};
  subjects.forEach(function(subj) {
    scores[subj] = 0;
  });

  // スキル習熟度スコア（低いほど優先度高）
  subjects.forEach(function(subj) {
    const skills = S.skills[subj] || [];
    if (skills.length === 0) {
      scores[subj] += CFG.PLAN.skillWeight;
    } else {
      const doneCount = skills.filter(function(sk) { return sk.done; }).length;
      const ratio = doneCount / skills.length;
      scores[subj] += CFG.PLAN.skillWeight * (1 - ratio);
    }
  });

  // テスト結果スコア（点数が低いほど優先度高）
  subjects.forEach(function(subj) {
    const subjRounds = (S.rounds || []).filter(function(r) { return r.subj === subj; });
    if (subjRounds.length === 0) {
      scores[subj] += CFG.PLAN.testWeight * 0.5;
    } else {
      const latest = subjRounds[subjRounds.length - 1];
      const ratio = (latest.score || 0) / 100;
      scores[subj] += CFG.PLAN.testWeight * (1 - ratio);
    }
  });

  // 直近学習スコア（最近やっていないほど優先度高）
  const now = Date.now();
  subjects.forEach(function(subj) {
    const subjSessions = (S.sessions || []).filter(function(se) { return se.subj === subj; });
    if (subjSessions.length === 0) {
      scores[subj] += CFG.PLAN.recencyWeight;
    } else {
      const lastTs = Math.max.apply(null, subjSessions.map(function(se) { return se.ts; }));
      const daysSince = (now - lastTs) / (1000 * 60 * 60 * 24);
      const recencyScore = Math.min(daysSince / 7, 1);
      scores[subj] += CFG.PLAN.recencyWeight * recencyScore;
    }
  });

  // スコア順にソートして上位3〜5教科を選出
  const sorted = subjects.slice().sort(function(a, b) {
    return scores[b] - scores[a];
  });
  const topSubjects = sorted.slice(0, Math.min(5, subjects.length));

  // スコアに比例して時間を配分
  const totalScore = topSubjects.reduce(function(sum, subj) { return sum + scores[subj]; }, 0);
  const plan = topSubjects.map(function(subj) {
    const ratio = totalScore > 0 ? scores[subj] / totalScore : 1 / topSubjects.length;
    let minutes = Math.round(availableMinutes * ratio);
    minutes = Math.max(minutes, CFG.PLAN.minDailyMinutes);
    minutes = Math.min(minutes, CFG.PLAN.maxSubjectMinutes);
    return { subj: subj, plannedMinutes: minutes, actualMinutes: 0 };
  });

  return plan;
}

function getTodayPlan() {
  const todayStr = today();
  const existing = (S.plans || []).find(function(p) { return p.date === todayStr; });
  return existing || null;
}

function saveTodayPlan(plan) {
  const todayStr = today();
  S.plans = (S.plans || []).filter(function(p) { return p.date !== todayStr; });
  S.plans.push({ date: todayStr, items: plan });
  saveState();
}

// ============================================================
// EXPORT / IMPORT
// ============================================================

function exportData() {
  const blob = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'altair_' + today() + '.json';
  a.click();
  showToast('エクスポート完了');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const parsed = JSON.parse(ev.target.result);
      if (typeof parsed !== 'object' || Array.isArray(parsed)) {
        showToast('エラー：データ形式が不正です');
        return;
      }
      // 配列フィールドの型保証
      ['events','sessions','decks','rounds','subjects','earnedBadges','plans'].forEach(function(key) {
        if (parsed[key] !== undefined && !Array.isArray(parsed[key])) delete parsed[key];
      });
      // サニタイズ
      if (Array.isArray(parsed.events)) {
        parsed.events = parsed.events.map(function(ev) {
          return Object.assign({}, ev, { title: sanitize(ev.title || ''), subj: sanitize(ev.subj || '') });
        });
      }
      if (Array.isArray(parsed.decks)) {
        parsed.decks = parsed.decks.map(function(dk) {
          return Object.assign({}, dk, {
            name: sanitize(dk.name || ''),
            cards: Array.isArray(dk.cards) ? dk.cards.map(function(c) {
              return Object.assign({}, c, { q: sanitize(c.q || ''), a: sanitize(c.a || '') });
            }) : [],
          });
        });
      }
      S = Object.assign({}, S, parsed);
      CFG.DEFAULT_SUBJECTS.forEach(function(subj) {
        if (!S.skills[subj]) S.skills[subj] = [];
      });
      S.earnedBadges = S.earnedBadges || [];
      S.earnedDates  = S.earnedDates  || {};
      saveState();
      showToast('インポート完了');
      navigateTo('home');
    } catch(e) {
      showToast('エラー：ファイルが無効です');
    }
  };
  reader.readAsText(file);
}

// ============================================================
// RESET
// ============================================================

function resetAllData() {
  if (!confirm('全データを削除しますか？この操作は取り消せません。')) return;
  try { localStorage.removeItem(CFG.STORAGE_KEY); } catch(e) {}
  try { localStorage.removeItem(CFG.TIMER_KEY); } catch(e) {}
  loadState();
  clearTimerState();
  showToast('全データをリセットしました');
  navigateTo('home');
}

// ============================================================
// NAVIGATION
// ============================================================

const PAGE_PARENT = {
  'timer':'study','calendar':'study','study-log':'study','flashcard':'study','flashcard-study':'study',
  'plan-engine':'study',
  'test-analysis':'grades','badges':'grades',
};

function navigateTo(page) {
  const noGuard=['settings','study-log','flashcard','flashcard-study','test-analysis','calendar'];
  if (currentPage===page && !noGuard.includes(page)) return;
  if (currentPage==='flashcard-study'&&page!=='flashcard-study') stopFlashcardTimer();
  currentPage = page;
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.classList.toggle('active', btn.getAttribute('data-page')===(PAGE_PARENT[page]||page));
  });
  const container = document.getElementById('main-content');
  if (!container) return;
  container.innerHTML = renderPage(page);
  container.scrollTop = 0;
  setTimeout(()=>postRender(page), 30);
}

function renderPage(page) {
  switch(page) {
    case 'home':            return renderHome();
    case 'study':           return renderStudyHub();
    case 'timer':           return renderTimer();
    case 'calendar':        return renderCalendar();
    case 'study-log':       return renderStudyLog();
    case 'flashcard':       return renderFlashcardHub();
    case 'flashcard-study': return renderFlashcardStudy();
    case 'skill':           return renderSkillHub();
    case 'plan-engine':     return renderPlanEngine();
    case 'grades':          return renderGradesHub();
    case 'test-analysis':   return renderTestAnalysis();
    case 'badges':          return renderBadges();
    case 'settings':        return renderSettings();
    default: return '';
  }
}

function postRender(page) {
  if (page==='calendar')      renderCalendarGrid();
  if (page==='study-log')     renderStudyLogCharts();
  if (page==='test-analysis') { renderTestChart(); setTimeout(animateTestBars,50); }
  if (page==='timer')         restoreTimer();
  if (page==='home')          { renderHomeWeekBar(); renderHomePieChart(); }

function showToast(msg) {
  const el=document.getElementById('toast');
  clearTimeout(toastTimer);

  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

function openModal(id) {
  fillSubjectSelects();

}

  const subjects=getAllSubjects();

    const el=document.getElementById(id); if(!el)return;
    const prev=el.value;
    el.innerHTML=subjects.map(s=>`<option value="${sanitize(s)}">${sanitize(s)}</option>`).join('');
    if(prev)el.value=prev;
  });

function applyBackground(url) {
  let el=document.getElementById('bg-image');
  if(!el){
    el=document.createElement('div');el.id='bg-image';
    el.style.cssText='position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;';
    const ov=document.createElement('div');ov.id='bg-overlay';
    ov.style.cssText='position:absolute;inset:0;background:rgba(13,17,23,0.65);';
    el.appendChild(ov);
    document.body.insertBefore(el,document.body.firstChild);

  el.style.backgroundImage=url?`url('${url}')`:'';

}

// 教科別円グラフ
function renderHomePieChart() {
  const container=document.getElementById('home-pie-container'); if(!container)return;
  const now=new Date(),dow=now.getDay();
  const weekStart=new Date(now);
  weekStart.setDate(now.getDate()-(dow===0?6:dow-1));weekStart.setHours(0,0,0,0);
  const sd={};
  (S.sessions||[]).filter(s=>new Date(s.ts)>=weekStart).forEach(s=>{sd[s.subj]=(sd[s.subj]||0)+s.dur;});
  const tot=Object.values(sd).reduce((a,b)=>a+b,0);
  if(!tot){container.innerHTML='<div style="font-size:12px;color:var(--text-muted)">まだ記録なし</div>';return;}
  const entries=Object.entries(sd).sort((a,b)=>b[1]-a[1]);
  const cid='pie'+(_trendCID++);
  const legendHtml=entries.map(([subj,ms])=>{
    const pct=Math.round(ms/tot*100),color=getSubjectColor(subj);
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
      <div style="font-size:11px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:${color}">${sanitize(subj)}</div>
      <div style="font-size:11px;color:var(--text-muted);white-space:nowrap">${formatMsShortSec(ms)}</div>
      <div style="font-size:11px;font-weight:800;color:var(--accent-strong);width:32px;text-align:right">${pct}%</div>
    </div>`;
  }).join('');
  container.innerHTML=`<div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
    <canvas id="${cid}" width="100" height="100" style="width:100px;height:100px;flex-shrink:0"></canvas>
    <div style="flex:1;min-width:120px">${legendHtml}</div>
  </div>`;
  requestAnimationFrame(()=>setTimeout(()=>{
    const cv=document.getElementById(cid);if(!cv)return;
    const dpr=window.devicePixelRatio||1,S_=100;
    cv.width=S_*dpr;cv.height=S_*dpr;cv.style.width=S_+'px';cv.style.height=S_+'px';
    const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
    const cx=S_/2,cy=S_/2,R=S_/2-4,inner=R*0.55;
    let angle=-Math.PI/2;
    entries.forEach(([subj,ms])=>{
      const sweep=(ms/tot)*Math.PI*2;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,angle,angle+sweep);ctx.closePath();
      ctx.fillStyle=getSubjectColor(subj);ctx.fill();
      ctx.strokeStyle='#0d1117';ctx.lineWidth=1.5;ctx.stroke();
      angle+=sweep;
    });
    ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#161b22';ctx.fill();
    const th=Math.floor(tot/3600000),tm=Math.floor((tot%3600000)/60000);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle='#fff';ctx.font=`bold 11px sans-serif`;ctx.fillText(`${th}h${pad(tm)}m`,cx,cy-5);
    ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.fillText('今週計',cx,cy+7);
  },20));
}

// 1分未満は秒表示
function formatMsShortSec(ms) {
  const totalSec=Math.floor(ms/1000);
  if(totalSec<60)return totalSec+'秒';
  const h=Math.floor(totalSec/3600),m=Math.floor((totalSec%3600)/60);
  if(h===0)return m+'分';
  if(m===0)return h+'h';
  return h+'h '+m+'m';
}

function toggleEventDone(idx) {
  const ev=(S.events||[])[idx];if(!ev)return;
  ev.done=!ev.done;saveState();checkBadges();navigateTo('home');

function generateAndSavePlan() {
  const goal=S.goal;

  saveTodayPlan(generateTodayPlan(dailyMinutes));
  navigateTo('home');showToast('今日の計画を生成しました');
}

function calcRemainingDays(dateStr) {
  if(!dateStr)return 0;
  const now=new Date();now.setHours(0,0,0,0);
  return Math.max(0,Math.round((new Date(dateStr)-now)/86400000));
}

function calcTotalDays(dateStr) {
  if(!dateStr)return 365;
  const exam=new Date(dateStr),start=new Date(exam);
  start.setFullYear(start.getFullYear()-1);
  return Math.max(1,Math.round((exam-start)/86400000));
}

<script>
// ============================================================
// app-study.js — タイマー・カレンダー・勉強時間ログ
// ============================================================

let timerUpdateInterval = null;
let selectedCalDate     = null;
let currentCalDate      = new Date();
let studyLogTab         = 'day';

// StratoNote互換のグローバル変数
let tSubj = '';
let tRun  = false;
let tStart= 0;
let tIv   = null;

function updateHeaderTimer() {} // ヘッダータイマー廃止

// ============================================================
// TIMER — StratoNote完全模倣
// ============================================================

function renderTimer() {
  const subjects = getAllSubjects();
  // timerSubject をtSubjと同期
  if (!tSubj && timerSubject) tSubj = timerSubject;
  if (!timerSubject && tSubj) timerSubject = tSubj;

  const elapsed = tRun && tStart > 0 ? Date.now() - tStart : 0;
  const todayMs = getTodayMs();
  const runCls  = tRun ? 'running' : tStart > 0 ? 'paused' : '';
  const btnBg   = tRun ? 'var(--warn)' : 'var(--accent-soft)';
  const btnIcon = tRun ? '&#9646;&#9646;' : '&#9654;';

  const startLabel = tStart > 0
    ? `<div id="t-start-label" style="font-size:12px;color:var(--text-muted);margin-top:4px;text-align:center">開始: ${pad(new Date(tStart).getHours())}:${pad(new Date(tStart).getMinutes())}:${pad(new Date(tStart).getSeconds())}</div>` : '';

  const chipsHtml = subjects.map(s=>{
    const color=getSubjectColor(s),isOn=s===tSubj;
    return `<div class="chip ${isOn?'active':''}" onclick="selTS(this,'${sanitize(s)}')"
      style="${isOn?`border-color:${color};color:${color}`:''}">${sanitize(s)}</div>`;
  }).join('');

  // 今日のセッション
  const todayStr=today();
  const todaySessions=(S.sessions||[]).filter(s=>localDateStr(new Date(s.ts))===todayStr).slice().reverse();
  const sessHtml=todaySessions.length
    ? todaySessions.map(s=>{
        const color=getSubjectColor(s.subj);
        return `<div class="list-row">
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div>
            <div style="font-size:13px">${sanitize(s.subj)}</div>
          </div>
          <div style="font-size:12px;color:var(--text-muted)">${formatMsShort(s.dur)}</div>
        </div>`;
      }).join('')
    : '<div style="font-size:12px;color:var(--text-muted);text-align:center;padding:8px">まだ記録なし</div>';

  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="navigateTo('study')">← 戻る</button>
      <div><div class="page-title" style="font-size:18px">タイマー</div></div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">教科を選択</div>
    <div class="chips" id="tchips">${chipsHtml}</div>
  </div>

  <div class="card" style="text-align:center;padding:20px 16px">
    <div class="timer-display ${runCls}" id="tdisp">${formatMs(elapsed)}</div>
    <div style="font-size:12px;color:var(--text-muted);margin-top:4px" id="tslbl" style="color:${getSubjectColor(tSubj)}">${tSubj||'教科を選択'}</div>
    ${startLabel}
    <div style="margin:16px 0">
      <button onclick="toggleT()" id="tbtn" style="width:72px;height:72px;border-radius:50%;border:none;font-size:28px;cursor:pointer;background:${btnBg};color:#fff;display:inline-flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(76,168,216,.3);transition:background .2s">${btnIcon}</button>
    </div>
    <div style="font-size:13px;color:var(--text-secondary)">今日の累積:
      <b id="t-today-disp" style="color:var(--accent-strong);font-size:16px">${formatMs(todayMs)}</b>
    </div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:6px">${tRun?'タップで停止・記録':'タップで開始'}</div>
  </div>

  <div class="card">
    <div class="section-label">今日の記録</div>
    ${sessHtml}
  </div>`;
}

// StratoNote完全模倣
function selTS(el, s) {
  tSubj = s; timerSubject = s;
  const sc = getSubjectColor(s);
  document.querySelectorAll('#tchips .chip').forEach(c=>{
    c.classList.toggle('active',c===el);
    if(c===el){c.style.borderColor=sc;c.style.color=sc;}
    else{c.style.borderColor='';c.style.color='';}
  });
  const lbl=document.getElementById('tslbl');
  if(lbl){lbl.textContent=s;lbl.style.color=sc;}
}

function toggleT() {
  if (tRun) {
    // 停止
    tRun=false;
    clearInterval(tIv);tIv=null;
    const elapsed=Date.now()-tStart;
    if (elapsed>4000) {
      recordSession(tSubj, elapsed);
    } else {
      tStart=0;
      const disp=document.getElementById('tdisp');
      if(disp){disp.textContent='0:00:00';disp.className='timer-display';}
    }
    try{localStorage.removeItem(CFG.TIMER_KEY);}catch(e){}
  } else {
    if (!tSubj) tSubj = getAllSubjects()[0]||'';
    if (tStart===0) tStart=Date.now();
    S.todayMs_base=S.todayMs||0;
    tRun=true;
    clearInterval(tIv);
    tIv=setInterval(tickT,500);
    try{localStorage.setItem(CFG.TIMER_KEY,JSON.stringify({ts:tStart,subj:tSubj}));}catch(e){}
  }
  const btn=document.getElementById('tbtn');
  if(btn){btn.innerHTML=tRun?'&#9646;&#9646;':'&#9654;';btn.style.background=tRun?'var(--warn)':'var(--accent-soft)';}
  const disp=document.getElementById('tdisp');
  if(disp)disp.className='timer-display '+(tRun?'running':tStart>0?'paused':'');
  updateStartLabel();
}

function tickT() {
  const elapsed=tStart>0?Date.now()-tStart:0;
  const d=document.getElementById('tdisp');if(d)d.textContent=formatMs(elapsed);
  const base=S.todayMs_base||0;
  const el=document.getElementById('t-today-disp');
  if(el)el.textContent=formatMs(base+elapsed);
}

function updateStartLabel() {
  const disp=document.getElementById('tdisp');if(!disp)return;
  const old=document.getElementById('t-start-label');if(old)old.remove();
  if(tStart>0){
    const st=new Date(tStart);
    const lbl=document.createElement('div');lbl.id='t-start-label';
    lbl.style.cssText='font-size:12px;color:var(--text-muted);margin-top:4px;text-align:center';
    lbl.textContent='開始: '+pad(st.getHours())+':'+pad(st.getMinutes())+':'+pad(st.getSeconds());
    disp.parentNode.insertBefore(lbl,disp.nextSibling);
  }
}

function recordSession(subj, dur) {
  if(!subj||dur<=0)return;
  S.sessions=S.sessions||[];
  S.sessions.push({id:generateId(),subj,dur,ts:tStart||Date.now()-dur});
  updateTodayPlanActual(subj,dur);
  updateStreak();
  tStart=0;saveState();checkBadges();
  const disp=document.getElementById('tdisp');
  if(disp){disp.textContent='0:00:00';disp.className='timer-display';}
  const btn=document.getElementById('tbtn');
  if(btn){btn.innerHTML='&#9654;';btn.style.background='var(--accent-soft)';}
  const lbl=document.getElementById('t-start-label');if(lbl)lbl.remove();
  showToast(`${formatMs(dur)} 記録しました`);
  navigateTo('timer');
}

function restoreTimer() {
  try{
    const stored=localStorage.getItem(CFG.TIMER_KEY);if(!stored)return;
    const obj=JSON.parse(stored);
    const ts=obj.ts,subj=obj.subj;
    const elapsed=Date.now()-ts;if(elapsed<=0)return;
    tStart=ts;tSubj=subj||tSubj;timerSubject=tSubj;
    tRun=true;S.todayMs_base=S.todayMs||0;
    clearInterval(tIv);tIv=setInterval(tickT,500);
    const disp=document.getElementById('tdisp');
    if(disp){disp.textContent=formatMs(elapsed);disp.className='timer-display running';}
    const btn=document.getElementById('tbtn');
    if(btn){btn.innerHTML='&#9646;&#9646;';btn.style.background='var(--warn)';}
    showToast('タイマーを復元して再開中（'+formatMs(elapsed)+'経過）— タップで停止して記録');
  }catch(e){}
}

function calcLoad(ds){
  const evLoad=(S.events||[]).filter(e=>e.date===ds).reduce((a,e)=>a+(e.load||1),0);
  const sesLoad=Math.round((S.sessions||[]).filter(s=>localDateStr(new Date(s.ts))===ds).reduce((a,s)=>a+s.dur,0)/900000);
  return evLoad+sesLoad;
}

function calNav(delta) {
  currentCalDate=new Date(currentCalDate.getFullYear(),currentCalDate.getMonth()+delta,1);
  navigateTo('calendar');
}

function renderCalendarGrid() {
  const grid=document.getElementById('calendar-grid');if(!grid)return;
  const year=currentCalDate.getFullYear(),month=currentCalDate.getMonth();
  const todayStr=today(),daysInMonth=new Date(year,month+1,0).getDate();
  const firstDow=new Date(year,month,1).getDay(); // 0=日

  let html='';
  for(let i=0;i<firstDow;i++){
    const d=new Date(year,month,-firstDow+i+1);
    html+=`<div style="min-height:46px;border-radius:6px;opacity:0.3;padding:3px 2px"><span style="font-size:12px;font-weight:700">${d.getDate()}</span></div>`;
  }

  for(let d=1;d<=daysInMonth;d++){
    const ds=`${year}-${pad(month+1)}-${pad(d)}`;
    const isToday=ds===todayStr,isSel=ds===selectedCalDate;
    const evs=(S.events||[]).filter(e=>e.date===ds);
    const sessMs=(S.sessions||[]).filter(s=>s.dur>0&&localDateStr(new Date(s.ts))===ds).reduce((a,s)=>a+s.dur,0);
    const load=calcLoad(ds),incomplete=evs.filter(e=>!e.done).length;

    let bg='',border='',textColor='var(--text-secondary)';
    if(isToday){bg='background:var(--accent-strong);';textColor='#0d1117';}
    else if(isSel){border='border:1.5px solid var(--accent-soft);background:var(--accent-bg);';}

    const mini=[];
    if(sessMs>0){
      const hh=Math.floor(sessMs/3600000),mm=Math.floor((sessMs%3600000)/60000);
      mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':'var(--accent-soft)'};">${hh>0?hh+'h':''}${mm}m</div>`);
    }
    if(load>0)mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':load>=8?'var(--bad)':load>=4?'var(--warn)':'var(--ok)'};">負${load}</div>`);
    if(incomplete>0)mini.push(`<div style="font-size:8px;color:${isToday?'rgba(13,17,23,.7)':'var(--warn)'};">□${incomplete}</div>`);

    html+=`<div onclick="selectCalDate('${ds}')" style="min-height:46px;border-radius:6px;padding:3px 2px;cursor:pointer;${bg}${border}color:${textColor}">
      <div style="font-size:12px;font-weight:700">${d}</div>
      ${mini.join('')}
    </div>`;
  }
  grid.innerHTML=html;
}

function selectCalDate(ds) {
  selectedCalDate=ds;
  // 即時反映：グリッドだけ再描画してリスト部分を更新
  renderCalendarGrid();
  // 予定一覧を即時更新
  const container=document.getElementById('main-content');

function renderStudyLogCharts(){
  const container=document.getElementById('study-log-content');if(!container)return;
  const sessions=S.sessions||[];
  const groups={};
  sessions.forEach(s=>{
    if(!s.dur||s.dur<=0)return;
    const d=new Date(s.ts);
    let key;
    if(studyLogTab==='day')key=localDateStr(d);
    else if(studyLogTab==='week')key=weekKeyOf(d);
    else if(studyLogTab==='month')key=localMonthStr(d);
    else key=String(d.getFullYear());
    if(!groups[key])groups[key]={total:0,subj:{}};
    groups[key].total+=s.dur;
    groups[key].subj[s.subj]=(groups[key].subj[s.subj]||0)+s.dur;
  });

  const now=new Date(),allowed=new Set();
  if(studyLogTab==='day'){
    allowed.add(localDateStr(now));
    const yd=new Date(now);yd.setDate(yd.getDate()-1);allowed.add(localDateStr(yd));
  }else if(studyLogTab==='week'){
    allowed.add(weekKeyOf(now));
    const lw=new Date(now);lw.setDate(lw.getDate()-7);allowed.add(weekKeyOf(lw));
  }else if(studyLogTab==='month'){
    allowed.add(localMonthStr(now));
    const lm=new Date(now.getFullYear(),now.getMonth()-1,1);allowed.add(localMonthStr(lm));
  }else{allowed.add(String(now.getFullYear()));allowed.add(String(now.getFullYear()-1));}

  const keys=Object.keys(groups).filter(k=>allowed.has(k)).sort().reverse();
  if(!keys.length){
    container.innerHTML='<div style="text-align:center;padding:32px;color:var(--text-muted);font-size:13px">記録がありません</div>';return;
  }

  const totalAll=keys.reduce((a,k)=>a+groups[k].total,0);
  const avgMs=keys.length?Math.round(totalAll/keys.length):0;
  const unitLabel={day:'日数',week:'週数',month:'月数',year:'年数'}[studyLogTab];

  const summaryHtml=`<div class="card"><div class="stats-row">
    <div class="stat-card"><div class="stat-val" style="font-size:16px">${formatMsShort(totalAll)}</div><div class="stat-lbl">合計</div></div>
    <div class="stat-card"><div class="stat-val">${keys.length}</div><div class="stat-lbl">${unitLabel}</div></div>
    <div class="stat-card"><div class="stat-val" style="font-size:16px">${keys.length?formatMsShort(avgMs):'−'}</div><div class="stat-lbl">平均</div></div>
  </div></div>`;

  const blocksHtml=keys.map(k=>{
    const g=groups[k];
    const tot=Object.values(g.subj).reduce((a,b)=>a+b,0)||1;
    const entries=Object.entries(g.subj).sort((a,b)=>b[1]-a[1]);
    const cid='slpie'+(_trendCID++);

    const legendHtml=entries.map(([subj,ms])=>{
      const pct=Math.round(ms/tot*100),color=getSubjectColor(subj);
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
        <div style="font-size:11px;font-weight:700;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;color:${color}">${sanitize(subj)}</div>
        <div style="font-size:11px;color:var(--text-muted);white-space:nowrap">${formatMsShortSec(ms)}</div>
        <div style="font-size:11px;font-weight:800;color:var(--accent-strong);width:32px;text-align:right">${pct}%</div>
      </div>`;
    }).join('');

    // 円グラフ描画
    (function(cid,entries,tot){
      requestAnimationFrame(()=>setTimeout(()=>{
        const cv=document.getElementById(cid);if(!cv)return;
        const dpr=window.devicePixelRatio||1,S_=90;
        cv.width=S_*dpr;cv.height=S_*dpr;cv.style.width=S_+'px';cv.style.height=S_+'px';
        const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
        const cx=S_/2,cy=S_/2,R=S_/2-3,inner=R*0.55;
        let angle=-Math.PI/2;
        entries.forEach(([subj,ms])=>{
          const sweep=(ms/tot)*Math.PI*2;
          ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,angle,angle+sweep);ctx.closePath();
          ctx.fillStyle=getSubjectColor(subj);ctx.fill();
          ctx.strokeStyle='#0d1117';ctx.lineWidth=1;ctx.stroke();
          angle+=sweep;
        });
        ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#161b22';ctx.fill();
        const th=Math.floor(tot/3600000),tm=Math.floor((tot%3600000)/60000);
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#fff';ctx.font=`bold 10px sans-serif`;ctx.fillText(`${th}h${pad(tm)}m`,cx,cy-4);
        ctx.fillStyle='#8b949e';ctx.font='8px sans-serif';ctx.fillText(fmtLogKey(k),cx,cy+6);
      },20));
    })(cid,entries,tot);

    return `<div class="card">
      <div class="flex justify-between items-center mb-10">
        <div style="font-size:13px;font-weight:800">${fmtLogKey(k)}</div>
        <div style="font-size:17px;font-weight:800;color:var(--accent-strong)">${formatMsShort(g.total)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
        <canvas id="${cid}" width="90" height="90" style="width:90px;height:90px;flex-shrink:0"></canvas>
        <div style="flex:1;min-width:120px">${legendHtml}</div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML=summaryHtml+blocksHtml;
}

function fmtLogKey(k){
  if(studyLogTab==='day'){const p=k.split('-');return `${p[0]}年${+p[1]}月${+p[2]}日`;}
  if(studyLogTab==='week'){const ws=new Date(k+'T00:00:00'),we=new Date(ws);we.setDate(ws.getDate()+6);return `${ws.getMonth()+1}/${ws.getDate()}〜${we.getMonth()+1}/${we.getDate()}`;}
  if(studyLogTab==='month'){const p=k.split('-');return `${p[0]}年${+p[1]}月`;}
  return k+'年';
}

<script>
// ============================================================
// app-flash.js
// 依存: config.js, store.js, app-core.js
// 責務: 暗記カード全機能（忘却曲線・記憶度・カード編集）

let currentDeckIndex    = -1;
let fcQueue             = [];
let fcQueueIndex        = 0;
let fcFlipped           = false;
let fcStudyMode         = 'all';
let fcDirection         = 'normal';
let fcTimerStart        = 0;
let fcTimerSubject      = '';

// ============================================================
// 忘却曲線ヘルパー

function isDue(c) {
  if (!c.lastReview) return true;
  const t  = (Date.now() - c.lastReview) / 86400000;
  const st = c.stability || 1;
  return Math.exp(-t / st) < 0.7;
}

function isNew(c) { return !c.reps || c.reps === 0; }

function buildFCQueue(cards) {
  let arr;
  if      (fcStudyMode === 'rec') arr = cards.filter(isDue);
  else if (fcStudyMode === 'new') arr = cards.filter(isNew);
  else                            arr = [...cards];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
// FLASHCARD HUB — デッキ一覧
// ============================================================

function renderFlashcardHub() {
  const decks = S.decks || [];

  const addBarHtml = `<div class="card">
    <div class="section-label">新しいデッキを作成</div>
    <div class="flex gap-8" style="flex-wrap:wrap;align-items:flex-end">

      <div style="width:110px;flex-shrink:0">
        <label>教科</label>
        <select id="fc-deck-subj">${getAllSubjects().map(s=>`<option value="${sanitize(s)}">${sanitize(s)}</option>`).join('')}</select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="saveDeckInline()" style="margin-bottom:0;align-self:flex-end">作成</button>
    </div>
  </div>`;

  const deckListHtml = decks.length
    ? decks.map((dk, i) => {
        const all  = dk.cards || [];
        const due  = all.filter(isDue).length;
        const newC = all.filter(isNew).length;
        const mast = all.filter(c => (c.stability||0) >= 21).length;
        const pct  = all.length ? Math.round(mast / all.length * 100) : 0;
        const color= getSubjectColor(dk.subj);
        return `<div class="card" style="cursor:pointer" onclick="startDeck(${i})">
          <div class="flex justify-between items-center">
            <div style="flex:1;min-width:0">
              <div style="font-size:14px;font-weight:800;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${sanitize(dk.name)}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${sanitize(dk.subj)} · ${all.length}枚 · 復習推奨: <b style="color:${due>0?'var(--bad)':'var(--ok)'}">${due}</b> · 未学習: ${newC}</div>
            </div>
            <div style="text-align:right;flex-shrink:0;margin-left:10px">
              <div style="font-size:15px;font-weight:800;color:${color}">${pct}%</div>
              <div style="font-size:9px;color:var(--text-muted)">習得</div>
            </div>
          </div>
          <div class="bar-track mt-8"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <div style="text-align:right;margin-top:6px">
            <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteDeck(${i})" style="font-size:11px">✕ 削除</button>
          </div>
        </div>`;
      }).join('')
    : '<div class="card"><div style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px">デッキがありません</div></div>';

  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="navigateTo('study')">← 学習</button>
      <div class="page-title" style="font-size:18px">暗記カード</div>
    </div>
  </div>
