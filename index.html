  ${deckListHtml}`;
}

function saveDeckInline() {
  const name = document.getElementById('fc-deck-name')?.value.trim();
  if (!name) { showToast('デッキ名を入力してください'); return; }
  const subj = document.getElementById('fc-deck-subj')?.value || getAllSubjects()[0] || '';
  S.decks = S.decks || [];
  S.decks.push({ id: generateId(), name: sanitize(name), subj, cards: [] });
  saveState();
  showToast('デッキを作成しました');
  navigateTo('flashcard');
}

function startDeck(i) {
  currentDeckIndex = i;
  fcStudyMode  = 'all';
  fcDirection  = 'normal';
  fcQueue      = [];
  fcQueueIndex = 0;
  navigateTo('flashcard-study');
}

function deleteDeck(i) {
  if (!confirm('このデッキを削除しますか？')) return;
  S.decks.splice(i, 1);
  if (currentDeckIndex === i) currentDeckIndex = -1;
  saveState();
  showToast('削除しました');
  navigateTo('flashcard');
}

// ============================================================
// FLASHCARD SETUP → STUDY
// ============================================================

function renderFlashcardStudy() {
  if (currentDeckIndex < 0 || currentDeckIndex >= (S.decks||[]).length) {
    navigateTo('flashcard'); return '';
  }
  const deck = S.decks[currentDeckIndex];
  const all  = deck.cards || [];

  // キューが空ならセットアップ画面を表示
  if (!fcQueue.length) return renderFlashcardSetup(deck, all);

  const card = fcQueue[fcQueueIndex] || null;
  const pct  = fcQueue.length ? Math.round(fcQueueIndex / fcQueue.length * 100) : 0;

  if (!card) {
    // 完了画面
    stopFlashcardTimer();
    saveState(); checkBadges();
    return `<div class="page-header">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="backToFlashcardSetup()">← 設定</button>
        <div style="font-size:15px;font-weight:800">${sanitize(deck.name)}</div>
      </div>
    </div>
    <div class="card" style="text-align:center;padding:32px 16px">
      <div style="font-size:32px;margin-bottom:12px">🎉</div>
      <div style="font-size:15px;font-weight:800;margin-bottom:8px">セッション完了！</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:20px">${fcQueue.length}枚のカードを確認しました</div>
      <button class="btn btn-primary btn-full" onclick="restartFlashcardSession()">もう一度</button>
    </div>`;
  }

  const qText = sanitize(fcDirection === 'reverse' ? card.a : card.q);
  const aText = sanitize(fcDirection === 'reverse' ? card.q : card.a);
  const qlbl  = fcDirection === 'reverse' ? 'ANSWER' : 'QUESTION';
  const albl  = fcDirection === 'reverse' ? 'QUESTION' : 'ANSWER';

  let memInfo = '';
  if (card.lastReview) {
    const R = Math.round(Math.exp(-(Date.now()-card.lastReview)/86400000/(card.stability||1))*100);
    memInfo = `<span style="background:var(--accent-bg);color:var(--accent-strong);border-radius:12px;padding:3px 8px;font-size:11px;font-weight:700">記憶度: ${R}%</span>`;
  }

  return `<div class="flex justify-between items-center mb-10">
    <button class="btn btn-ghost btn-sm" onclick="backToFlashcardSetup()">← 設定</button>
    <b style="font-size:14px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:180px">${sanitize(deck.name)}</b>
    <button class="btn btn-secondary btn-sm" onclick="openModal('modal-card')">+ カード</button>
  </div>
  <div class="flashcard-progress-bar">
    <span style="font-size:12px">${fcQueueIndex}/${fcQueue.length}</span>
    <div class="flashcard-progress-track"><div class="flashcard-progress-fill" style="width:${pct}%"></div></div>
    <span style="font-size:12px">${pct}%</span>
  </div>
  <div class="flashcard-wrap">
    <div class="flashcard ${fcFlipped?'flipped':''}" id="fc-card" onclick="flipCard()">
      <div class="flashcard-face flashcard-front">
        <div class="flashcard-label">${qlbl}</div>
        <div class="flashcard-text">${qText}</div>
      </div>
      <div class="flashcard-face flashcard-back">
        <div class="flashcard-label">${albl}</div>
        <div class="flashcard-text">${aText}</div>
      </div>
    </div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--text-muted);margin-bottom:10px">タップで答えを確認</div>
  <div id="fc-answer-btns" style="display:${fcFlipped?'flex':'none'};gap:10px;justify-content:center;margin-bottom:12px">
    <button class="btn" style="background:var(--ok-bg);color:var(--ok);border:1.5px solid rgba(58,170,114,.25);flex:1;justify-content:center" onclick="rateCard('ok')">○ 正解</button>
    <button class="btn" style="background:var(--bad-bg);color:var(--bad);border:1.5px solid rgba(226,75,74,.25);flex:1;justify-content:center" onclick="rateCard('ng')">✗ 不正解</button>
    <button class="btn btn-ghost btn-sm" onclick="rateCard('skip')">スキップ</button>
  </div>
  <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:4px;font-size:11px">${memInfo}</div>
  <div style="text-align:center;margin-top:10px">
    <button class="btn btn-ghost btn-sm" onclick="openCardEdit()">このカードを編集</button>
  </div>`;
}

function renderFlashcardSetup(deck, all) {
  const due  = all.filter(isDue).length;
  const newC = all.filter(isNew).length;
  const modes = [
    { k:'all',  l:'全て',     cnt:all.length, desc:'すべてのカードをシャッフル' },
    { k:'rec',  l:'おすすめ', cnt:due,        desc:'忘却曲線に基づく復習推奨カード' },
    { k:'new',  l:'未学習',   cnt:newC,       desc:'まだ一度も学習していないカード' },
  ];
  const modesHtml = modes.map(m => `<button class="btn ${fcStudyMode===m.k?'btn-primary':'btn-secondary'}"
    onclick="fcStudyMode='${m.k}';navigateTo('flashcard-study')"
    style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:8px;padding:12px 14px">
    <span style="text-align:left"><b>${m.l}</b><br><span style="font-size:11px;opacity:.75">${m.desc}</span></span>
    <span style="font-size:16px;font-weight:800">${m.cnt}枚</span>
  </button>`).join('');

  const dirHtml = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="btn ${fcDirection==='normal'?'btn-primary':'btn-secondary'}" onclick="fcDirection='normal';navigateTo('flashcard-study')"
      style="flex-direction:column;gap:4px;padding:12px 8px;justify-content:center;align-items:center">
      <span style="font-size:18px">▶</span><span style="font-size:12px">問題 → 答え</span>
    </button>
    <button class="btn ${fcDirection==='reverse'?'btn-primary':'btn-secondary'}" onclick="fcDirection='reverse';navigateTo('flashcard-study')"
      style="flex-direction:column;gap:4px;padding:12px 8px;justify-content:center;align-items:center">
      <span style="font-size:18px">◀</span><span style="font-size:12px">答え → 問題</span>
    </button>
  </div>`;

  const stats = `<div class="stats-row">
    <div class="stat-card"><div class="stat-val">${all.length}</div><div class="stat-lbl">合計</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--ok)">${all.filter(c=>c.status==='ok').length}</div><div class="stat-lbl">正解済</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--bad)">${all.filter(c=>c.status==='ng').length}</div><div class="stat-lbl">不正解</div></div>
  </div>`;

  return `<div class="flex justify-between items-center mb-12">
    <button class="btn btn-ghost btn-sm" onclick="currentDeckIndex=-1;navigateTo('flashcard')">← 戻る</button>
    <b style="font-size:14px">${sanitize(deck.name)}</b>
    <button class="btn btn-secondary btn-sm" onclick="openModal('modal-card')">+ カード</button>
  </div>
  ${stats}
  <div class="card">
    <div class="section-label">出題方向</div>
    ${dirHtml}
  </div>
  <div class="card">
    <div class="section-label">出題範囲</div>
    ${modesHtml}
  </div>
  <button class="btn btn-primary btn-full" style="padding:14px;font-size:15px;justify-content:center" onclick="startStudySession()">▶ 学習開始</button>`;
}

function startStudySession() {
  const deck = (S.decks||[])[currentDeckIndex];
  if (!deck) return;
  fcQueue = buildFCQueue(deck.cards || []);
  fcQueueIndex = 0;
  fcFlipped = false;
  if (!fcQueue.length) { showToast('このモードにカードがありません'); return; }
  fcTimerStart   = Date.now();
  fcTimerSubject = deck.subj || timerSubject || getAllSubjects()[0] || '';
  navigateTo('flashcard-study');
}

function backToFlashcardSetup() {
  stopFlashcardTimer();
  fcQueue = []; fcQueueIndex = 0; fcFlipped = false;
  navigateTo('flashcard-study');
}

function restartFlashcardSession() {
  fcQueueIndex = 0; fcFlipped = false;
  const deck = (S.decks||[])[currentDeckIndex];
  if (deck) {
    fcQueue = buildFCQueue(deck.cards || []);
    fcTimerStart   = Date.now();
    fcTimerSubject = deck.subj || '';
  }
  navigateTo('flashcard-study');
}

function flipCard() {
  if (fcFlipped) return;
  const el = document.getElementById('fc-card');
  if (el) el.classList.add('flipped');
  const ans = document.getElementById('fc-answer-btns');
  if (ans) ans.style.display = 'flex';
  fcFlipped = true;
}

function rateCard(result) {
  if (fcQueueIndex >= fcQueue.length) return;
  const card = fcQueue[fcQueueIndex];
  const deck = (S.decks||[])[currentDeckIndex];
  if (!deck) return;
  const real = (deck.cards||[]).find(c => c.id === card.id);

  if (real && result !== 'skip') {
    real.reps       = (real.reps || 0) + 1;
    real.lastReview = Date.now();
    let st = real.stability || 1;
    if (result === 'ok') st = st * (1.8 + 0.1 * (real.reps||1));
    else                 st = Math.max(1, st * 0.3);
    real.stability = Math.min(st, 365);
    real.status    = result;
    const nd = new Date(); nd.setDate(nd.getDate() + Math.round(real.stability));
    real.dueDate = localDateStr(nd);
  }

  fcQueueIndex++;
  fcFlipped = false;
  saveState(); checkBadges();
  navigateTo('flashcard-study');
}

function stopFlashcardTimer() {
  if (fcTimerStart <= 0) return;
  const dur  = Date.now() - fcTimerStart;
  const subj = fcTimerSubject;
  fcTimerStart = 0; fcTimerSubject = '';
  if (dur >= 4000 && subj && currentDeckIndex >= 0) {
    S.sessions = S.sessions || [];
    S.sessions.push({ id: generateId(), subj, dur, ts: Date.now() - dur });
    updateStreak(); saveState();
    showToast(`${formatMsShort(dur)} 暗記カード記録`);
  }
}

// ============================================================
// カード編集オーバーレイ
// ============================================================

function openCardEdit() {
  const deck = (S.decks||[])[currentDeckIndex]; if (!deck) return;
  const card = fcQueue[fcQueueIndex]; if (!card) return;
  const real = (deck.cards||[]).find(c => c.id === card.id); if (!real) return;

  const prev = document.getElementById('fc-edit-overlay'); if (prev) prev.remove();
  const overlay = document.createElement('div');
  overlay.id = 'fc-edit-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1100;display:flex;align-items:flex-end;justify-content:center';
  const inner = document.createElement('div');
  inner.style.cssText = 'background:var(--bg-card);border-radius:14px 14px 0 0;padding:20px 18px;width:100%;max-width:520px;padding-bottom:calc(20px + var(--safe-bottom));border-top:2px solid var(--accent-soft)';
  inner.innerHTML = `<div style="font-size:15px;font-weight:800;margin-bottom:14px">カードを編集</div>
    <div class="form-group"><label>問題</label><textarea id="fc-edit-q" rows="3" style="background:var(--bg-base);color:var(--text-primary);border:1px solid var(--bg-border);border-radius:9px;padding:9px 12px;width:100%;font-family:inherit;font-size:14px;resize:vertical">${sanitize(real.q)}</textarea></div>
    <div class="form-group"><label>答え</label><textarea id="fc-edit-a" rows="3" style="background:var(--bg-base);color:var(--text-primary);border:1px solid var(--bg-border);border-radius:9px;padding:9px 12px;width:100%;font-family:inherit;font-size:14px;resize:vertical">${sanitize(real.a)}</textarea></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="document.getElementById('fc-edit-overlay').remove()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveCardEdit('${real.id}')">保存</button>
    </div>`;
  overlay.appendChild(inner);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  overlay._origId = real.id;
  document.body.appendChild(overlay);
}

function saveCardEdit(cardId) {
  const deck = (S.decks||[])[currentDeckIndex]; if (!deck) return;
  const newQ = document.getElementById('fc-edit-q')?.value.trim();
  const newA = document.getElementById('fc-edit-a')?.value.trim();
  if (!newQ || !newA) { showToast('問題と答えを入力してください'); return; }
  const real = (deck.cards||[]).find(c => c.id === cardId);
  if (real) { real.q = sanitize(newQ); real.a = sanitize(newA); }
  const qcard = fcQueue[fcQueueIndex];
  if (qcard && qcard.id === cardId) { qcard.q = sanitize(newQ); qcard.a = sanitize(newA); }
  saveState();
  document.getElementById('fc-edit-overlay')?.remove();
  showToast('カードを更新しました');
  navigateTo('flashcard-study');
}

// ============================================================
// カード追加（モーダル経由）
// ============================================================

function saveCard() {
  const deck = (S.decks||[])[currentDeckIndex];
  if (!deck) { showToast('デッキを選択してください'); return; }
  const q = document.getElementById('input-card-front')?.value.trim();
  const a = document.getElementById('input-card-back')?.value.trim();
  if (!q || !a) { showToast('表面と裏面を入力してください'); return; }
  deck.cards = deck.cards || [];
  deck.cards.push({ id: generateId(), q: sanitize(q), a: sanitize(a), reps: 0, status: null });
  saveState();
  closeModal('modal-card');
  document.getElementById('input-card-front').value = '';
  document.getElementById('input-card-back').value  = '';
  showToast('カードを追加しました');
  navigateTo('flashcard-study');
}

// StratoNote互換エイリアス
function saveCards() { saveCard(); }
function saveDk() { saveDeckInline(); }
function delDk(i) { deleteDeck(i); }


</script>
<script>
// ============================================================
// app-skill.js
// 依存: config.js, store.js, app-core.js
// 責務: スキルツリー・計画エンジン・週間計画
// ============================================================

let currentSkillSubject = '';
let skMapPanCleanup     = null;

// ============================================================
// SKILL HUB
// ============================================================

function renderSkillHub() {
  const subjects = getAllSubjects();
  const cardsHtml = subjects.map(subj => {
    const skills = S.skills[subj] || [];
    const total  = skills.length;
    const done   = skills.filter(s => s.done).length;
    const pct    = total > 0 ? Math.round(done / total * 100) : 0;
    const color  = getSubjectColor(subj);
    return `<div class="skill-subj-card ${total>0?'has-skills':''}" onclick="openSkillMap('${sanitize(subj)}')">
      <div class="skill-subj-name">${sanitize(subj)}</div>
      <div class="skill-subj-count">${done}/${total} 達成</div>
      <div class="skill-subj-bar" style="width:${pct}%;background:${color}"></div>
    </div>`;
  }).join('');

  return `<div class="page-header"><div class="page-title">スキル</div></div>
    <div class="skill-subj-grid">${cardsHtml}</div>`;
}

// ============================================================
// SKILL MAP — フルスクリーンオーバーレイ
// ============================================================

function openSkillMap(subj) {
  currentSkillSubject = subj;
  let overlay = document.getElementById('skill-map-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'skill-map-overlay';
    overlay.style.cssText = `
      display:none;position:fixed;inset:0;z-index:500;
      background:var(--bg-base);flex-direction:column;
      padding-top:var(--safe-top);`;
    overlay.innerHTML = `
      <div id="sk-map-hd" style="background:var(--bg-card);border-bottom:1px solid var(--bg-border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="closeSkillMap()">← 戻る</button>
          <div id="sk-map-title" style="font-size:15px;font-weight:800"></div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span id="sk-map-count" style="font-size:11px;color:var(--text-muted)"></span>
          <button class="btn btn-ghost btn-sm" onclick="resetSkillLayout()" style="font-size:11px">↺</button>
        </div>
      </div>
      <div id="sk-map-add-bar" style="background:var(--bg-card);border-bottom:1px solid var(--bg-border);padding:8px 14px;flex-shrink:0;display:flex;gap:8px;align-items:center">
        <input id="sk-map-inp" placeholder="スキル名を入力（Enterで追加）" style="flex:1;padding:7px 10px;font-size:13px;background:var(--bg-base);color:var(--text-primary);border:1px solid var(--bg-border);border-radius:8px;font-family:inherit"
          onkeydown="if(event.key==='Enter')addSkillNodeInline()">
        <button class="btn btn-primary btn-sm" onclick="addSkillNodeInline()">＋ 追加</button>
      </div>
      <div style="font-size:10px;color:var(--text-muted);padding:4px 14px;background:var(--bg-card);border-bottom:1px solid var(--bg-border);flex-shrink:0">
        タップ: 完了/未完了 ｜ ✕: 削除 ｜ ＋: 子スキル追加 ｜ ドラッグ: 移動
      </div>
      <div id="sk-map-body" style="flex:1;overflow:hidden;padding:0;position:relative;cursor:grab;user-select:none;touch-action:none">
        <div id="sk-map-svg-wrap" style="display:inline-block;min-width:100%;position:absolute;top:0;left:0"></div>
      </div>`;
    document.body.appendChild(overlay);
  }
  overlay.style.display = 'flex';
  renderSkillTree(subj);
}

function closeSkillMap() {
  const overlay = document.getElementById('skill-map-overlay');
  if (overlay) overlay.style.display = 'none';
  if (skMapPanCleanup) { skMapPanCleanup(); skMapPanCleanup = null; }
  navigateTo('skill');
}

function renderSkillTree(subj) {
  subj = subj || currentSkillSubject;
  const titleEl = document.getElementById('sk-map-title');
  const countEl = document.getElementById('sk-map-count');
  if (titleEl) titleEl.textContent = subj;
  const skills = S.skills[subj] || [];
  const done   = skills.filter(s => s.done).length;
  if (countEl) countEl.textContent = `${done}/${skills.length} 達成`;

  const wrap = document.getElementById('sk-map-svg-wrap');
  if (!wrap) return;

  if (!skills.length) {
    wrap.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text-muted);font-size:13px">スキルを追加してください</div>';
    return;
  }

  const NW = 130, NH = 38, hGap = 36, vGap = 64;
  const MARGIN = 14;
  const color  = getSubjectColor(subj);

  // skillmap用indexを構築
  const im = {};
  skills.forEach(sk => im[sk.id] = sk);

  // 自動レイアウト（ツリー構造）
  const roots = skills.filter(sk => !sk.parentId);
  const pos   = {};

  function allAncestorsDone(id, map) {
    let cur = map[id];
    while (cur && cur.parentId) {
      cur = map[cur.parentId];
      if (!cur || !cur.done) return false;
    }
    return true;
  }

  let colIdx = 0;
  function calcPos(sk, depth) {
    const children = skills.filter(s => s.parentId === sk.id);
    if (!children.length) {
      pos[sk.id] = { x: MARGIN + colIdx * (NW + hGap), y: 20 + depth * (NH + vGap) };
      colIdx++;
    } else {
      children.forEach(c => calcPos(c, depth + 1));
      const xs = children.map(c => pos[c.id].x);
      pos[sk.id] = { x: (Math.min(...xs) + Math.max(...xs) + NW) / 2 - NW/2, y: 20 + depth * (NH + vGap) };
    }
  }
  roots.forEach(r => calcPos(r, 0));

  // 手動位置を適用
  skills.forEach(sk => {
    if (sk.manualX !== undefined) pos[sk.id] = { x: sk.manualX, y: sk.manualY };
  });

  const maxX = Math.max(...Object.values(pos).map(p => p.x)) + NW + 30;
  const maxY = Math.max(...Object.values(pos).map(p => p.y)) + NH + 30;

  let linesSvg = '', nodesSvg = '';

  skills.forEach(sk => {
    if (!sk.parentId || !pos[sk.id] || !pos[sk.parentId]) return;
    const pp = pos[sk.parentId];
    const cp = pos[sk.id];
    const x1 = pp.x + NW/2, y1 = pp.y + NH, x2 = cp.x + NW/2, y2 = cp.y;
    const midy = (y1 + y2) / 2;
    const isDoneConn = sk.done && im[sk.parentId]?.done;
    linesSvg += `<path d="M${x1},${y1} C${x1},${midy} ${x2},${midy} ${x2},${y2}"
      fill="none" stroke="${isDoneConn ? color : '#2d333b'}" stroke-width="${isDoneConn?2:1.5}"
      ${!isDoneConn ? 'stroke-dasharray="5,4"' : ''}/>`;
  });

  skills.forEach(sk => {
    const p = pos[sk.id]; if (!p) return;
    const x = p.x, y = p.y;
    const fillC  = sk.done ? color : '#21262d';
    const textC  = sk.done ? '#0d1117' : '#8b949e';
    const strokeC= sk.done ? color : '#2d333b';
    const label  = sanitize(sk.name).slice(0, 14);

    nodesSvg += `<g data-drag="1" data-id="${sk.id}" style="cursor:pointer">
      <rect x="${x}" y="${y}" width="${NW}" height="${NH}" rx="8" fill="${fillC}" stroke="${strokeC}" stroke-width="1.5"/>
      <text x="${x+NW/2}" y="${y+NH/2+1}" text-anchor="middle" dominant-baseline="middle"
        font-size="11" font-weight="700" fill="${textC}" font-family="sans-serif" pointer-events="none">${label}</text>
      <text x="${x+NW-6}" y="${y+8}" text-anchor="end" dominant-baseline="hanging" font-size="14" fill="#8b949e" style="cursor:pointer"
        onclick="deleteSkillNode('${sk.id}')">✕</text>
      <text x="${x+NW-6}" y="${y+NH-6}" text-anchor="end" dominant-baseline="auto" font-size="14" fill="${color}" style="cursor:pointer"
        onclick="addSkillNode('${sk.id}')">＋</text>
    </g>`;
  });

  const svgW = Math.max(maxX, 300);
  const svgH = Math.max(maxY, 200);

  wrap.innerHTML = `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}"
    style="display:block;min-width:${svgW}px;min-height:${svgH}px">
    ${linesSvg}${nodesSvg}
  </svg>`;

  // ドラッグ（ノード移動）
  const svg = wrap.querySelector('svg');
  const THRESHOLD = 6;
  wrap.querySelectorAll('g[data-drag="1"]').forEach(g => {
    const id = g.getAttribute('data-id');
    let dragging = false, moved = false, startX = 0, startY = 0, origX = 0, origY = 0;
    function getXY(e) {
      const t = e.touches ? e.touches[0] : e;
      const rect = svg.getBoundingClientRect();
      return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }
    function onStart(e) {
      if (e.target.tagName === 'text') return;
      const xy = getXY(e);
      startX = xy.x; startY = xy.y;
      origX = pos[id]?.x || 0; origY = pos[id]?.y || 0;
      dragging = true; moved = false; g._dragged = false;
    }
    function onMove(e) {
      if (!dragging) return;
      const xy = getXY(e);
      const dx = xy.x - startX, dy = xy.y - startY;
      if (!moved && Math.sqrt(dx*dx+dy*dy) < THRESHOLD) return;
      moved = true; g._dragged = true;
      const nx = Math.max(MARGIN, origX + dx), ny = Math.max(10, origY + dy);
      const rect = g.querySelector('rect');
      if (rect) { rect.setAttribute('x', nx); rect.setAttribute('y', ny); }
      g.querySelectorAll('text').forEach(t => {
        const ox = parseFloat(t.getAttribute('data-ox') || t.getAttribute('x'));
        const oy = parseFloat(t.getAttribute('data-oy') || t.getAttribute('y'));
        if (!t.getAttribute('data-ox')) { t.setAttribute('data-ox', ox); t.setAttribute('data-oy', oy); }
        t.setAttribute('x', parseFloat(t.getAttribute('data-ox')) + (nx - origX));
        t.setAttribute('y', parseFloat(t.getAttribute('data-oy')) + (ny - origY));
      });
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      if (moved) {
        const rect = g.querySelector('rect');
        if (rect) {
          const sk = im[id];
          if (sk) { sk.manualX = Math.round(parseFloat(rect.getAttribute('x'))); sk.manualY = Math.round(parseFloat(rect.getAttribute('y'))); }
        }
        saveState();
        renderSkillTree(currentSkillSubject);
      }
      setTimeout(() => { g._dragged = false; }, 50);
    }
    g.addEventListener('pointerdown', onStart);
    g.addEventListener('pointermove', onMove);
    g.addEventListener('pointerup',   onEnd);
    g.addEventListener('pointercancel', onEnd);
    // タップで完了/未完了
    g.addEventListener('click', e => {
      if (g._dragged || e.target.tagName === 'text') return;
      const sk = im[id]; if (!sk) return;
      sk.done = !sk.done; saveState(); checkBadges(); renderSkillTree(currentSkillSubject);
    });
  });

  // パン（画面移動）
  initSkillMapPan(wrap);
}

function initSkillMapPan(wrap) {
  const body = document.getElementById('sk-map-body'); if (!body) return;
  if (skMapPanCleanup) { skMapPanCleanup(); skMapPanCleanup = null; }
  let panX = 0, panY = 0, startX = 0, startY = 0, startPanX = 0, startPanY = 0, isPanning = false;
  const m = (wrap.style.transform || '').match(/translate\((-?[\d.]+)px,\s*(-?[\d.]+)px\)/);
  if (m) { panX = parseFloat(m[1]); panY = parseFloat(m[2]); }
  function applyTransform() { wrap.style.transform = `translate(${panX}px,${panY}px)`; }
  applyTransform();
  function isOnNode(t) { return !!(t && t.closest && t.closest('g[data-drag="1"]')); }
  function onStart(e) {
    if (isOnNode(e.target)) return;
    isPanning = true; startX = e.clientX; startY = e.clientY; startPanX = panX; startPanY = panY;
    body.style.cursor = 'grabbing';
  }
  function onMove(e) {
    if (!isPanning) return;
    panX = startPanX + (e.clientX - startX); panY = startPanY + (e.clientY - startY); applyTransform();
  }
  function onEnd() { isPanning = false; body.style.cursor = 'grab'; }
  let touchId = null;
  function onTouchStart(e) {
    if (isOnNode(e.target) || e.touches.length !== 1) return;
    touchId = e.touches[0].identifier; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPanX = panX; startPanY = panY; isPanning = true;
  }
  function onTouchMove(e) {
    if (!isPanning || touchId === null) return;
    const t = Array.from(e.changedTouches).find(x => x.identifier === touchId); if (!t) return;
    e.preventDefault(); panX = startPanX + (t.clientX - startX); panY = startPanY + (t.clientY - startY); applyTransform();
  }
  function onTouchEnd() { isPanning = false; touchId = null; }
  body.addEventListener('pointerdown', onStart);
  body.addEventListener('pointermove', onMove);
  body.addEventListener('pointerup',   onEnd);
  body.addEventListener('pointercancel', onEnd);
  body.addEventListener('touchstart', onTouchStart, { passive: true });
  body.addEventListener('touchmove',  onTouchMove,  { passive: false });
  body.addEventListener('touchend',   onTouchEnd);
  skMapPanCleanup = () => {
    body.removeEventListener('pointerdown', onStart);
    body.removeEventListener('pointermove', onMove);
    body.removeEventListener('pointerup',   onEnd);
    body.removeEventListener('pointercancel', onEnd);
    body.removeEventListener('touchstart', onTouchStart);
    body.removeEventListener('touchmove',  onTouchMove);
    body.removeEventListener('touchend',   onTouchEnd);
  };
}

function addSkillNode(parentId) {
  const name = prompt('スキル名を入力してください');
  if (!name?.trim()) return;
  const subj = currentSkillSubject;
  S.skills[subj] = S.skills[subj] || [];

function deleteSkillNode(id) {

function resetSkillLayout() {

// ============================================================
// WEEKLY PLAN — 週間計画
// ============================================================

function renderWeeklyPlan() {
  const weekMs    = getWeekMs();
  const weekTotal = getWeekTotalMs();
  const goal      = S.goal;
  const goalHours = goal?.weeklyGoalHours || CFG.DEFAULT_WEEKLY_GOAL_HOURS;
  const goalMs    = goalHours * 3600000;
  const pct       = Math.min(Math.round(weekTotal / goalMs * 100), 100);

  const days      = ['月','火','水','木','金','土','日'];
  const todayDow  = (new Date().getDay() + 6) % 7;
  const maxMs     = Math.max(...weekMs, 1);

  const barsHtml = `<div class="week-bars">
    ${days.map((d, i) => {
      const isToday = i === todayDow;
      const barPct  = Math.round(weekMs[i] / maxMs * 100);
      return `<div class="week-bar-wrap">
        <div class="week-bar-bg"><div class="week-bar-fill ${isToday?'today':''}" style="height:${barPct}%"></div></div>
        <div class="week-bar-day ${isToday?'today':''}">${d}</div>
      </div>`;
    }).join('')}
  </div>`;

  const weekStart = new Date();
  weekStart.setDate(weekStart.getDate() - todayDow);
  weekStart.setHours(0, 0, 0, 0);
  const subjMap = getSessionsBySubject((S.sessions||[]).filter(s => new Date(s.ts) >= weekStart));

  const subjRows = Object.entries(subjMap).sort((a,b) => b[1]-a[1]).map(([subj, ms]) => {
    const color = getSubjectColor(subj);
    const p     = weekTotal > 0 ? Math.round(ms / weekTotal * 100) : 0;
    return `<div style="margin-bottom:8px">
      <div class="flex justify-between mb-4">
        <div style="font-size:12px;font-weight:700;color:${color}">${sanitize(subj)}</div>
        <div style="font-size:11px;color:var(--text-muted)">${formatMsShort(ms)} (${p}%)</div>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>
    </div>`;
  }).join('');

  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="navigateTo('skill')">← 戻る</button>
      <div class="page-title" style="font-size:18px">週間計画</div>
    </div>
  </div>
  <div class="card">
    <div class="flex justify-between items-center mb-8">
      <div class="section-label" style="margin:0">今週の進捗</div>
      <div style="font-size:13px;font-weight:700;color:var(--accent-strong)">${pct}%</div>
    </div>
    <div class="bar-track mb-12" style="height:8px">
      <div class="bar-fill" style="width:${pct}%;background:var(--accent-soft)"></div>
    </div>
    <div class="flex justify-between" style="font-size:12px;color:var(--text-muted)">
      <span>実績: ${formatMsShort(weekTotal)}</span>
      <span>目標: ${goalHours}h</span>
    </div>
  </div>
  <div class="card">
    <div class="section-label">今週の日別学習</div>
    ${barsHtml}
  </div>
  ${subjRows ? `<div class="card"><div class="section-label">教科別内訳</div>${subjRows}</div>` : ''}`;
}

function addSkillNodeInline() {
  const inp = document.getElementById('sk-map-inp');

<script>
// ============================================================
// app-grades.js
// 依存: config.js, store.js, badges.js, app-core.js
// 責務: テスト分析（複数教科・種別別トレンド）・実績

let testAnalysisType = '全て';
let editTestIndex    = -1;
let tempTest         = null;
let tempTestSubjects = [];

// ============================================================
// GRADES HUB
// ============================================================

function renderGradesHub() {

  return `<div class="page-header"><div class="page-title">成績</div></div>

// ============================================================
// TEST ANALYSIS — 強化版
// ============================================================

function renderTestAnalysis() {
  const allTypes = [...new Set((S.rounds||[]).map(r => r.type||'その他'))];
  if (!allTypes.length) allTypes.push('考査');
  if (!allTypes.includes(testAnalysisType)) testAnalysisType = allTypes[0];

  const tabsHtml = allTypes.map(t =>
    `<button class="page-tab ${t===testAnalysisType?'active':''}"
      onclick="testAnalysisType='${sanitize(t)}';navigateTo('test-analysis')">${sanitize(t)}</button>`
  ).join('');

  const rounds = (S.rounds||[])
    .filter(r => testAnalysisType==='全て' || (r.type||'その他')===testAnalysisType)
    .sort((a,b) => a.date.localeCompare(b.date));

  // サマリー統計
  let summaryHtml = '';
  if (rounds.length > 0) {
    const avgs   = rounds.map(r => calcRoundAvg(r));
    const avgAll = avgs.length ? Math.round(avgs.reduce((a,b)=>a+b,0)/avgs.length) : 0;
    const maxAvg = Math.max(...avgs);
    const minAvg = Math.min(...avgs);
    const latest = rounds[rounds.length-1];
    const latestAvg = calcRoundAvg(latest);
    const trend = rounds.length >= 2 ? latestAvg - calcRoundAvg(rounds[rounds.length-2]) : 0;
    const trendColor = trend > 0 ? 'var(--ok)' : trend < 0 ? 'var(--bad)' : 'var(--text-muted)';
    const trendStr = trend > 0 ? `▲ +${trend}` : trend < 0 ? `▼ ${trend}` : `→ 0`;
    summaryHtml = `<div class="card">
      <div class="section-label">サマリー（${testAnalysisType}）</div>
      <div class="stats-row">
        <div class="stat-card"><div class="stat-val">${avgAll}<span class="stat-val-unit">%</span></div><div class="stat-lbl">全体平均</div></div>
        <div class="stat-card"><div class="stat-val" style="color:var(--ok)">${maxAvg}<span class="stat-val-unit">%</span></div><div class="stat-lbl">最高</div></div>
        <div class="stat-card"><div class="stat-val" style="color:${trendColor};font-size:16px">${trendStr}</div><div class="stat-lbl">直近推移</div></div>
      </div>
    </div>`;
  }

  // 平均推移グラフ
  const avgChartHtml = rounds.length >= 2 ? `<div class="card">
    <div class="section-label">平均点推移</div>
    <canvas id="avg-trend-chart" style="width:100%;height:120px;display:block" height="120"></canvas>
    <div id="avg-trend-labels" style="display:flex;margin-top:4px"></div>
  </div>` : '';

  // 教科別トレンドグラフ
  const subjChartHtml = rounds.length >= 2 ? `<div class="card">
    <div class="section-label">教科別点数推移</div>
    <canvas id="subj-trend-chart" style="width:100%;height:140px;display:block;cursor:pointer" height="140"></canvas>
    <div id="subj-trend-labels" style="display:flex;margin-top:4px"></div>
    <div id="subj-legend" style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px"></div>
  </div>` : '';

  // 各回一覧（新しい順）
  const listHtml = rounds.length
    ? [...rounds].reverse().map((r, ri) => {
        const realIdx = S.rounds.indexOf(r);
        const avg     = calcRoundAvg(r);
        const avgColor= avg>=80?'var(--ok)':avg>=60?'var(--warn)':'var(--bad)';
        const bid     = 'tb'+ri;
        const scoreRows = Object.entries(r.scores||{}).map(([subj,sc]) => {
          const pct    = calcSubjPct(sc);
          const sColor = pct>=80?'var(--ok)':pct>=60?'var(--warn)':'var(--bad)';
          const sc2    = getSubjectColor(subj);
          return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <div style="font-size:12px;font-weight:800;color:${sc2};width:52px;flex-shrink:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${sanitize(subj)}</div>
            <div style="flex:1;height:10px;background:var(--bg-border);border-radius:5px;overflow:hidden">
              <div style="height:100%;border-radius:5px;background:${sColor};width:${pct}%;transition:width .4s" data-pct="${pct}"></div>
            </div>
            <div style="font-size:12px;font-weight:800;color:${sColor};width:34px;text-align:right">${pct}%</div>
            <div style="font-size:10px;color:var(--text-muted);width:48px;text-align:right">${sc.score}/${sc.max}</div>
            ${sc.dev!=null?`<div style="font-size:9px;color:var(--text-muted);width:40px;text-align:right">偏${sc.dev}</div>`:''}
          </div>`;
        }).join('');
        return `<div class="accordion">
          <div class="accordion-header" onclick="toggleAccordion('${bid}')">
            <div style="flex:1;min-width:0">
              <div class="accordion-title" style="overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${sanitize(r.name)}</div>
              <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${r.date} · ${r.type||''}</div>
            </div>
            <div class="flex items-center gap-8" style="flex-shrink:0">
              <span style="font-weight:800;color:${avgColor}">${avg}%</span>
              <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEditTest(${realIdx})" style="padding:3px 8px">✎</button>
              <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteTest(${realIdx})" style="padding:3px 8px">✕</button>
            </div>
          </div>
          <div class="accordion-body" id="${bid}">${scoreRows}</div>
        </div>`;
      }).join('')
    : '<div class="card"><div style="font-size:13px;color:var(--text-muted);text-align:center;padding:16px">テストを追加してください</div></div>';

  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="navigateTo('grades')">← 戻る</button>
      <div class="page-title" style="font-size:18px">テスト分析</div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="openAddTest()">＋ 追加</button>
  </div>
  <div class="page-tabs" style="overflow-x:auto;white-space:nowrap;display:flex;gap:6px;padding-bottom:4px">${tabsHtml}</div>
  ${summaryHtml}
  ${avgChartHtml}
  ${subjChartHtml}
  ${listHtml}`;
}

function renderTestChart() {
  const rounds = (S.rounds||[])
    .filter(r => testAnalysisType==='全て'||(r.type||'その他')===testAnalysisType)
    .sort((a,b) => a.date.localeCompare(b.date));
  if (rounds.length < 2) return;

  const allDates = rounds.map(r => r.date);
  const dpr = window.devicePixelRatio || 1;

  // 平均推移チャート
  requestAnimationFrame(() => {
    const cv = document.getElementById('avg-trend-chart'); if (!cv) return;
    const W = cv.offsetWidth||300, H = 120;
    cv.width=W*dpr; cv.height=H*dpr; cv.style.width=W+'px'; cv.style.height=H+'px';
    const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr);
    const avgs = rounds.map(r => calcRoundAvg(r));
    const pd={t:16,r:12,b:24,l:32}, gW=W-pd.l-pd.r, gH=H-pd.t-pd.b;
    ctx.fillStyle='#161b22'; ctx.fillRect(0,0,W,H);
    [0,25,50,75,100].forEach(v=>{
      const y=pd.t+gH-(v/100*gH);
      ctx.strokeStyle='#21262d';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(pd.l,y);ctx.lineTo(W-pd.r,y);ctx.stroke();
      ctx.fillStyle='#8b949e';ctx.font='9px sans-serif';ctx.textAlign='right';
      ctx.fillText(v,pd.l-3,y+3);
    });
    const pts=avgs.map((v,i)=>({x:pd.l+(rounds.length>1?i/(rounds.length-1)*gW:gW/2),y:pd.t+gH-(v/100*gH),v}));
    const grad=ctx.createLinearGradient(0,pd.t,0,pd.t+gH);
    grad.addColorStop(0,'rgba(153,216,255,0.3)');grad.addColorStop(1,'rgba(153,216,255,0.02)');
    ctx.beginPath();ctx.moveTo(pts[0].x,pd.t+gH);
    pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.lineTo(pts[pts.length-1].x,pd.t+gH);
    ctx.closePath();ctx.fillStyle=grad;ctx.fill();
    ctx.beginPath();ctx.strokeStyle='#99d8ff';ctx.lineWidth=2;ctx.lineJoin='round';
    pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));ctx.stroke();
    pts.forEach(p=>{
      const c=p.v>=80?'var(--ok)':p.v>=60?'var(--warn)':'var(--bad)';
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle=c;ctx.fill();
    });
    const labelsEl=document.getElementById('avg-trend-labels');
    if(labelsEl)labelsEl.innerHTML=allDates.map(d=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted);overflow:hidden;white-space:nowrap">${d.slice(5)}</div>`).join('');
  });

  // 教科別トレンド
  requestAnimationFrame(() => {
    const cv2=document.getElementById('subj-trend-chart'); if(!cv2)return;
    const bySubj={};
    rounds.forEach(r=>{Object.entries(r.scores||{}).forEach(([subj,sc])=>{
      if(!bySubj[subj])bySubj[subj]=[];
      bySubj[subj].push({date:r.date,pct:calcSubjPct(sc)});
    });});
    const subjKeys=Object.keys(bySubj); if(!subjKeys.length)return;
    const W2=cv2.offsetWidth||300, H2=140;
    cv2.width=W2*dpr;cv2.height=H2*dpr;cv2.style.width=W2+'px';cv2.style.height=H2+'px';
    const ctx2=cv2.getContext('2d');ctx2.scale(dpr,dpr);
    const pd={t:16,r:12,b:24,l:32},gW=W2-pd.l-pd.r,gH=H2-pd.t-pd.b;
    ctx2.fillStyle='#161b22';ctx2.fillRect(0,0,W2,H2);
    [0,25,50,75,100].forEach(v=>{
      const y=pd.t+gH-(v/100*gH);
      ctx2.strokeStyle='#21262d';ctx2.lineWidth=0.5;
      ctx2.beginPath();ctx2.moveTo(pd.l,y);ctx2.lineTo(W2-pd.r,y);ctx2.stroke();
      ctx2.fillStyle='#8b949e';ctx2.font='9px sans-serif';ctx2.textAlign='right';
      ctx2.fillText(v,pd.l-3,y+3);
    });
    subjKeys.forEach(subj=>{
      const color=getSubjectColor(subj);
      const pts=allDates.map((d,i)=>{
        const e=bySubj[subj]?.find(x=>x.date===d);if(!e)return null;
        return{x:pd.l+(rounds.length>1?i/(rounds.length-1)*gW:gW/2),y:pd.t+gH-(e.pct/100*gH)};
      }).filter(Boolean);
      if(pts.length<1)return;
      ctx2.strokeStyle=color;ctx2.lineWidth=1.5;ctx2.lineJoin='round';
      ctx2.beginPath();pts.forEach((p,i)=>i===0?ctx2.moveTo(p.x,p.y):ctx2.lineTo(p.x,p.y));ctx2.stroke();
      pts.forEach(p=>{ctx2.beginPath();ctx2.arc(p.x,p.y,3,0,Math.PI*2);ctx2.fillStyle=color;ctx2.fill();});
    });
    const labelsEl2=document.getElementById('subj-trend-labels');
    if(labelsEl2)labelsEl2.innerHTML=allDates.map(d=>`<div style="flex:1;text-align:center;font-size:9px;color:var(--text-muted);overflow:hidden;white-space:nowrap">${d.slice(5)}</div>`).join('');
    const legendEl=document.getElementById('subj-legend');
    if(legendEl)legendEl.innerHTML=subjKeys.map(s=>`<div style="display:flex;align-items:center;gap:4px">
      <div style="width:10px;height:3px;border-radius:2px;background:${getSubjectColor(s)}"></div>
      <span style="font-size:10px;color:var(--text-muted)">${sanitize(s)}</span>
    </div>`).join('');
  });
}

function animateTestBars() {
  document.querySelectorAll('.accordion-body.open [data-pct]').forEach(bar => {
    bar.style.transition='width .5s ease';bar.style.width=bar.getAttribute('data-pct')+'%';
  });
}

function toggleAccordion(id) {
  const el=document.getElementById(id);if(!el)return;
  el.classList.toggle('open');
  if(el.classList.contains('open')){
    setTimeout(()=>{el.querySelectorAll('[data-pct]').forEach(bar=>{
      bar.style.transition='width .5s ease';bar.style.width=bar.getAttribute('data-pct')+'%';
    });},20);
  }
}

function calcRoundAvg(r) {
  const entries=Object.values(r.scores||{});if(!entries.length)return 0;
  const ts=entries.reduce((a,s)=>a+(parseFloat(s.score)||0),0);
  const tm=entries.reduce((a,s)=>a+(parseFloat(s.max)||0),0);
  return tm>0?Math.round(ts/tm*100):0;
}

function calcSubjPct(sc) {
  const score=parseFloat(sc.score)||0,max=parseFloat(sc.max)||0;
  return max>0?Math.round(score/max*100):0;
}

function deleteTest(idx) {
  if(!confirm('このテスト記録を削除しますか？'))return;
  S.rounds.splice(idx,1);saveState();showToast('削除しました');navigateTo('test-analysis');
}

// テスト登録（2ステップ）
// ============================================================

function openAddTest() {
  editTestIndex=-1;tempTest=null;tempTestSubjects=[];
  document.getElementById('modal-test-title').textContent='テストを追加';
  document.getElementById('input-test-name').value='';
  document.getElementById('input-test-date').value=today();
  const typeEl=document.getElementById('input-test-type');
  if(typeEl)typeEl.innerHTML=CFG.TEST_TYPES.map(t=>`<option value="${t}">${t}</option>`).join('');
  buildTestSubjectChips();
  openModal('modal-test');
}

function openEditTest(idx) {
  const r=(S.rounds||[])[idx];if(!r)return;
  editTestIndex=idx;tempTest=null;tempTestSubjects=Object.keys(r.scores||{});
  document.getElementById('modal-test-title').textContent='テストを編集';
  document.getElementById('input-test-name').value=r.name||'';
  document.getElementById('input-test-date').value=r.date||today();
  const typeEl=document.getElementById('input-test-type');
  if(typeEl)typeEl.innerHTML=CFG.TEST_TYPES.map(t=>`<option value="${t}" ${t===(r.type||'')?'selected':''}>${t}</option>`).join('');
  buildTestSubjectChips();
  setTimeout(()=>{
    tempTestSubjects.forEach(s=>{
      document.querySelectorAll('#test-subj-chips .chip').forEach(c=>{
        if(c.getAttribute('data-subj')===s){
          c.classList.add('active');c.style.borderColor=getSubjectColor(s);c.style.color=getSubjectColor(s);
        }
      });
    });
  },50);
  openModal('modal-test');
}

function buildTestSubjectChips() {
  const container=document.getElementById('test-subj-chips');if(!container)return;
  container.innerHTML=getAllSubjects().map(s=>{
    const color=getSubjectColor(s);
    return `<div class="chip" data-subj="${sanitize(s)}" onclick="toggleTestSubject(this,'${sanitize(s)}')">${sanitize(s)}</div>`;
  }).join('');
}

function toggleTestSubject(el,subj) {
  const color=getSubjectColor(subj);
  if(tempTestSubjects.includes(subj)){
    tempTestSubjects=tempTestSubjects.filter(s=>s!==subj);
    el.classList.remove('active');el.style.borderColor='';el.style.color='';
  }else{
    tempTestSubjects.push(subj);el.classList.add('active');
    el.style.borderColor=color;el.style.color=color;
  }
}

function nextTestStep() {
  const name=document.getElementById('input-test-name').value.trim();
  if(!name){showToast('テスト名を入力してください');return;}
  if(!tempTestSubjects.length){showToast('教科を選択してください');return;}
  const type=document.getElementById('input-test-type')?.value||'';
  const date=document.getElementById('input-test-date').value||today();
  const r=(editTestIndex>=0)?(S.rounds||[])[editTestIndex]:null;
  tempTest={id:r?.id||generateId(),name:sanitize(name),type,date,subjects:[...tempTestSubjects],scores:{}};
  const infoEl=document.getElementById('test-score-info');
  if(infoEl)infoEl.textContent=`${name}（${type}）${date}`;
  const inpsEl=document.getElementById('test-score-inputs');
  if(inpsEl){
    inpsEl.innerHTML=tempTestSubjects.map((s,i)=>{
      const color=getSubjectColor(s);
      const prev=r?.scores?.[s];
      return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;padding:8px 10px;background:var(--accent-bg);border-radius:var(--radius-sm);border-left:3px solid ${color}">
        <div style="width:52px;flex-shrink:0;font-size:12px;font-weight:800;color:${color};overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${sanitize(s)}</div>
        <input type="number" id="sc-score-${i}" placeholder="得点" value="${prev?.score!=null?prev.score:''}" min="0" inputmode="decimal"
          style="flex:1;text-align:center;background:var(--bg-base);color:var(--text-primary);border:1px solid var(--bg-border);border-radius:7px;padding:7px;font-size:14px">
        <span style="color:var(--text-muted);font-weight:700;flex-shrink:0">/</span>
        <input type="number" id="sc-max-${i}" placeholder="満点" value="${prev?.max!=null?prev.max:100}" min="1" inputmode="decimal"
          style="width:50px;flex-shrink:0;text-align:center;background:var(--bg-base);color:var(--text-primary);border:1px solid var(--bg-border);border-radius:7px;padding:7px;font-size:14px">
        <input type="number" id="sc-dev-${i}" placeholder="偏差値" value="${prev?.dev!=null?prev.dev:''}" min="0" max="100" inputmode="decimal"
          style="width:50px;flex-shrink:0;text-align:center;background:var(--bg-base);color:var(--text-muted);border:1px solid var(--bg-border);border-radius:7px;padding:7px;font-size:14px">
      </div>`;
    }).join('');
    const hint=document.getElementById('test-score-hint');
    if(hint)hint.textContent='得点 / 満点 / 偏差値（任意）の順で入力';
  }
  closeModal('modal-test');
  document.getElementById('modal-test-score')?.classList.add('open');
}

function saveTestScore() {
  if(!tempTest)return;
  tempTestSubjects.forEach((s,i)=>{
    const score=parseFloat(document.getElementById(`sc-score-${i}`)?.value)||0;
    const max  =parseFloat(document.getElementById(`sc-max-${i}`)?.value)||100;
    const devV =document.getElementById(`sc-dev-${i}`)?.value.trim();
    const dev  =devV?parseFloat(devV):null;
    tempTest.scores[s]={score:isNaN(score)?0:score,max:isNaN(max)?100:max,dev};
  });
  S.rounds=S.rounds||[];
  if(editTestIndex>=0&&editTestIndex<S.rounds.length){
    S.rounds[editTestIndex]=tempTest;editTestIndex=-1;
  }else{S.rounds.push(tempTest);}
  S.rounds.sort((a,b)=>a.date.localeCompare(b.date));
  tempTest=null;tempTestSubjects=[];
  saveState();checkBadges();
  document.getElementById('modal-test-score')?.classList.remove('open');
  showToast('テストを記録しました');navigateTo('test-analysis');
}

// BADGES
// ============================================================

function renderBadges() {
  const earned=new Set(S.earnedBadges),dates=S.earnedDates||{};
  const total=BADGE_DEFS.length,count=S.earnedBadges.length;
  const pct=total>0?Math.round(count/total*100):0;
  const tierNames=['','Tier 1  第一歩','Tier 2  天界学園','Tier 3  ケツイを力に','Tier 4  ゴリラ','Tier 5  THE ABSOLUTE IDOL','最高難易度'];
  const tierColors=['','#8b949e','#3aaa72','#76c0ea','#e09030','#e24b4a','#e24b4a'];
  let tiersHtml='';
  for(let tier=1;tier<=6;tier++){
    const tb=BADGE_DEFS.filter(b=>b.tier===tier);if(!tb.length)continue;
    const ec=tb.filter(b=>earned.has(b.id)).length;
    tiersHtml+=`<div style="font-size:10px;font-weight:700;color:${tierColors[tier]};margin:14px 0 8px;letter-spacing:.8px">${tierNames[tier]} (${ec}/${tb.length})</div>
      <div class="badge-grid">${tb.map(b=>makeBadgeCard(b,earned,dates,false)).join('')}</div>`;
  }
  const gag=BADGE_DEFS.filter(b=>b.tier===0);
  if(gag.length){
    const eg=gag.filter(b=>earned.has(b.id)).length;
    tiersHtml+=`<div style="font-size:10px;font-weight:700;color:var(--text-muted);margin:14px 0 8px;letter-spacing:.8px">ネタ実績 (${eg}/${gag.length})</div>
      <div class="badge-grid">${gag.map(b=>makeBadgeCard(b,earned,dates,true)).join('')}</div>`;
  }
  return `<div class="page-header">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="navigateTo('grades')">← 戻る</button>
      <div><div class="page-title" style="font-size:18px">実績</div><div class="page-subtitle">${count}/${total} 解除済</div></div>
    </div>
  </div>
  <div class="card">
    <div class="flex justify-between mb-8"><span style="font-size:12px">達成率</span><b style="color:var(--accent-strong)">${pct}%</b></div>
    <div class="bar-track" style="height:8px"><div class="bar-fill" style="width:${pct}%;background:var(--accent-soft)"></div></div>
  </div>
  ${tiersHtml}`;
}

function makeBadgeCard(b,earned,dates,isGag){
  const isEarned=earned.has(b.id);
  const border=isGag&&!isEarned?'border-style:dashed':'';
  const dateHtml=isEarned&&dates[b.id]?`<div style="font-size:9px;color:var(--text-muted);margin-top:3px">${dates[b.id]}</div>`:'';
  const hintHtml=isEarned?(b.hint?`<div class="achievement-hint" style="color:var(--accent-strong)">${b.hint}</div>`:''):(!isGag&&b.hint?`<div class="achievement-hint">💡 ${b.hint}</div>`:`<div class="achievement-hint">???</div>`);
  return `<div class="achievement-card ${isEarned?'earned':''}" style="${border}" onclick="showBadgeDetail('${b.id}')">
    <span class="achievement-icon">${isEarned?b.icon:'?'}</span>
    <div class="achievement-name">${isEarned?sanitize(b.name):'???'}</div>
    ${hintHtml}${dateHtml}
  </div>`;
}

function showBadgeDetail(id){
  const b=BADGE_DEFS.find(x=>x.id===id);if(!b)return;
  const isEarned=S.earnedBadges.includes(b.id),dates=S.earnedDates||{};
  const tierNames=['ネタ','Tier 1 第一歩','Tier 2 天界学園','Tier 3 ケツイを力に','Tier 4 ゴリラ','Tier 5 THE ABSOLUTE IDOL','最高難易度'];
  const prev=document.getElementById('badge-detail-overlay');if(prev)prev.remove();
  const overlay=document.createElement('div');
  overlay.id='badge-detail-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1100;display:flex;align-items:flex-end;justify-content:center';
  const box=document.createElement('div');
  box.style.cssText='background:var(--bg-card);border-radius:14px 14px 0 0;padding:24px 20px;width:100%;max-width:480px;padding-bottom:calc(20px + var(--safe-bottom));border-top:2px solid var(--accent-soft)';
  box.innerHTML=`<div style="text-align:center">
    <div style="font-size:40px;margin-bottom:8px">${isEarned?b.icon:'?'}</div>
    <div style="font-size:18px;font-weight:800;margin-bottom:4px">${isEarned?sanitize(b.name):'???'}</div>
    <div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">${tierNames[b.tier]||''}</div>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.7;text-align:left;background:var(--accent-bg);border-radius:10px;padding:12px 14px">
      ${isEarned?(b.hint?'達成条件: '+b.hint:'（達成条件は秘密）'):(b.tier===0?'???':(b.hint?'達成条件: '+b.hint:'条件を満たすと解除されます'))}
    </div>
    ${isEarned&&dates[id]?`<div style="margin-top:10px;font-size:11px;color:var(--text-muted)">解除日: ${dates[id]}</div>`:''}
  </div>
  <button class="btn btn-ghost btn-full mt-16" onclick="document.getElementById('badge-detail-overlay').remove()">閉じる</button>`;
  overlay.appendChild(box);
  overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.remove();});
  document.body.appendChild(overlay);
}

</script>

    <button class="btn btn-primary btn-sm" onclick="saveAccentColor()">適用</button>
    <button class="btn btn-ghost btn-sm" onclick="resetAccentColor()" style="margin-left:8px">リセット</button>
  </div>

  <div class="card">
    <div class="section-label">目標の変更</div>
    <button class="btn btn-secondary btn-full" onclick="openGoalModal()">${S.goal?'目標を編集':'目標を設定する'}</button>
  </div>

  <div class="card">
    <div class="section-label">実績の難易度調整</div>
    <div style="font-size:12px;color:var(--text-muted);margin-bottom:12px;line-height:1.7">
      各実績の達成しきい値を調整できます。簡単にすると早期達成、難しくするとやりごたえが増します。
    </div>
    ${renderBadgeDifficultySettings()}
    <button class="btn btn-primary btn-sm mt-12" onclick="saveBadgeDifficulty()">保存</button>
    <button class="btn btn-ghost btn-sm" onclick="resetBadgeDifficulty()" style="margin-left:8px">リセット</button>
  </div>`;
}

function previewBgOpacity(val) {
  document.getElementById('bg-opacity-display').textContent = val + '%';
  const overlay = document.querySelector('#bg-image div');
  if (overlay) overlay.style.background = `rgba(13,17,23,${(100-parseInt(val))/100})`;
}

function saveBgOpacity() {
  const val = parseInt(document.getElementById('bg-opacity-slider')?.value) || 0;
  S.settings = S.settings || {};
  S.settings.bgOpacity = 100 - val;
  saveState();
  showToast('透明度を保存しました');
}

function applyColorPreset(strong, soft) {
  document.getElementById('color-accent-strong').value = strong;
  document.getElementById('color-accent-strong-hex').value = strong;
  document.getElementById('color-accent-soft').value = soft;
  document.getElementById('color-accent-soft-hex').value = soft;
  applyAccentColors(strong, soft);
}

function syncColorInput(type) {
  const hexEl = document.getElementById(`color-accent-${type}-hex`);
  const pickerEl = document.getElementById(`color-accent-${type}`);
  if (!hexEl || !pickerEl) return;
  const hex = hexEl.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    pickerEl.value = hex;
    previewAccentColor();
  }
}

function previewAccentColor() {
  const strong = document.getElementById('color-accent-strong')?.value || '#99d8ff';
  const soft   = document.getElementById('color-accent-soft')?.value   || '#76c0ea';
  document.getElementById('color-accent-strong-hex').value = strong;
  document.getElementById('color-accent-soft-hex').value   = soft;
  applyAccentColors(strong, soft);
}

function applyAccentColors(strong, soft) {
  document.documentElement.style.setProperty('--accent-strong', strong);
  document.documentElement.style.setProperty('--accent-soft', soft);
  document.documentElement.style.setProperty('--accent-border', hexToRgba(strong, 0.25));
  document.documentElement.style.setProperty('--accent-bg',    hexToRgba(strong, 0.08));
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function saveAccentColor() {
  const strong = document.getElementById('color-accent-strong')?.value || '#99d8ff';
  const soft   = document.getElementById('color-accent-soft')?.value   || '#76c0ea';
  S.settings = S.settings || {};
  S.settings.accentStrong = strong;
  S.settings.accentSoft   = soft;
  saveState();
  applyAccentColors(strong, soft);
  showToast('カラーを保存しました');
}

function resetAccentColor() {
  S.settings = S.settings || {};
  delete S.settings.accentStrong;
  delete S.settings.accentSoft;
  saveState();
  applyAccentColors('#99d8ff', '#76c0ea');
  navigateTo('settings');
  showToast('カラーをリセットしました');
}

// 実績難易度カスタマイズ
function renderBadgeDifficultySettings() {
  // 調整可能な実績のしきい値定義
  const adjustable = [
    { id:'t1_3day',  label:'連続学習（Tier1）', key:'streak_t1', default:3,  min:1,  max:30,  unit:'日' },
    { id:'t1_5day',  label:'連続学習（Tier1+）',key:'streak_t1p',default:5,  min:1,  max:60,  unit:'日' },
    { id:'t2_7day',  label:'連続学習（Tier2）', key:'streak_t2', default:7,  min:3,  max:90,  unit:'日' },
    { id:'t2_14day', label:'連続学習（Tier2+）',key:'streak_t2p',default:14, min:5,  max:180, unit:'日' },
    { id:'t4_21day', label:'連続学習（Tier4）', key:'streak_t4', default:21, min:7,  max:365, unit:'日' },
    { id:'t1_ikadai',label:'累計学習（Tier1）', key:'total_t1',  default:1,  min:1,  max:10,  unit:'時間' },
    { id:'t2_10h',   label:'累計学習（Tier2）', key:'total_t2',  default:10, min:2,  max:50,  unit:'時間' },
    { id:'t3_27h',   label:'累計学習（Tier3）', key:'total_t3',  default:27, min:10, max:100, unit:'時間' },
    { id:'t2_70',    label:'テスト正答率（Tier2）',key:'score_t2',default:70,min:50, max:95,  unit:'%' },
    { id:'t2_80',    label:'テスト正答率（Tier2+）',key:'score_t2p',default:80,min:60,max:99, unit:'%' },
    { id:'t1_10cards',label:'暗記カード枚数',   key:'card_t1',  default:10, min:5,  max:100, unit:'枚' },
    { id:'t2_50cards',label:'暗記正解枚数',     key:'card_t2',  default:50, min:10, max:200, unit:'枚' },
  ];
  const diff = S.settings?.badgeDifficulty || {};
  return adjustable.map(a => {
    const cur = diff[a.key] !== undefined ? diff[a.key] : a.default;
    const level = cur < a.default ? '😊 簡単' : cur > a.default ? '💪 難しい' : '⚖️ 標準';
    return `<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--bg-border)">
      <div class="flex justify-between items-center mb-4">
        <div style="font-size:12px;font-weight:700">${a.label}</div>
        <span style="font-size:10px;color:var(--text-muted)">${level}</span>
      </div>
      <div class="flex items-center gap-8">
        <input type="range" id="diff-${a.key}" min="${a.min}" max="${a.max}" value="${cur}" step="1"
          style="flex:1;padding:4px 0;border:none;background:none"
          oninput="document.getElementById('diff-val-${a.key}').textContent=this.value+'${a.unit}'">
        <span id="diff-val-${a.key}" style="font-size:12px;font-weight:700;color:var(--accent-strong);width:56px;text-align:right;flex-shrink:0">${cur}${a.unit}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-muted);margin-top:2px">
        <span>簡単 ${a.min}${a.unit}</span><span>標準 ${a.default}${a.unit}</span><span>難しい ${a.max}${a.unit}</span>
      </div>
    </div>`;
  }).join('');
}

function saveBadgeDifficulty() {
  const adjustable = [
    {key:'streak_t1'},{key:'streak_t1p'},{key:'streak_t2'},{key:'streak_t2p'},{key:'streak_t4'},
    {key:'total_t1'},{key:'total_t2'},{key:'total_t3'},
    {key:'score_t2'},{key:'score_t2p'},
    {key:'card_t1'},{key:'card_t2'},
  ];
  S.settings = S.settings || {};
  S.settings.badgeDifficulty = S.settings.badgeDifficulty || {};
  adjustable.forEach(a => {
    const el = document.getElementById('diff-'+a.key);
    if (el) S.settings.badgeDifficulty[a.key] = parseInt(el.value);
  });
  // badges.jsのしきい値を動的に反映
  applyBadgeDifficulty();
  saveState();
  showToast('難易度を保存しました');
}

function resetBadgeDifficulty() {
  if (!confirm('難易度設定をリセットしますか？')) return;
  S.settings = S.settings || {};
  S.settings.badgeDifficulty = {};
  applyBadgeDifficulty();
  saveState();
  showToast('難易度をリセットしました');
  navigateTo('settings');
}

function applyBadgeDifficulty() {
  // badges.jsのMS定数を動的しきい値で上書き
  const diff = S.settings?.badgeDifficulty || {};
  const get = (key, def) => (diff[key] !== undefined ? diff[key] : def);
  // BADGE_DEFSのcheck関数は参照するグローバル変数を通じてしきい値を取得
  window._BD = {
    streak_t1:  get('streak_t1',  3),
    streak_t1p: get('streak_t1p', 5),
    streak_t2:  get('streak_t2',  7),
    streak_t2p: get('streak_t2p', 14),
    streak_t4:  get('streak_t4',  21),
    total_t1:   get('total_t1',   1)  * 3600000,
    total_t2:   get('total_t2',   10) * 3600000,
    total_t3:   get('total_t3',   27) * 3600000,
    score_t2:   get('score_t2',   70) / 100,
    score_t2p:  get('score_t2p',  80) / 100,
    card_t1:    get('card_t1',    10),
    card_t2:    get('card_t2',    50),
  };
}

    document.getElementById('input-goal-date').value=goal.examDate||'';

function saveSubject() {
  const name=document.getElementById('input-subject-name').value.trim();
  if(!name){showToast('教科名を入力してください');return;}
  if(getAllSubjects().includes(name)){showToast('すでに存在します');return;}
  S.subjects=S.subjects||[];S.subjects.push(name);
  S.skills[name]=S.skills[name]||[];
  saveState();closeModal('modal-subject');
  document.getElementById('input-subject-name').value='';
  showToast('教科を追加しました');navigateTo('settings');
}

function deleteSubject(name) {
  if(!confirm(`${name} を削除しますか？`))return;
  S.subjects=(S.subjects||[]).filter(s=>s!==name);
  saveState();showToast('削除しました');navigateTo('settings');
}

// ============================================================
// 背景画像
// ============================================================

function loadBackground(e) {
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=function(){
      const MAX=1200;let w=img.width,h=img.height;
      if(w>MAX||h>MAX){const sc=Math.min(MAX/w,MAX/h);w=Math.round(w*sc);h=Math.round(h*sc);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const compressed=cv.toDataURL('image/jpeg',0.72);
      S.settings=S.settings||{};S.settings.bg=compressed;
      applyBackground(compressed);saveState();
      const kb=Math.round(compressed.length*0.75/1024);
      showToast(`背景を設定 (${kb}KB)`);navigateTo('settings');
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function clearBackground() {
  S.settings=S.settings||{};S.settings.bg='';
  applyBackground('');saveState();showToast('背景を解除');navigateTo('settings');
}

function applyStoredSettings() {
  const s=S.settings||{};
  if(s.bg)applyBackground(s.bg);
  if(s.accentStrong||s.accentSoft)applyAccentColors(s.accentStrong||'#99d8ff',s.accentSoft||'#76c0ea');

    const overlay=document.querySelector('#bg-image div');

  }
}
